by level.", "D": "Configure Claude to show only high-confidence findings, filtering uncertain flags before developers see them."}, "correct": "A", "explanation": "Including rationale and confidence directly in each finding reduces investigation time by letting developers quickly triage without opening each finding. It satisfies the “no filtering” constraint because all findings remain visible while accelerating developer decision-making."}, {"id": "PL-Q29", "source": "paullarionov", "scenario": "Claude Code for Continuous Integration", "domain": "D4", "task_statement": "4.x", "question": "Analysis of your automated code review shows large differences in false-positive rates by finding category: security/correctness findings have 8% false positives, performance findings 18%, style/naming findings 52%, and documentation findings 48%. Developer surveys show growing distrust—many start dismissing findings without reading because “half are wrong.” High-false-positive categories erode trust in accurate categories. Which approach best restores developer trust while improving the system? Which approach best restores developer trust?", "options": {"A": "Temporarily disable high-false-positive categories (style, naming, documentation) and keep only high-precision categories while improving prompts.", "B": "Keep all categories enabled but display confidence scores with each finding so developers can decide what to investigate.", "C": "Keep all categories enabled and add few-shot examples to improve accuracy for each category over the next few weeks.", "D": "Apply a uniform strictness reduction across all categories to bring the overall false-positive rate down."}, "correct": "A", "explanation": "Temporarily disabling high-false-positive categories immediately stops trust erosion by removing noisy findings that cause developers to dismiss everything, while preserving value from high-precision categories like security and correctness. It also creates space to improve prompts for problematic categories before re-enabling them."}, {"id": "PL-Q30", "source": "paullarionov", "scenario": "Claude Code for Continuous Integration", "domain": "D3", "task_statement": "3.x", "question": "Your team wants to reduce API costs for automated analysis. Currently, synchronous Claude calls support two workflows: (1) a blocking pre-merge check that must complete before developers can merge, and (2) a technical debt report generated overnight for review the next morning. Your manager proposes moving both to the Message Batches API to save 50%. How should you evaluate this proposal? How should you evaluate this proposal?", "options": {"A": "Move both to batch processing with fallback to synchronous calls if batches take too long.", "B": "Move both workflows to batch processing with status polling to verify completion.", "C": "Use batch processing only for technical debt reports; keep synchronous calls for pre-merge checks.", "D": "Keep synchronous calls for both workflows to avoid issues with batch result ordering."}, "correct": "C", "explanation": "Message Batches API processing can take up to 24 hours with no latency SLA, which is acceptable for overnight technical debt reports but unacceptable for blocking pre-merge checks where developers wait. This matches each workflow to the right API based on latency requirements."}, {"id": "PL-Q31", "source": "paullarionov", "scenario": "Code Generation with Claude Code", "domain": "D3", "task_statement": "3.x", "question": "You asked Claude Code to implement a function that transforms API responses into an internal normalized format. After two iterations, the output structure still doesn’t match expectations—some fields are nested differently and timestamps are formatted incorrectly. You described requirements in prose, but Claude interprets them differently each time. Which approach is most effective for the next iteration?", "options": {"A": "Write a JSON schema describing the expected output structure and validate Claude’s output against it after each iteration.", "B": "Provide 2–3 concrete input-output examples showing the expected transformation for representative API responses.", "C": "Rewrite requirements with more technical precision, specifying exact field mappings, nesting rules, and timestamp format strings.", "D": "Ask Claude to explain its current understanding of the requirements to identify where interpretations diverge."}, "correct": "B", "explanation": "Concrete input-output examples remove ambiguity inherent in prose descriptions by showing Claude the exact expected transformation results. This directly addresses the root cause—misinterpretation of textual requirements—by providing unambiguous patterns for field nesting and timestamp formatting."}, {"id": "PL-Q32", "source": "paullarionov", "scenario": "Code Generation with Claude Code", "domain": "D3", "task_statement": "3.x", "question": "You need to add Slack as a new notification channel. The existing codebase has clear, established patterns for email, SMS, and push channels. However, Slack’s API offers fundamentally different integration approaches—incoming webhooks (simple, one-way), bot tokens (support delivery confirmation and programmatic control), or Slack Apps (two-way events, requires workspace approval). Your task says “add Slack support” without specifying integration method or requiring advanced features like delivery tracking. How should you approach this task?", "options": {"A": "Start in direct execution mode using incoming webhooks to match the existing one-way notification pattern.", "B": "Switch to planning mode to explore integration options and architectural implications, then present a recommendation before implementation.", "C": "Start in direct execution mode by scaffolding a Slack channel class using existing patterns, deferring the integration method decision.", "D": "Start in direct execution mode using a bot-token approach to ensure delivery confirmation is possible."}, "correct": "B", "explanation": "Slack integration has multiple valid approaches with significantly different architectural implications, and requirements are ambiguous. Planning mode lets you evaluate trade-offs among webhooks, bot tokens, and Slack Apps and align on an approach before implementation."}, {"id": "PL-Q33", "source": "paullarionov", "scenario": "Code Generation with Claude Code", "domain": "D3", "task_statement": "3.x", "question": "Your CLAUDE.md file has grown to 400+ lines containing coding standards, testing conventions, a detailed PR review checklist, deployment instructions, and database migration procedures. You want Claude to always follow coding standards and testing conventions, but apply PR review, deploy, and migration guidance only when doing those tasks. Which restructuring approach is most effective?", "options": {"A": "Move all guidance into separate Skills files organized by workflow type, leaving only a brief project description in CLAUDE.md.", "B": "Keep everything in CLAUDE.md but use `@import` syntax to organize into separately maintained files by category.", "C": "Split CLAUDE.md into files under `.claude/rules/` with path-bound glob patterns so each rule loads only for the relevant file types.", "D": "Keep universal standards in CLAUDE.md and create Skills for workflow-specific guidance (PR review, deploy, migrations) with trigger keywords."}, "correct": "D", "explanation": "CLAUDE.md content loads in every session, ensuring coding standards and testing conventions always apply, while Skills are invoked on demand when Claude detects trigger keywords—ideal for workflow-specific guidance like PR review, deployment, and migrations."}, {"id": "PL-Q34", "source": "paullarionov", "scenario": "Code Generation with Claude Code", "domain": "D3", "task_statement": "3.x", "question": "You’re tasked with restructuring your team’s monolithic application into microservices. This impacts changes across dozens of files and requires decisions about service boundaries and module dependencies. Which approach should you choose?", "options": {"A": "Switch to planning mode to explore the codebase, understand dependencies, and design the implementation approach before making changes.", "B": "Start in direct execution mode and switch to planning only after encountering unexpected complexity during implementation.", "C": "Start in direct execution mode and make incremental changes, letting implementation reveal natural service boundaries.", "D": "Use direct execution with detailed upfront instructions that specify each service structure."}, "correct": "A", "explanation": "Planning mode is the right strategy for complex architectural restructuring like splitting a monolith: it allows safe exploration and informed decisions about boundaries before committing to potentially expensive changes across many files."}, {"id": "PL-Q35", "source": "paullarionov", "scenario": "Code Generation with Claude Code", "domain": "D3", "task_statement": "3.x", "question": "Your team created a `/analyze-codebase` skill that performs deep code analysis—dependency scanning, test coverage counts, and code quality metrics. After running the command, team members report Claude becomes less responsive in the session and loses the context of the original task. How do you most effectively fix this while keeping full analysis capabilities?", "options": {"A": "Add `context: fork` in the skill frontmatter to run the analysis in an isolated subagent context.", "B": "Add `model: haiku` in frontmatter to use a faster, cheaper model for analysis.", "C": "Split the skill into three smaller skills, each producing less output.", "D": "Add instructions to the skill to compress all results into a short summary before displaying them."}, "correct": "A", "explanation": "`context: fork` runs the analysis in an isolated subagent context so the large output does not pollute the main session’s context window and Claude does not lose track of the original task. It preserves full analysis capability while keeping the main session responsive."}, {"id": "PL-Q36", "source": "paullarionov", "scenario": "Code Generation with Claude Code", "domain": "D3", "task_statement": "3.x", "question": "Your team uses a `/commit` skill in `.claude/skills/commit/SKILL.md`. A developer wants to customize it for their personal workflow (different commit message format, extra checks) without affecting teammates. What do you recommend?", "options": {"A": "Create a personal version under `~/.claude/skills/` with a different name, e.g., `/my-commit`.", "B": "Add conditional logic based on username in the project skill frontmatter.", "C": "Create a personal version at `~/.claude/skills/commit/SKILL.md` with the same name.", "D": "Set `override: true` in the personal skill frontmatter to prioritize it over the project version."}, "correct": "A", "explanation": "Project skills take precedence over personal skills with the same name. To keep a personalized variant available alongside the team’s skill, the developer should create a differently named skill (e.g., `/my-commit`) in their personal `~/.claude/skills/` directory."}, {"id": "PL-Q37", "source": "paullarionov", "scenario": "Code Generation with Claude Code", "domain": "D3", "task_statement": "3.x", "question": "Your team has used Claude Code for months. Recently, three developers report Claude follows the guidance “always include comprehensive error handling,” but a fourth developer who just joined says Claude does not follow it. All four work in the same repo and have up-to-date code. What is the most likely cause and fix?", "options": {"A": "The guidance lives in the original developers’ user-level `~/.claude/CLAUDE.md` files, not in the project `.claude/CLAUDE.md`. Move the instruction to the project-level file so all team members receive it.", "B": "The new developer’s `~/.claude/CLAUDE.md` contains conflicting instructions overriding project settings; they should delete the conflicting section.", "C": "Claude Code learns per-user preferences over time; the new developer must repeat the requirement until Claude “remembers” it.", "D": "Claude Code caches CLAUDE.md after first read; original developers use cached versions. Everyone should clear the Claude Code cache."}, "correct": "A", "explanation": "If the guidance was added only to the original developers’ user-level configs and not to the project-level `.claude/CLAUDE.md`, new team members won’t receive it. Moving it to the project-level configuration ensures all current and future team members automatically get the guidance."}, {"id": "PL-Q38", "source": "paullarionov", "scenario": "Code Generation with Claude Code", "domain": "D3", "task_statement": "3.x", "question": "You find that including 2–3 full endpoint implementation examples as context significantly improves consistency when generating new API endpoints. However, this context is useful only when creating new endpoints—not when debugging, reviewing code, or other work in the API directory. Which configuration approach is most effective?", "options": {"A": "Add endpoint examples and pattern documentation to the project CLAUDE.md so they are always available.", "B": "Manually reference endpoint examples in every generation request by copying code into the prompt.", "C": "Configure path-specific rules in `.claude/rules/api/` that include endpoint examples and activate when working in the API directory.", "D": "Create a skill that references the endpoint examples and contains pattern-following instructions, invoked on demand via a slash command."}, "correct": "D", "explanation": "A skill invoked on demand loads the example context only when generating new endpoints, not during unrelated tasks like debugging or review. This keeps the main context clean while preserving high-quality generation when needed."}, {"id": "PL-Q39", "source": "paullarionov", "scenario": "Code Generation with Claude Code", "domain": "D3", "task_statement": "3.x", "question": "Your team created a `/migration` skill that generates database migration files. It takes the migration name via `$ARGUMENTS`. In production you observe three issues: (1) developers often run the skill without arguments, causing poorly named files, (2) the skill sometimes uses database schema details from unrelated prior conversations, and (3) a developer accidentally ran destructive test cleanup when the skill had broad tool access. Which configuration approach fixes all three problems?", "options": {"A": "Use positional parameters `$1` and `$2` instead of `$ARGUMENTS` to enforce specific inputs, include explicit schema file references via `@` syntax for context control, and add a frontmatter description warning about destructive operations.", "B": "Add `argument-hint` in frontmatter to request required parameters, use `context: fork` to isolate execution, and restrict `allowed-tools` to file-write operations.", "C": "Split into `/migration-create` and `/migration-apply` skills, add validation instructions to request migration name if missing, and use different `allowed-tools` scopes for each.", "D": "Add validation instructions in the skill SKILL.md to ensure `$ARGUMENTS` is a valid name, add prompts to ignore prior conversation context, and list prohibited operations to avoid."}, "correct": "B", "explanation": "This uses three separate configuration features to address each problem: `argument-hint` improves argument entry and reduces missing arguments, `context: fork` prevents context leakage from prior conversations, and `allowed-tools` constrains the skill to safe file-writing operations, preventing destructive actions."}, {"id": "PL-Q40", "source": "paullarionov", "scenario": "Code Generation with Claude Code", "domain": "D3", "task_statement": "3.x", "question": "Your codebase contains areas with different coding conventions: React components use functional style with hooks, API handlers use async/await with specific error handling, and database models follow the repository pattern. Test files are distributed across the codebase next to the code under test (e.g., `Button.test.tsx` next to `Button.tsx`), and you want all tests to follow the same conventions regardless of location. What is the most supported way to ensure Claude automatically applies the correct conventions when generating code?", "options": {"A": "Put all conventions in the root CLAUDE.md under headings for each area and rely on Claude to infer which section applies.", "B": "Create skills in `.claude/skills/` for each code type, embedding conventions in each SKILL.md.", "C": "Place a separate CLAUDE.md file in each subdirectory containing conventions for that area.", "D": "Create rule files under `.claude/rules/` with YAML frontmatter specifying glob patterns to conditionally apply conventions based on file paths."}, "correct": "D", "explanation": "`.claude/rules/` files with YAML frontmatter and glob patterns (e.g., `**/*.test.tsx`, `src/api/**/*.ts`) enable deterministic, path-based convention application regardless of directory structure. This is the most supported approach for cross-cutting patterns like distributed test files."}, {"id": "PL-Q41", "source": "paullarionov", "scenario": "Code Generation with Claude Code", "domain": "D3", "task_statement": "3.x", "question": "You want to create a custom slash command `/review` that runs your team’s standard code review checklist. It should be available to every developer when they clone or update the repository. Where should you create the command file?", "options": {"A": "In `~/.claude/commands/` in each developer’s home directory.", "B": "In the project repository under `.claude/commands/`.", "C": "In `.claude/config.json` as an array of commands.", "D": "In the root project CLAUDE.md."}, "correct": "B", "explanation": "Putting custom slash commands under `.claude/commands/` inside the project repository ensures they are version-controlled and automatically available to every developer who clones or updates the repo. This is the intended location for project-level custom commands in Claude Code."}, {"id": "PL-Q42", "source": "paullarionov", "scenario": "Code Generation with Claude Code", "domain": "D3", "task_statement": "3.x", "question": "Your team’s CLAUDE.md grew beyond 500 lines mixing TypeScript conventions, testing guidance, API patterns, and deployment procedures. Developers find it hard to locate and update the right sections. What approach does Claude Code support to organize project-level instructions into focused topical modules?", "options": {"A": "Define a `.claude/config.yaml` mapping file patterns to specific sections inside CLAUDE.md.", "B": "Create separate Markdown files in `.claude/rules/`, each covering one topic (e.g., `testing.md`, `api-conventions.md`).", "C": "Split instructions into README.md files in relevant subdirectories that Claude automatically loads as instructions.", "D": "Create multiple files named CLAUDE.md at different levels of the directory tree, each overriding parent instructions."}, "correct": "B", "explanation": "Claude Code supports a `.claude/rules/` directory where you can create separate Markdown files for topical guidance (e.g., `testing.md`, `api-conventions.md`), allowing teams to organize large instruction sets into focused, maintainable modules."}, {"id": "PL-Q43", "source": "paullarionov", "scenario": "Code Generation with Claude Code", "domain": "D3", "task_statement": "3.x", "question": "You create a custom skill `/explore-alternatives` that your team uses to brainstorm and evaluate implementation approaches before choosing one. Developers report that after running the skill, subsequent Claude responses are influenced by the alternatives discussion—sometimes referencing rejected approaches or retaining exploration context that interferes with actual implementation. How should you most effectively configure this skill?", "options": {"A": "Use the `!` prefix in the skill to run exploration logic as a bash subprocess.", "B": "Add `context: fork` in the skill frontmatter.", "C": "Split into two skills—`/explore-start` and `/explore-end`—to mark boundaries when exploration context should be discarded.", "D": "Create the skill in `~/.claude/skills/` instead of `.claude/skills/`."}, "correct": "B", "explanation": "`context: fork` runs the skill in an isolated subagent context so exploration discussions do not pollute the main conversation history. This prevents rejected approaches and brainstorming context from influencing subsequent implementation work."}, {"id": "PL-Q44", "source": "paullarionov", "scenario": "Code Generation with Claude Code", "domain": "D3", "task_statement": "3.x", "question": "Your team wants to add a GitHub MCP server for searching PRs and checking CI status via Claude Code. Each of six developers has their own personal GitHub access token. You want consistent tooling across the team without committing credentials to version control. Which configuration approach is most effective?", "options": {"A": "Have each developer add the server in user scope via `claude mcp add --scope user`.", "B": "Create an MCP server wrapper that reads tokens from a `.env` file and proxies GitHub API calls, then add the wrapper to the project `.mcp.json`.", "C": "Add the server to the project `.mcp.json` using environment variable substitution (`${GITHUB_TOKEN}`) for auth and document the required environment variable in the project README.", "D": "Configure the server in project scope with a placeholder token, then tell developers to override it in their local config."}, "correct": "C", "explanation": "A project `.mcp.json` with environment variable substitution is idiomatic: it provides a single version-controlled source of truth for MCP configuration while letting each developer supply credentials via environment variables. Documenting the variable makes onboarding easy without committing secrets."}, {"id": "PL-Q45", "source": "paullarionov", "scenario": "Code Generation with Claude Code", "domain": "D3", "task_statement": "3.x", "question": "You’re adding error-handling wrappers around external API calls across a 120-file codebase. The work has three phases: (1) discover all call sites and patterns, (2) collaboratively design the error-handling approach, and (3) implement wrappers consistently. In Phase 1, Claude generates large output listing hundreds of call sites with context, quickly filling the context window before discovery finishes. Which approach is most effective to complete the task while maintaining implementation consistency?", "options": {"A": "Use an Explore subagent for Phase 1 to isolate verbose discovery output and return a summary, then continue Phases 2–3 in the main conversation.", "B": "Do all phases in the main conversation, periodically using `/compact` to reduce context usage while moving through files.", "C": "Switch to headless mode with `--continue`, passing explicit context summaries between batch calls to maintain continuity.", "D": "Define the error-handling pattern in CLAUDE.md, then process files in batches across multiple sessions relying on the shared memory file for consistency."}, "correct": "A", "explanation": "An Explore subagent isolates the verbose discovery output in a separate context and returns only a concise summary to the main conversation. This preserves the main context window for the collaborative design and consistent implementation phases where retained context is most valuable."}, {"id": "PL-Q46", "source": "paullarionov", "scenario": "Customer Support Agent", "domain": "D2", "task_statement": "2.x", "question": "While testing, you notice the agent often calls `get_customer` when users ask about order status, even though `lookup_order` would be more appropriate. What should you check first to address this problem? What should you check first?", "options": {"A": "Implement a preprocessing classifier to detect order-related requests and route them directly to `lookup_order`.", "B": "Reduce the number of tools available to the agent to simplify choice.", "C": "Add few-shot examples to the system prompt covering all possible order request patterns to improve tool selection.", "D": "Check the tool descriptions to ensure they clearly differentiate each tool’s purpose."}, "correct": "D", "explanation": "Tool descriptions are the primary input the model uses to decide which tool to call. When an agent consistently picks the wrong tool, the first diagnostic step is to verify that tool descriptions clearly separate each tool’s purpose and usage boundaries."}, {"id": "PL-Q47", "source": "paullarionov", "scenario": "Customer Support Agent", "domain": "D2", "task_statement": "2.x", "question": "Your agent handles single-issue requests with 94% accuracy (e.g., “I need a refund for order #1234”). But when customers include multiple issues in one message (e.g., “I need a refund for order #1234 and also want to update the shipping address for order #5678”), tool selection accuracy drops to 58%. The agent usually solves only one issue or mixes parameters across requests. What approach most effectively improves reliability for multi-issue requests? What approach is most effective?", "options": {"A": "Implement a preprocessing layer that uses a separate model call to decompose multi-issue messages into separate requests, handle each independently, and merge results.", "B": "Combine related tools into fewer universal tools.", "C": "Add few-shot examples to the prompt demonstrating correct reasoning and tool sequencing for multi-issue requests.", "D": "Implement response validation that detects incomplete answers and automatically reprompts the agent to resolve missed issues."}, "correct": "C", "explanation": "Few-shot examples that demonstrate correct reasoning and tool sequencing for multi-issue requests are most effective because the agent already performs well on single issues—what it needs is guidance on the pattern for decomposing and routing multiple issues and keeping parameters separated."}, {"id": "PL-Q48", "source": "paullarionov", "scenario": "Customer Support Agent", "domain": "D1", "task_statement": "1.x", "question": "Production logs show that for simple requests like “refund for order #1234,” your agent resolves the issue in 3–4 tool calls with 91% success. But for complex requests like “I was billed twice, my discount didn’t apply, and I want to cancel,” the agent averages 12+ tool calls with only 54% success—often investigating issues sequentially and fetching redundant customer data for each. What change most effectively improves handling of complex requests? What change is most effective?", "options": {"A": "Add explicit verification checkpoints between stages, requiring the agent to record progress after resolving each issue before moving to the next.", "B": "Reduce the number of tools by combining `get_customer`, `lookup_order`, and billing-related tools into a single `investigate_issue` tool.", "C": "Decompose the request into separate issues, then investigate each in parallel using shared customer context before synthesizing a final resolution.", "D": "Add few-shot examples to the system prompt demonstrating ideal tool-call sequences for various multi-faceted billing scenarios."}, "correct": "C", "explanation": "Decomposing into separate issues and investigating in parallel with shared customer context fixes both key problems: it eliminates redundant data retrieval by reusing shared context across issues and reduces total tool-call loops by parallelizing investigation before synthesizing a single resolution."}, {"id": "PL-Q50", "source": "paullarionov", "scenario": "Customer Support Agent", "domain": "D5", "task_statement": "5.x", "question": "After calling `get_customer` and `lookup_order`, the agent has all available system data but still faces uncertainty. Which situation is the most justified trigger for calling `escalate_to_human`? Which situation is most justified for escalation?", "options": {"A": "A customer wants to cancel an order shipped yesterday and arriving tomorrow. The agent should escalate because the customer might change their mind after receiving the package.", "B": "A customer claims they didn’t receive an order, but tracking shows it was delivered and signed for at their address three days ago. The agent should escalate because presenting contradictory evidence could harm the customer relationship.", "C": "A customer requests competitor price matching. Your policies allow price adjustments for price drops on your own site within 14 days, but say nothing about competitor prices. The agent should escalate for policy interpretation.", "D": "A customer message contains both a billing question and a product return. The agent should escalate so a human can coordinate both issues in one interaction."}, "correct": "C", "explanation": "This is a genuine policy gap: company rules cover price drops on your own site but do not address competitor price matching. The agent must not invent policy and should escalate for human judgment on how to interpret or extend existing rules."}, {"id": "PL-Q51", "source": "paullarionov", "scenario": "Customer Support Agent", "domain": "D1", "task_statement": "1.x", "question": "Production logs show that in 12% of cases your agent skips `get_customer` and calls `lookup_order` directly using only the customer-provided name, sometimes leading to misidentified accounts and incorrect refunds. What change most effectively fixes this reliability problem? What change is most effective?", "options": {"A": "Add few-shot examples showing that the agent always calls `get_customer` first, even when customers voluntarily provide order details.", "B": "Implement a routing classifier that analyzes each request and enables only a subset of tools appropriate for that request type.", "C": "Add a programmatic precondition that blocks `lookup_order` and `process_refund` until `get_customer` returns a verified customer identifier.", "D": "Str ete criteria—such as policy context, timelines, and next steps—before presenting it. This catches case-specific gaps without human oversight."}, {"id": "PL-Q53", "source": "paullarionov", "scenario": "Customer Support Agent", "domain": "D1", "task_statement": "1.x", "question": "Production metrics show your agent averages 4+ API loops per resolution. Analysis reveals Claude often requests `get_customer` and `lookup_order` in separate sequential turns even when both are needed initially. What is the most effective way to reduce the number of loops? What is the most effective way to reduce loops?", "options": {"A": "Implement speculative execution that automatically calls likely-needed tools in parallel with any requested tool and returns all results regardless of what was requested.", "B": "Increase `max_tokens` to give Claude more room to plan and naturally combine tool requests.", "C": "Create composite tools like `get_customer_with_orders` that bundle common lookup combinations into single calls.", "D": "Instruct Claude in the prompt to bundle tool requests into one turn and return all results together before the next API call."}, "correct": "D", "explanation": "Prompting Claude to bundle related tool requests into a single turn leverages its native ability to request multiple tools at once. It directly fixes the sequential-call pattern with minimal architectural change."}, {"id": "PL-Q54", "source": "paullarionov", "scenario": "Customer Support Agent", "domain": "D4", "task_statement": "4.x", "question": "Production logs show a pattern: customers reference specific amounts (e.g., “the 15% discount I mentioned”), but the agent responds with incorrect values. Investigation shows these details were mentioned 20+ turns ago and condensed into vague summaries like “promotional pricing was discussed.” What fix is most effective? What fix is most effective?", "options": {"A": "Increase the summarization threshold from 70% to 85% so conversations have more room before summarization triggers.", "B": "Store full conversation history in external storage and implement retrieval when the agent detects references like “as I mentioned.”", "C": "Extract transactional facts (amounts, dates, order numbers) into a persistent “case facts” block included in every prompt outside the summarized history.", "D": "Revise the summarization prompt to explicitly preserve all numbers, percentages, dates, and customer-stated expectations verbatim."}, "correct": "C", "explanation": "Summarization inherently loses precise details. Extracting transactional facts into a structured “case facts” block outside the summarized history preserves critical information so it’s reliably available in every prompt regardless of how many turns have been summarized."}, {"id": "PL-Q55", "source": "paullarionov", "scenario": "Customer Support Agent", "domain": "D1", "task_statement": "1.x", "question": "Your `get_customer` tool returns all matches when searching by name. Currently, when there are multiple results, Claude picks the customer with the most recent order, but production data shows this selects the wrong account 15% of the time for ambiguous matches. How should you address this? How should you address this?", "options": {"A": "Implement a confidence scoring system that acts autonomously above 85% confidence and requests clarification below the threshold.", "B": "Instruct Claude to request an additional identifier (email, phone, or order number) when `get_customer` returns multiple matches before taking any customer-specific action.", "C": "Modify `get_customer` to return only a single most-likely match based on a ranking algorithm, eliminating ambiguity.", "D": "Add few-shot examples to the prompt demonstrating correct reasoning and tool sequencing for ambiguous matches."}, "correct": "B", "explanation": "Asking the user for an additional identifier is the most reliable way to resolve ambiguity because the user has definitive knowledge of their identity. One extra conversational turn is a small price to pay to eliminate a 15% error rate caused by choosing the wrong account."}, {"id": "PL-Q56", "source": "paullarionov", "scenario": "Customer Support Agent", "domain": "D2", "task_statement": "2.x", "question": "Production logs show a consistent pattern: when customers include the word “account” in their message (e.g., “I want to check my account for an order I made yesterday”), the agent calls `get_customer` first 78% of the time. When customers phrase similar requests without “account” (e.g., “I want to check an order I made yesterday”), it calls `lookup_order` first 93% of the time. Tool descriptions are clear and unambiguous. What is the most likely root cause of this discrepancy? What is the most likely root cause?", "options": {"A": "The system prompt contains keyword-sensitive instructions that steer behavior based on terms like “account,” creating unintended tool-selection patterns.", "B": "The model’s base training creates associations between “account” terminology and customer-related operations that override tool descriptions.", "C": "The model needs more training data on multi-concept messages and should be fine-tuned on examples containing both account and order terminology.", "D": "Tool descriptions need additional negative examples specifying when NOT to use each tool to prevent this keyword-induced confusion."}, "correct": "A", "explanation": "The systematic keyword-driven pattern (78% vs 93%) strongly indicates explicit routing logic in the system prompt reacting to the word “account” and steering the agent toward customer-related tools. Since tool descriptions are already clear, the discrepancy points to prompt-level instructions creating unintended behavioral steering."}, {"id": "PL-Q57", "source": "paullarionov", "scenario": "Customer Support Agent", "domain": "D2", "task_statement": "2.x", "question": "Production logs show the agent often calls `get_customer` when users ask about orders (e.g., “check my order #12345”) instead of calling `lookup_order`. Both tools have minimal descriptions (“Gets customer information” / “Gets order details”) and accept similar-looking identifier formats. What is the most effective first step to improve tool selection reliability? What is the most effective first step?", "options": {"A": "Implement a routing layer that analyzes user input before each turn and preselects the correct tool based on detected keywords and ID patterns.", "B": "Combine both tools into a single `lookup_entity` that accepts any identifier and internally decides which backend to query.", "C": "Add few-shot examples to the system prompt demonstrating correct tool selection patterns, with 5–8 examples routing order-related queries to `lookup_order`.", "D": "Expand each tool’s description to include input formats, example queries, edge cases, and boundaries explaining when to use it versus similar tools."}, "correct": "D", "explanation": "Expanding tool descriptions with input formats, example queries, edge cases, and clear boundaries directly fixes the root cause—minimal descriptions that don’t give the LLM enough information to distinguish similar tools. It’s a low-effort, high-impact first step that improves the primary mechanism the LLM uses for tool selection."}, {"id": "PL-Q58", "source": "paullarionov", "scenario": "Customer Support Agent", "domain": "D1", "task_statement": "1.x", "question": "You are implementing the agent loop for your support agent. After each Claude API call, you must decide whether to continue the loop (run requested tools and call Claude again) or stop (present the final answer to the customer). What determines this decision? What determines this decision?", "options": {"A": "Check the `stop_reason` field in Claude’s response—continue if it is `tool_use` and stop if it is `end_turn`.", "B": "Parse Claude’s text for phrases like “I’m done” or “Can I help with anything else?”—natural language signals indicate task completion.", "C": "Set a maximum iteration count (e.g., 10 calls) and stop when reached, regardless of whether Claude indicates more work is needed.", "D": "Check whether the response contains assistant text content—if Claude generated explanatory text, the loop should terminate."}, "correct": "A", "explanation": "`stop_reason` is Claude’s explicit structured signal for loop control: `tool_use` indicates Claude wants to run a tool and receive results back, while `end_turn` indicates Claude has completed its response and the loop should end."}, {"id": "PL-Q59", "source": "paullarionov", "scenario": "Customer Support Agent", "domain": "D1", "task_statement": "1.x", "question": "Production logs show the agent misinterprets outputs from your MCP tools: Unix timestamps from `get_customer`, ISO 8601 dates from `lookup_order`, and numeric status codes (1=pending, 2=shipped). Some tools are third-party MCP servers you cannot modify. Which approach to data format normalization is most maintainable? Which approach is most maintainable?", "options": {"A": "Use a PostToolUse hook to intercept tool outputs and apply formatting transformations before the agent processes them.", "B": "Modify tools you control to return human-readable formats and create wrappers for third-party tools.", "C": "Create a `normalize_data` tool that the agent calls after every data retrieval to transform values.", "D": "Add detailed format documentation to the system prompt explaining each tool’s data conventions."}, "correct": "A", "explanation": "A PostToolUse hook provides a centralized, deterministic point to intercept and normalize all tool outputs—including third-party MCP server data—before the agent processes them. It’s more maintainable because transformations live in code and apply uniformly, rather than relying on LLM interpretation."}, {"id": "PL-Q60", "source": "paullarionov", "scenario": "Customer Support Agent", "domain": "D2", "task_statement": "2.x", "question": "Production logs show the agent sometimes chooses `get_customer` when `lookup_order` would be more appropriate, especially for ambiguous queries like “I need help with my recent purchase.” You decide to add few-shot examples to the system prompt to improve tool selection. Which approach most effectively addresses the problem? Which approach is most effective?", "options": {"A": "Add explicit “use when” and “don’t use when” guidance in each tool description covering ambiguous cases.", "B": "Add examples grouped by tool—all `get_customer` scenarios together, then all `lookup_order` scenarios.", "C": "Add 4–6 examples targeted at ambiguous scenarios, each with rationale for why one tool was chosen over plausible alternatives.", "D": "Add 10–15 examples of clear, unambiguous requests demonstrating correct tool choice for typical scenarios for each tool."}, "correct": "C", "explanation": "Targeting few-shot examples at the specific ambiguous scenarios where errors occur, with explicit rationale for why one tool is preferable to alternatives, teaches the model the comparative decision process needed for edge cases. This is more effective than generic examples or declarative rules."}];

// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
let state = {
  selectedDomains: new Set(['D1','D2','D3','D4','D5']),
  mode: 'immediate',
  order: 'shuffle',
  questions: [],
  currentIndex: 0,
  answers: [],
  correct: 0,
  wrong: 0,
  answered: false
};

const domainMeta = {
  D1: { title: 'Agentic Architecture & Orchestration', weight: '27%', badge: 'd1-badge', color: '#d97757' },
  D2: { title: 'Tool Design & MCP Integration', weight: '18%', badge: 'd2-badge', color: '#6a9bcc' },
  D3: { title: 'Claude Code Configuration & Workflows', weight: '20%', badge: 'd3-badge', color: '#788c5d' },
  D4: { title: 'Prompt Engineering & Structured Output', weight: '20%', badge: 'd4-badge', color: '#6b6a65' },
  D5: { title: 'Context Management & Reliability', weight: '15%', badge: 'd5-badge', color: '#5a87b5' }
};

// ═══════════════════════════════════════
// SETUP
// ═══════════════════════════════════════
function renderSetup() {
  const grid = document.getElementById('domainGrid');
  grid.innerHTML = '';

  // "All" card
  const allCard = document.createElement('div');
  allCard.className = 'domain-card selected';
  allCard.dataset.domain = 'ALL';
  allCard.innerHTML = `
    <div class="domain-check"></div>
    <div class="domain-info">
      <div class="domain-label">Todos os Domínios</div>
      <div class="domain-meta"><span>${QUESTIONS.length} questões</span></div>
    </div>`;
  allCard.onclick = () => toggleDomain('ALL', allCard);
  grid.appendChild(allCard);

  for (const [key, meta] of Object.entries(domainMeta)) {
    const count = QUESTIONS.filter(q => q.domain === key).length;
    const card = document.createElement('div');
    card.className = 'domain-card selected';
    card.dataset.domain = key;
    card.innerHTML = `
      <div class="domain-check"></div>
      <div class="domain-info">
        <div class="domain-label" style="display:flex;align-items:center;gap:8px;">
          <span class="domain-badge ${meta.badge}">${key}</span> ${meta.title}
        </div>
        <div class="domain-meta"><span>${meta.weight}</span><span>${count} questões</span></div>
      </div>`;
    card.onclick = () => toggleDomain(key, card);
    grid.appendChild(card);
  }
}

function toggleDomain(domain, card) {
  if (domain === 'ALL') {
    const allSelected = state.selectedDomains.size === 5;
    if (allSelected) {
      state.selectedDomains.clear();
    } else {
      state.selectedDomains = new Set(['D1','D2','D3','D4','D5']);
    }
  } else {
    if (state.selectedDomains.has(domain)) state.selectedDomains.delete(domain);
    else state.selectedDomains.add(domain);
  }
  // Update UI
  document.querySelectorAll('.domain-card').forEach(c => {
    const d = c.dataset.domain;
    if (d === 'ALL') {
      c.classList.toggle('selected', state.selectedDomains.size === 5);
    } else {
      c.classList.toggle('selected', state.selectedDomains.has(d));
    }
  });
  document.getElementById('startBtn').disabled = state.selectedDomains.size === 0;
}

function setMode(mode, btn) {
  state.mode = mode;
  btn.parentElement.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
}
function setOrder(order, btn) {
  state.order = order;
  btn.parentElement.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
}

// ═══════════════════════════════════════
// QUIZ
// ═══════════════════════════════════════
function startQuiz() {
  let qs = QUESTIONS.filter(q => state.selectedDomains.has(q.domain));
  if (state.order === 'shuffle') {
    for (let i = qs.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [qs[i], qs[j]] = [qs[j], qs[i]];
    }
  }
  state.questions = qs;
  state.currentIndex = 0;
  state.answers = new Array(qs.length).fill(null);
  state.correct = 0;
  state.wrong = 0;
  state.answered = false;

  document.getElementById('setupScreen').style.display = 'none';
  document.getElementById('questionScreen').style.display = 'block';
  document.getElementById('statsBar').style.display = 'flex';
  updateStats();
  renderQuestion();
}

function updateStats() {
  document.getElementById('statCurrent').textContent = state.currentIndex + 1;
  document.getElementById('statTotal').textContent = state.questions.length;
  document.getElementById('statCorrect').textContent = state.correct;
  document.getElementById('statWrong').textContent = state.wrong;
}

function renderQuestion() {
  const q = state.questions[state.currentIndex];
  const meta = domainMeta[q.domain];
  const pct = ((state.currentIndex) / state.questions.length * 100).toFixed(0);
  state.answered = false;

  const screen = document.getElementById('questionScreen');
  screen.innerHTML = `
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="q-meta">
      <span class="q-number">#${state.currentIndex + 1}</span>
      <span class="q-domain-tag ${meta.badge}" style="padding:3px 10px;border-radius:20px;font-size:11px;">${q.domain} — ${meta.title}</span>
      <span style="margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:11px;">${q.id}</span>
    </div>
    ${q.scenario ? `<div class="q-scenario">Cenário: ${q.scenario}</div>` : ''}
    <div class="q-text">${formatCode(q.question)}</div>
    <div class="options" id="optionsContainer">
      ${['A','B','C','D'].map(letter => `
        <div class="option" data-letter="${letter}" onclick="selectOption('${letter}')">
          <div class="option-letter">${letter}</div>
          <div class="option-text">${formatCode(q.options[letter])}</div>
        </div>`).join('')}
    </div>
    <div id="explanationContainer"></div>
    <div class="nav-row" id="navRow">
      ${state.mode === 'end' ? `<button class="nav-btn primary" id="confirmBtn" onclick="confirmAnswer()" disabled>Confirmar</button>` : ''}
    </div>`;
  updateStats();
}

function formatCode(text) {
  return text.replace(/`([^`]+)`/g, '<code>$1</code>')
             .replace(/"([^"]+)"/g, '"$1"')
             .replace(/--(\w+)/g, '<code>--$1</code>');
}

function selectOption(letter) {
  if (state.answered) return;
  document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
  document.querySelector(`.option[data-letter="${letter}"]`).classList.add('selected');
  state.answers[state.currentIndex] = letter;

  if (state.mode === 'immediate') {
    revealAnswer(letter);
  } else {
    const btn = document.getElementById('confirmBtn');
    if (btn) btn.disabled = false;
  }
}

function confirmAnswer() {
  const letter = state.answers[state.currentIndex];
  if (!letter) return;
  revealAnswer(letter);
}

function revealAnswer(letter) {
  state.answered = true;
  const q = state.questions[state.currentIndex];
  const isCorrect = letter === q.correct;
  if (isCorrect) state.correct++; else state.wrong++;

  document.querySelectorAll('.option').forEach(o => {
    o.classList.add('disabled');
    if (o.dataset.letter === q.correct) o.classList.add('correct');
    if (o.dataset.letter === letter && !isCorrect) o.classList.add('wrong');
  });

  const container = document.getElementById('explanationContainer');
  container.innerHTML = `
    <div class="explanation">
      <div class="explanation-header ${isCorrect ? 'explanation-correct' : 'explanation-wrong'}">
        <span class="explanation-icon">${isCorrect ? '✓' : '✗'}</span>
        ${isCorrect ? 'Correto!' : `Incorreto — resposta correta: ${q.correct}`}
      </div>
      <div class="explanation-text">${q.explanation}</div>
      <div class="explanation-task">Task Statement: ${q.task_statement} · Fonte: ${q.source}</div>
    </div>`;

  const navRow = document.getElementById('navRow');
  const isLast = state.currentIndex === state.questions.length - 1;
  navRow.innerHTML = isLast
    ? `<button class="nav-btn primary" onclick="showResults()">Ver Resultado Final</button>`
    : `<button class="nav-btn primary" onclick="nextQuestion()">Próxima →</button>`;
  updateStats();
}

function nextQuestion() {
  state.currentIndex++;
  renderQuestion();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ═══════════════════════════════════════
// RESULTS
// ═══════════════════════════════════════
function showResults() {
  document.getElementById('questionScreen').style.display = 'none';
  document.getElementById('resultsScreen').style.display = 'block';

  const total = state.questions.length;
  const pct = Math.round((state.correct / total) * 100);
  const scaled = Math.round(100 + (state.correct / total) * 900);
  const pass = scaled >= 720;

  // Domain breakdown
  const domainStats = {};
  state.questions.forEach((q, i) => {
    if (!domainStats[q.domain]) domainStats[q.domain] = { correct: 0, total: 0 };
    domainStats[q.domain].total++;
    if (state.answers[i] === q.correct) domainStats[q.domain].correct++;
  });

  let domainRows = '';
  for (const [d, s] of Object.entries(domainStats)) {
    const dp = Math.round((s.correct / s.total) * 100);
    const meta = domainMeta[d];
    const barColor = dp >= 70 ? 'var(--accent-green)' : dp >= 50 ? 'var(--accent-orange)' : 'var(--accent-red)';
    domainRows += `
      <div class="domain-result-row">
        <span class="domain-badge ${meta.badge}" style="width:32px;text-align:center;">${d}</span>
        <span class="domain-result-label">${meta.title}</span>
        <div class="domain-result-bar"><div class="domain-result-fill" style="width:${dp}%;background:${barColor}"></div></div>
        <span class="domain-result-pct" style="color:${barColor}">${s.correct}/${s.total}</span>
      </div>`;
  }

  // Wrong answers review
  let wrongReview = '';
  state.questions.forEach((q, i) => {
    if (state.answers[i] !== q.correct) {
      wrongReview += `
        <div class="review-item review-wrong">
          <div class="review-q"><strong>${q.id}</strong> — ${q.question.substring(0, 120)}...</div>
          <div class="review-answer">Sua resposta: <strong>${state.answers[i] || '—'}</strong> · Correta: <strong>${q.correct}</strong></div>
        </div>`;
    }
  });

  document.getElementById('resultsScreen').innerHTML = `
    <div class="results-header">
      <div class="results-label">Score Escalado</div>
      <div class="results-score ${pass ? 'results-pass' : 'results-fail'}">${scaled}</div>
      <div class="results-verdict ${pass ? 'verdict-pass' : 'verdict-fail'}">${pass ? '✓ APROVADO' : '✗ REPROVADO'} · ${state.correct}/${total} (${pct}%) · Mínimo: 720</div>
    </div>
    <div class="domain-results">${domainRows}</div>
    ${wrongReview ? `
      <div class="review-section">
        <div class="review-title">Questões erradas — revise estes temas</div>
        ${wrongReview}
      </div>` : '<div style="text-align:center;color:var(--accent-green);font-size:18px;font-weight:600;padding:20px;">🎉 Perfeito! Nenhuma questão errada!</div>'}
    <div class="nav-row" style="margin-top:32px;">
      <button class="nav-btn" onclick="backToSetup()">← Voltar ao Menu</button>
      <button class="nav-btn primary" onclick="retryWrong()">Refazer Erradas</button>
    </div>`;
}

function backToSetup() {
  document.getElementById('resultsScreen').style.display = 'none';
  document.getElementById('setupScreen').style.display = 'block';
  document.getElementById('statsBar').style.display = 'none';
}

function retryWrong() {
  const wrongQs = state.questions.filter((q, i) => state.answers[i] !== q.correct);
  if (wrongQs.length === 0) { backToSetup(); return; }
  // Shuffle wrong questions
  for (let i = wrongQs.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [wrongQs[i], wrongQs[j]] = [wrongQs[j], wrongQs[i]];
  }
  state.questions = wrongQs;
  state.currentIndex = 0;
  state.answers = new Array(wrongQs.length).fill(null);
  state.correct = 0;
  state.wrong = 0;
  state.answered = false;
  document.getElementById('resultsScreen').style.display = 'none';
  document.getElementById('questionScreen').style.display = 'block';
  updateStats();
  renderQuestion();
}

// INIT
renderSetup();
</script>
</body>
</html>
