<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<meta name="twitter:image" content="https://felipebossolani.github.io/claude-arch/og-image.png" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Poppins:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
.results-label, .review-title {
  font-family: 'Poppins', Arial, sans-serif;
}
.stats-bar {
  display: flex; gap: 20px; align-items: center; font-size: 13px;
}
.stat { display: flex; align-items: center; gap: 6px; color: var(--text-secondary); }
.stat-val { font-weight: 600; color: var(--text-primary); font-family: 'JetBrains Mono', monospace; }
.stat-correct .stat-val { color: var(--accent-green); }
.stat-wrong .stat-val { color: var(--accent-red); }

/* Setup screen */
.setup-screen { padding: 48px 0; max-width: 660px; }
.setup-title {
  font-size: 28px; font-weight: 700; letter-spacing: -1px;
  margin-bottom: 8px;
}
.setup-subtitle {
  color: var(--text-secondary); margin-bottom: 36px; font-size: 15px;
  font-style: italic;
}
.domain-grid { display: grid; gap: 0; margin-bottom: 32px; }
.domain-card {
  display: flex; align-items: center; gap: 14px;
  padding: 12px 0; border-bottom: 1px solid var(--border);
  cursor: pointer; transition: all 0.15s;
  user-select: none;
}
.domain-card:last-child { border-bottom: none; }
.domain-card:hover { background: var(--bg-hover); margin: 0 -12px; padding: 12px 12px; border-radius: var(--radius); }
.domain-card.selected .domain-check { background: var(--accent-orange); border-color: var(--accent-orange); }
.domain-card.selected .domain-check::after { opacity: 1; }
.domain-check {
  width: 20px; height: 20px; border-radius: 4px;
  border: 2px solid var(--border-active); flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; position: relative;
}
.domain-check::after {
  content: '✓'; color: white; font-size: 13px; font-weight: 700;
  opacity: 0; transition: opacity 0.15s;
}
.domain-info { flex: 1; }
.domain-label {
  font-weight: 500; font-size: 14px; margin-bottom: 1px;
}
.domain-meta { font-size: 12px; color: var(--text-muted); display: flex; gap: 12px; }
.domain-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px; font-weight: 600; color: var(--accent-orange);
  width: 28px; flex-shrink: 0;
}

.mode-section { margin-bottom: 28px; }
.mode-label {
  font-size: 13px; font-weight: 600; margin-bottom: 10px;
  color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px;
  font-family: 'Poppins', Arial, sans-serif;
}
.mode-options { display: flex; gap: 8px; flex-wrap: wrap; }
.mode-btn {
  padding: 8px 16px; border-radius: var(--radius);
  border: 1px solid var(--border); background: transparent;
  color: var(--text-primary); cursor: pointer; font-size: 14px;
  font-family: 'Lora', Georgia, serif; font-weight: 500;
  transition: all 0.15s;
}
.mode-btn:hover { border-color: var(--border-active); }
.mode-btn.selected { border-color: var(--accent-orange); color: var(--accent-orange); }
.exam-badge {
  display: inline-block; font-size: 10px; font-weight: 600; letter-spacing: 0.3px;
  color: var(--accent-green); opacity: 0.9;
  font-family: 'JetBrains Mono', monospace;
}

.start-btn {
  padding: 14px 48px; border-radius: var(--radius);
  border: none; background: var(--accent-orange);
  color: white; font-size: 16px; font-weight: 600; cursor: pointer;
  font-family: 'Poppins', Arial, sans-serif; transition: background 0.15s;
  letter-spacing: -0.3px;
}
.start-btn:hover { background: #c4694c; }
.start-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* Question screen */
.question-screen { padding: 20px 0; }
.progress-bar {
  height: 4px; background: var(--border); border-radius: 2px;
  margin-bottom: 24px; overflow: hidden;
}
.progress-fill {
  height: 100%; border-radius: 2px; transition: width 0.4s ease;
  background: var(--accent-orange);
}
.q-meta {
  display: flex; align-items: center; gap: 12px; margin-bottom: 16px;
  font-size: 13px; color: var(--text-muted);
}
.q-number { font-weight: 600; color: var(--text-secondary); font-family: 'JetBrains Mono', monospace; }
.q-domain-tag {
  padding: 2px 10px; border-radius: 20px; font-size: 11px; font-weight: 600;
}
.q-scenario {
  padding: 12px 16px; background: rgba(106,155,204,0.06);
  border-left: 3px solid var(--accent-blue); border-radius: 0 8px 8px 0;
  margin-bottom: 20px; font-size: 13px; color: var(--text-secondary);
}
.q-text {
  font-size: 17px; font-weight: 500; line-height: 1.65;
  margin-bottom: 24px; letter-spacing: -0.2px;
}
.q-text code {
  background: rgba(106,155,204,0.1); padding: 2px 6px; border-radius: 4px;
  font-size: 14px; color: #5a87b5;
}

/* Options */
.options { display: grid; gap: 10px; margin-bottom: 24px; }
.option {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px 20px;
  cursor: pointer; transition: all 0.2s;
  display: flex; gap: 14px; align-items: flex-start;
}
.option:hover:not(.disabled) { border-color: var(--border-active); background: var(--bg-hover); }
.option.selected { border-color: var(--accent-orange); background: rgba(217,119,87,0.05); }
.option.correct { border-color: var(--accent-green); background: rgba(120,140,93,0.05); }
.option.wrong { border-color: var(--accent-red); background: rgba(196,92,74,0.05); }
.option.disabled { cursor: default; opacity: 0.7; }
.option.disabled.correct { opacity: 1; }
.option.disabled.selected.wrong { opacity: 1; }
.option-letter {
  width: 28px; height: 28px; border-radius: 8px;
  background: var(--bg-primary); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-weight: 600; font-size: 13px; flex-shrink: 0;
  font-family: 'JetBrains Mono', monospace;
  transition: all 0.2s;
}
.option.selected .option-letter { background: var(--accent-orange); border-color: var(--accent-orange); color: white; }
.option.correct .option-letter { background: var(--accent-green); border-color: var(--accent-green); color: white; }
.option.wrong .option-letter { background: var(--accent-red); border-color: var(--accent-red); color: white; }
.option-text { font-size: 14px; line-height: 1.55; padding-top: 3px; }

/* Explanation */
.explanation {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px;
  margin-bottom: 24px; animation: fadeIn 0.3s ease;
}
.explanation-header {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 10px; font-weight: 600; font-size: 14px;
  font-family: 'Poppins', Arial, sans-serif;
}
.explanation-icon { font-size: 18px; }
.explanation-correct { color: var(--accent-green); }
.explanation-wrong { color: var(--accent-red); }
.explanation-text { font-size: 14px; color: var(--text-secondary); line-height: 1.6; }
.explanation-task {
  margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border);
  font-size: 12px; color: var(--text-muted);
}

.nav-btn {
  padding: 12px 32px; border-radius: var(--radius);
  border: 1px solid var(--accent-orange); background: transparent;
  color: var(--accent-orange); font-size: 14px; font-weight: 600;
  cursor: pointer; font-family: 'Poppins', Arial, sans-serif;
  transition: all 0.2s;
}
.nav-btn:hover { background: rgba(217,119,87,0.05); }
.nav-btn.primary { background: var(--accent-orange); color: white; border-color: var(--accent-orange); }
.nav-btn.primary:hover { background: #c4694c; }
.nav-row {
  display: flex; justify-content: flex-end; gap: 12px;
  position: sticky; bottom: 0; z-index: 50;
  background: var(--bg-primary); padding: 16px 0;
  border-top: 1px solid var(--border);
}

/* Results */
.results-screen { padding: 40px 0; }
.results-header { text-align: center; margin-bottom: 40px; }
.results-score {
  font-size: 72px; font-weight: 700; font-family: 'Poppins', Arial, sans-serif;
  letter-spacing: -3px; margin-bottom: 8px;
}
.results-pass { color: var(--accent-green); }
.results-fail { color: var(--accent-red); }
.results-label { font-size: 18px; color: var(--text-secondary); margin-bottom: 4px; }
.results-verdict {
  font-size: 14px; padding: 6px 16px; border-radius: 20px;
  display: inline-block; font-weight: 600;
  font-family: 'Poppins', Arial, sans-serif;
}
.verdict-pass { background: rgba(120,140,93,0.15); color: var(--accent-green); }
.verdict-fail { background: rgba(196,92,74,0.15); color: var(--accent-red); }

.domain-results { margin-bottom: 32px; }
.domain-result-row {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 0; border-bottom: 1px solid var(--border);
}
.domain-result-label { flex: 1; font-size: 14px; }
.domain-result-bar { width: 200px; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
.domain-result-fill { height: 100%; border-radius: 3px; transition: width 0.6s ease; }
.domain-result-pct { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 600; width: 45px; text-align: right; }

.review-section { margin-top: 32px; }
.review-title { font-size: 18px; font-weight: 600; margin-bottom: 16px; }
.review-item {
  background: var(--bg-card); border-radius: var(--radius);
  padding: 16px; margin-bottom: 8px; border-left: 3px solid;
}
.review-item.review-correct { border-color: var(--accent-green); }
.review-item.review-wrong { border-color: var(--accent-red); }
.review-q { font-size: 13px; color: var(--text-secondary); margin-bottom: 6px; }
.review-answer { font-size: 13px; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

@media (max-width: 640px) {
  .header-inner { gap: 12px; }
  .stats-bar { flex-wrap: wrap; gap: 12px; }
  .setup-title { font-size: 24px; }
  .q-text { font-size: 15px; }
  .results-score { font-size: 56px; }
  .domain-result-bar { width: 120px; }
  .mode-options { flex-direction: column; }
}
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <a href="index.html" class="logo">
      <img class="logo-icon" src="logo.png" alt="Claude Arch" />
    </a>
    <div class="stats-bar" id="statsBar" style="display:none;" aria-live="polite">
      <div class="stat"><span>Q</span> <span class="stat-val" id="statCurrent">0</span>/<span class="stat-val" id="statTotal">0</span></div>
      <div class="stat stat-correct">✓ <span class="stat-val" id="statCorrect">0</span></div>
      <div class="stat stat-wrong">✗ <span class="stat-val" id="statWrong">0</span></div>
    </div>
    <button class="nav-toggle" aria-label="Menu" onclick="document.querySelector('.nav').classList.toggle('open')">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <nav class="nav" aria-label="Navegação principal">
      <a href="simulado.html" class="nav-link nav-link--active">Simulado</a>
      <a href="faq.html" class="nav-link">FAQ</a>
    </nav>
  </div>
</header>

<main class="container">
  <!-- Setup Screen -->
  <div id="setupScreen" class="setup-screen">
    <h1 class="setup-title">Simulado Interativo</h1>
    <div class="setup-subtitle">Escolha os domínios e o modo de estudo. 337 questões cenário-based no formato do exame real.</div>
    <div id="loadingState" style="text-align:center;padding:40px 0;color:var(--text-muted);">Carregando questões...</div>

    <div class="mode-label">Domínios</div>
    <div class="domain-grid" id="domainGrid"></div>

    <div class="mode-section">
      <div class="mode-label">Modo de feedback</div>
      <div class="mode-options">
        <button class="mode-btn" data-mode="immediate" onclick="setMode('immediate', this)">Feedback imediato</button>
        <button class="mode-btn selected" data-mode="end" onclick="setMode('end', this)">Resultado no final</button>
      </div>
    </div>

    <div class="mode-section">
      <div class="mode-label">Número de questões</div>
      <div class="mode-options">
        <button class="mode-btn" data-count="20" onclick="setCount(20, this)">20</button>
        <button class="mode-btn" data-count="40" onclick="setCount(40, this)">40</button>
        <button class="mode-btn selected" data-count="60" onclick="setCount(60, this)">60 <span class="exam-badge">= exame real</span></button>
        <button class="mode-btn" data-count="0" onclick="setCount(0, this)">Todas</button>
      </div>
    </div>

    <div class="mode-section">
      <div class="mode-label">Ordem das questões</div>
      <div class="mode-options">
        <button class="mode-btn selected" data-order="shuffle" onclick="setOrder('shuffle', this)">Embaralhar</button>
        <button class="mode-btn" data-order="sequential" onclick="setOrder('sequential', this)">Sequencial por domínio</button>
      </div>
    </div>

    <button class="start-btn" id="startBtn" onclick="startQuiz()">Iniciar Simulado</button>
  </div>

  <!-- Question Screen -->
  <div id="questionScreen" class="question-screen" style="display:none;" tabindex="-1"></div>

  <!-- Results Screen -->
  <div id="resultsScreen" class="results-screen" style="display:none;"></div>
</main>

<script>
// ═══════════════════════════════════════
// QUESTION BANK — embedded inline
// ═══════════════════════════════════════
let QUESTIONS = [];

fetch("all_questions.json")
  .then(r => r.json())
  .then(data => { QUESTIONS = data; document.getElementById('loadingState').style.display='none'; renderSetup(); })
  .catch(err => {
    const el = document.getElementById("setupScreen");
    el.innerHTML = '<div style="text-align:center;padding:60px 0;color:var(--accent-red)"><h2>Erro ao carregar questões</h2><p id="errorMsg"></p></div>';
    document.getElementById("errorMsg").textContent = err.message;
  });

// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
let state = {
  selectedDomains: new Set(['D1','D2','D3','D4','D5']),
  mode: 'end',
  questionCount: 60,
  order: 'shuffle',
  questions: [],
  currentIndex: 0,
  answers: [],
  correct: 0,
  wrong: 0,
  answered: false
};

const domainMeta = {
  D1: { title: 'Agentic Architecture & Orchestration', weight: '27%', badge: 'd1-badge', color: '#d97757' },
  D2: { title: 'Tool Design & MCP Integration', weight: '18%', badge: 'd2-badge', color: '#6a9bcc' },
  D3: { title: 'Claude Code Configuration & Workflows', weight: '20%', badge: 'd3-badge', color: '#788c5d' },
  D4: { title: 'Prompt Engineering & Structured Output', weight: '20%', badge: 'd4-badge', color: '#6b6a65' },
  D5: { title: 'Context Management & Reliability', weight: '15%', badge: 'd5-badge', color: '#5a87b5' }
};

// ═══════════════════════════════════════
// SETUP
// ═══════════════════════════════════════
function renderSetup() {
  const grid = document.getElementById('domainGrid');
  grid.innerHTML = '';

  // "All" card
  const allCard = document.createElement('div');
  allCard.className = 'domain-card selected';
  allCard.dataset.domain = 'ALL';
  allCard.innerHTML = `
    <div class="domain-check"></div>
    <div class="domain-info">
      <div class="domain-label">Todos os Domínios</div>
      <div class="domain-meta"><span>${QUESTIONS.length} questões</span></div>
    </div>`;
  allCard.onclick = () => toggleDomain('ALL', allCard);
  grid.appendChild(allCard);

  for (const [key, meta] of Object.entries(domainMeta)) {
    const count = QUESTIONS.filter(q => q.domain === key).length;
    const card = document.createElement('div');
    card.className = 'domain-card selected';
    card.dataset.domain = key;
    card.innerHTML = `
      <div class="domain-check"></div>
      <div class="domain-info">
        <div class="domain-label" style="display:flex;align-items:center;gap:8px;">
          <span class="domain-badge ${meta.badge}">${key}</span> ${meta.title}
        </div>
        <div class="domain-meta"><span>${meta.weight}</span><span>${count} questões</span></div>
      </div>`;
    card.onclick = () => toggleDomain(key, card);
    grid.appendChild(card);
  }
}

function toggleDomain(domain, card) {
  if (domain === 'ALL') {
    const allSelected = state.selectedDomains.size === 5;
    if (allSelected) {
      state.selectedDomains.clear();
    } else {
      state.selectedDomains = new Set(['D1','D2','D3','D4','D5']);
    }
  } else {
    if (state.selectedDomains.has(domain)) state.selectedDomains.delete(domain);
    else state.selectedDomains.add(domain);
  }
  // Update UI
  document.querySelectorAll('.domain-card').forEach(c => {
    const d = c.dataset.domain;
    if (d === 'ALL') {
      c.classList.toggle('selected', state.selectedDomains.size === 5);
    } else {
      c.classList.toggle('selected', state.selectedDomains.has(d));
    }
  });
  document.getElementById('startBtn').disabled = state.selectedDomains.size === 0;
}

function setCount(count, btn) {
  state.questionCount = count;
  btn.parentElement.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
}
function setMode(mode, btn) {
  state.mode = mode;
  btn.parentElement.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
}
function setOrder(order, btn) {
  state.order = order;
  btn.parentElement.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
}

// ═══════════════════════════════════════
// QUIZ
// ═══════════════════════════════════════
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function selectProportional(questions, count) {
  const byDomain = {};
  questions.forEach(q => {
    if (!byDomain[q.domain]) byDomain[q.domain] = [];
    byDomain[q.domain].push(q);
  });
  const domains = Object.keys(byDomain);
  const total = questions.length;
  let result = [];
  let remaining = count;
  domains.forEach((d, i) => {
    const share = i < domains.length - 1
      ? Math.round(count * byDomain[d].length / total)
      : remaining;
    const picked = shuffle([...byDomain[d]]).slice(0, share);
    result = result.concat(picked);
    remaining -= picked.length;
  });
  return result;
}

function startQuiz() {
  let qs = QUESTIONS.filter(q => state.selectedDomains.has(q.domain));
  if (state.questionCount > 0 && qs.length > state.questionCount) {
    qs = selectProportional(qs, state.questionCount);
  }
  if (state.order === 'shuffle') {
    shuffle(qs);
  }
  state.questions = qs;
  state.currentIndex = 0;
  state.answers = new Array(qs.length).fill(null);
  state.correct = 0;
  state.wrong = 0;
  state.answered = false;

  document.getElementById('setupScreen').style.display = 'none';
  document.getElementById('questionScreen').style.display = 'block';
  document.getElementById('statsBar').style.display = 'flex';
  updateStats();
  renderQuestion();
}

function updateStats() {
  document.getElementById('statCurrent').textContent = state.currentIndex + 1;
  document.getElementById('statTotal').textContent = state.questions.length;
  document.getElementById('statCorrect').textContent = state.correct;
  document.getElementById('statWrong').textContent = state.wrong;
}

function renderQuestion() {
  const q = state.questions[state.currentIndex];
  const meta = domainMeta[q.domain];
  const pct = ((state.currentIndex) / state.questions.length * 100).toFixed(0);
  state.answered = false;

  const screen = document.getElementById('questionScreen');
  screen.innerHTML = `
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="q-meta">
      <span class="q-number">#${state.currentIndex + 1}</span>
      <span class="q-domain-tag ${meta.badge}" style="padding:3px 10px;border-radius:20px;font-size:11px;">${q.domain} — ${meta.title}</span>
      <span style="margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:11px;">${q.id}</span>
    </div>
    ${q.scenario ? `<div class="q-scenario">Cenário: ${q.scenario}</div>` : ''}
    <div class="q-text">${formatCode(q.question)}</div>
    <div class="options" id="optionsContainer">
      ${['A','B','C','D'].map(letter => `
        <div class="option" data-letter="${letter}" onclick="selectOption('${letter}')">
          <div class="option-letter">${letter}</div>
          <div class="option-text">${formatCode(q.options[letter])}</div>
        </div>`).join('')}
    </div>
    <div id="explanationContainer"></div>
    <div class="nav-row" id="navRow">
      ${state.mode === 'end' ? `<button class="nav-btn primary" id="confirmBtn" onclick="confirmAnswer()" disabled>Confirmar</button>` : ''}
    </div>`;
  updateStats();
}

function formatCode(text) {
  return text.replace(/`([^`]+)`/g, '<code>$1</code>')
             .replace(/"([^"]+)"/g, '"$1"')
             .replace(/--(\w+)/g, '<code>--$1</code>');
}

function selectOption(letter) {
  if (state.answered) return;
  document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
  document.querySelector(`.option[data-letter="${letter}"]`).classList.add('selected');
  state.answers[state.currentIndex] = letter;

  if (state.mode === 'immediate') {
    revealAnswer(letter);
  } else {
    const btn = document.getElementById('confirmBtn');
    if (btn) btn.disabled = false;
  }
}

function confirmAnswer() {
  const letter = state.answers[state.currentIndex];
  if (!letter) return;
  revealAnswer(letter);
}

function revealAnswer(letter) {
  state.answered = true;
  const q = state.questions[state.currentIndex];
  const isCorrect = letter === q.correct;
  if (isCorrect) state.correct++; else state.wrong++;

  document.querySelectorAll('.option').forEach(o => {
    o.classList.add('disabled');
    if (o.dataset.letter === q.correct) o.classList.add('correct');
    if (o.dataset.letter === letter && !isCorrect) o.classList.add('wrong');
  });

  const container = document.getElementById('explanationContainer');
  container.innerHTML = `
    <div class="explanation">
      <div class="explanation-header ${isCorrect ? 'explanation-correct' : 'explanation-wrong'}">
        <span class="explanation-icon">${isCorrect ? '✓' : '✗'}</span>
        ${isCorrect ? 'Correto!' : `Incorreto — resposta correta: ${q.correct}`}
      </div>
      <div class="explanation-text">${q.explanation}</div>
      <div class="explanation-task">Task Statement: ${q.task_statement} · Fonte: ${q.source}</div>
    </div>`;

  const navRow = document.getElementById('navRow');
  const isLast = state.currentIndex === state.questions.length - 1;
  navRow.innerHTML = isLast
    ? `<button class="nav-btn primary" onclick="showResults()">Ver Resultado Final</button>`
    : `<button class="nav-btn primary" onclick="nextQuestion()">Próxima →</button>`;
  updateStats();
}

function nextQuestion() {
  state.currentIndex++;
  renderQuestion();
  window.scrollTo({ top: 0, behavior: 'smooth' });
  document.getElementById('questionScreen').focus();
}

// ═══════════════════════════════════════
// RESULTS
// ═══════════════════════════════════════
function showResults() {
  document.getElementById('questionScreen').style.display = 'none';
  document.getElementById('resultsScreen').style.display = 'block';

  const total = state.questions.length;
  const pct = Math.round((state.correct / total) * 100);
  const scaled = Math.round(100 + (state.correct / total) * 900);
  const pass = scaled >= 720;

  // Domain breakdown
  const domainStats = {};
  state.questions.forEach((q, i) => {
    if (!domainStats[q.domain]) domainStats[q.domain] = { correct: 0, total: 0 };
    domainStats[q.domain].total++;
    if (state.answers[i] === q.correct) domainStats[q.domain].correct++;
  });

  let domainRows = '';
  for (const [d, s] of Object.entries(domainStats)) {
    const dp = Math.round((s.correct / s.total) * 100);
    const meta = domainMeta[d];
    const barColor = dp >= 70 ? 'var(--accent-green)' : dp >= 50 ? 'var(--accent-orange)' : 'var(--accent-red)';
    domainRows += `
      <div class="domain-result-row">
        <span class="domain-badge ${meta.badge}" style="width:32px;text-align:center;">${d}</span>
        <span class="domain-result-label">${meta.title}</span>
        <div class="domain-result-bar"><div class="domain-result-fill" style="width:${dp}%;background:${barColor}"></div></div>
        <span class="domain-result-pct" style="color:${barColor}">${s.correct}/${s.total}</span>
      </div>`;
  }

  // Wrong answers review
  let wrongReview = '';
  state.questions.forEach((q, i) => {
    if (state.answers[i] !== q.correct) {
      wrongReview += `
        <div class="review-item review-wrong">
          <div class="review-q"><strong>${q.id}</strong> — ${q.question.substring(0, 120)}...</div>
          <div class="review-answer">Sua resposta: <strong>${state.answers[i] || '—'}</strong> · Correta: <strong>${q.correct}</strong></div>
        </div>`;
    }
  });

  document.getElementById('resultsScreen').innerHTML = `
    <div class="results-header">
      <div class="results-label">Score Escalado</div>
      <div class="results-score ${pass ? 'results-pass' : 'results-fail'}">${scaled}</div>
      <div class="results-verdict ${pass ? 'verdict-pass' : 'verdict-fail'}">${pass ? '✓ APROVADO' : '✗ REPROVADO'} · ${state.correct}/${total} (${pct}%) · Mínimo: 720</div>
    </div>
    <div class="domain-results">${domainRows}</div>
    ${wrongReview ? `
      <div class="review-section">
        <div class="review-title">Questões erradas — revise estes temas</div>
        ${wrongReview}
      </div>` : '<div style="text-align:center;color:var(--accent-green);font-size:18px;font-weight:600;padding:20px;">🎉 Perfeito! Nenhuma questão errada!</div>'}
    <div class="nav-row" style="margin-top:32px;">
      <button class="nav-btn" onclick="backToSetup()">← Voltar ao Menu</button>
      <button class="nav-btn primary" onclick="retryWrong()">Refazer Erradas</button>
    </div>`;
}

function backToSetup() {
  document.getElementById('resultsScreen').style.display = 'none';
  document.getElementById('setupScreen').style.display = 'block';
  document.getElementById('statsBar').style.display = 'none';
}

function retryWrong() {
  const wrongQs = state.questions.filter((q, i) => state.answers[i] !== q.correct);
  if (wrongQs.length === 0) { backToSetup(); return; }
  // Shuffle wrong questions
  for (let i = wrongQs.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [wrongQs[i], wrongQs[j]] = [wrongQs[j], wrongQs[i]];
  }
  state.questions = wrongQs;
  state.currentIndex = 0;
  state.answers = new Array(wrongQs.length).fill(null);
  state.correct = 0;
  state.wrong = 0;
  state.answered = false;
  document.getElementById('resultsScreen').style.display = 'none';
  document.getElementById('questionScreen').style.display = 'block';
  updateStats();
  renderQuestion();
}

// Warn before leaving during active quiz
window.addEventListener('beforeunload', e => {
  const resultsVisible = document.getElementById('resultsScreen').style.display !== 'none';
  if (state.questions.length > 0 && !resultsVisible) {
    e.preventDefault();
  }
});
</script>
