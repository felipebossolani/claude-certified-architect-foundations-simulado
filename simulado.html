<style>
:root {
  --bg-primary: #faf9f5;
  --bg-card: #ffffff;
  --bg-hover: #f5f4f0;
  --text-primary: #141413;
  --text-secondary: #6b6a65;
  --text-muted: #b0aea5;
  --accent-orange: #d97757;
  --accent-blue: #6a9bcc;
  --accent-green: #788c5d;
  --accent-red: #c45c4a;
  --border: #e8e6dc;
  --border-active: #b0aea5;
  --radius: 8px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Lora', Georgia, serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  line-height: 1.6;
}
h1, h2, h3, h4, h5, h6, .setup-title, .logo-text, .results-label, .review-title {
  font-family: 'Poppins', Arial, sans-serif;
}
code, .mono { font-family: 'JetBrains Mono', monospace; }

/* Header */
.header {
  position: sticky; top: 0; z-index: 100;
  background: var(--bg-primary);
  border-bottom: 1px solid var(--border);
  padding: 14px 0;
}
.header-inner {
  max-width: 860px; margin: 0 auto; padding: 0 24px;
  display: flex; align-items: center; justify-content: space-between;
}
.logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
.logo-icon { width: 32px; height: 32px; border-radius: 6px; object-fit: contain; }
.logo-text { font-size: 15px; font-weight: 600; color: var(--text-primary); letter-spacing: -0.3px; }
.nav { display: flex; align-items: center; gap: 24px; }
.nav-link {
  font-size: 14px; font-weight: 500; color: var(--text-secondary);
  text-decoration: none; transition: color 0.15s;
}
.nav-link:hover { color: var(--text-primary); }
.stats-bar {
  display: flex; gap: 20px; align-items: center; font-size: 13px;
}
.stat { display: flex; align-items: center; gap: 6px; color: var(--text-secondary); }
.stat-val { font-weight: 600; color: var(--text-primary); font-family: 'JetBrains Mono', monospace; }
.stat-correct .stat-val { color: var(--accent-green); }
.stat-wrong .stat-val { color: var(--accent-red); }

/* Main container */
.container { max-width: 860px; margin: 0 auto; padding: 24px; }

/* Setup screen */
.setup-screen { padding: 48px 0; max-width: 660px; }
.setup-title {
  font-family: 'Poppins', Arial, sans-serif;
  font-size: 28px; font-weight: 700; letter-spacing: -1px;
  margin-bottom: 8px;
}
.setup-subtitle {
  color: var(--text-secondary); margin-bottom: 36px; font-size: 15px;
  font-style: italic;
}
.domain-grid { display: grid; gap: 0; margin-bottom: 32px; }
.domain-card {
  display: flex; align-items: center; gap: 14px;
  padding: 12px 0; border-bottom: 1px solid var(--border);
  cursor: pointer; transition: all 0.15s;
  user-select: none;
}
.domain-card:last-child { border-bottom: none; }
.domain-card:hover { background: var(--bg-hover); margin: 0 -12px; padding: 12px 12px; border-radius: var(--radius); }
.domain-card.selected .domain-check { background: var(--accent-orange); border-color: var(--accent-orange); }
.domain-card.selected .domain-check::after { opacity: 1; }
.domain-check {
  width: 20px; height: 20px; border-radius: 4px;
  border: 2px solid var(--border-active); flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; position: relative;
}
.domain-check::after {
  content: '✓'; color: white; font-size: 13px; font-weight: 700;
  opacity: 0; transition: opacity 0.15s;
}
.domain-info { flex: 1; }
.domain-label {
  font-weight: 500; font-size: 14px; margin-bottom: 1px;
}
.domain-meta { font-size: 12px; color: var(--text-muted); display: flex; gap: 12px; }
.domain-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px; font-weight: 600; color: var(--accent-orange);
  width: 28px; flex-shrink: 0;
}

.mode-section { margin-bottom: 28px; }
.mode-label {
  font-size: 13px; font-weight: 600; margin-bottom: 10px;
  color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px;
  font-family: 'Poppins', Arial, sans-serif;
}
.mode-options { display: flex; gap: 8px; flex-wrap: wrap; }
.mode-btn {
  padding: 8px 16px; border-radius: var(--radius);
  border: 1px solid var(--border); background: transparent;
  color: var(--text-primary); cursor: pointer; font-size: 14px;
  font-family: 'Lora', Georgia, serif; font-weight: 500;
  transition: all 0.15s;
}
.mode-btn:hover { border-color: var(--border-active); }
.mode-btn.selected { border-color: var(--accent-orange); color: var(--accent-orange); }

.start-btn {
  padding: 14px 48px; border-radius: var(--radius);
  border: none; background: var(--accent-orange);
  color: white; font-size: 16px; font-weight: 600; cursor: pointer;
  font-family: 'Poppins', Arial, sans-serif; transition: background 0.15s;
  letter-spacing: -0.3px;
}
.start-btn:hover { background: #c4694c; }
.start-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* Question screen */
.question-screen { padding: 20px 0; }
.progress-bar {
  height: 4px; background: var(--border); border-radius: 2px;
  margin-bottom: 24px; overflow: hidden;
}
.progress-fill {
  height: 100%; border-radius: 2px; transition: width 0.4s ease;
  background: var(--accent-orange);
}
.q-meta {
  display: flex; align-items: center; gap: 12px; margin-bottom: 16px;
  font-size: 13px; color: var(--text-muted);
}
.q-number { font-weight: 600; color: var(--text-secondary); font-family: 'JetBrains Mono', monospace; }
.q-domain-tag {
  padding: 2px 10px; border-radius: 20px; font-size: 11px; font-weight: 600;
}
.q-scenario {
  padding: 12px 16px; background: rgba(106,155,204,0.06);
  border-left: 3px solid var(--accent-blue); border-radius: 0 8px 8px 0;
  margin-bottom: 20px; font-size: 13px; color: var(--text-secondary);
}
.q-text {
  font-size: 17px; font-weight: 500; line-height: 1.65;
  margin-bottom: 24px; letter-spacing: -0.2px;
}
.q-text code {
  background: rgba(106,155,204,0.1); padding: 2px 6px; border-radius: 4px;
  font-size: 14px; color: #5a87b5;
}

/* Options */
.options { display: grid; gap: 10px; margin-bottom: 24px; }
.option {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px 20px;
  cursor: pointer; transition: all 0.2s;
  display: flex; gap: 14px; align-items: flex-start;
}
.option:hover:not(.disabled) { border-color: var(--border-active); background: var(--bg-hover); }
.option.selected { border-color: var(--accent-orange); background: rgba(217,119,87,0.05); }
.option.correct { border-color: var(--accent-green); background: rgba(120,140,93,0.05); }
.option.wrong { border-color: var(--accent-red); background: rgba(196,92,74,0.05); }
.option.disabled { cursor: default; opacity: 0.7; }
.option.disabled.correct { opacity: 1; }
.option.disabled.selected.wrong { opacity: 1; }
.option-letter {
  width: 28px; height: 28px; border-radius: 8px;
  background: var(--bg-primary); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-weight: 600; font-size: 13px; flex-shrink: 0;
  font-family: 'JetBrains Mono', monospace;
  transition: all 0.2s;
}
.option.selected .option-letter { background: var(--accent-orange); border-color: var(--accent-orange); color: white; }
.option.correct .option-letter { background: var(--accent-green); border-color: var(--accent-green); color: white; }
.option.wrong .option-letter { background: var(--accent-red); border-color: var(--accent-red); color: white; }
.option-text { font-size: 14px; line-height: 1.55; padding-top: 3px; }

/* Explanation */
.explanation {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px;
  margin-bottom: 24px; animation: fadeIn 0.3s ease;
}
.explanation-header {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 10px; font-weight: 600; font-size: 14px;
  font-family: 'Poppins', Arial, sans-serif;
}
.explanation-icon { font-size: 18px; }
.explanation-correct { color: var(--accent-green); }
.explanation-wrong { color: var(--accent-red); }
.explanation-text { font-size: 14px; color: var(--text-secondary); line-height: 1.6; }
.explanation-task {
  margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border);
  font-size: 12px; color: var(--text-muted);
}

.nav-btn {
  padding: 12px 32px; border-radius: var(--radius);
  border: 1px solid var(--accent-orange); background: transparent;
  color: var(--accent-orange); font-size: 14px; font-weight: 600;
  cursor: pointer; font-family: 'Poppins', Arial, sans-serif;
  transition: all 0.2s;
}
.nav-btn:hover { background: rgba(217,119,87,0.05); }
.nav-btn.primary { background: var(--accent-orange); color: white; border-color: var(--accent-orange); }
.nav-btn.primary:hover { background: #c4694c; }
.nav-row { display: flex; justify-content: flex-end; gap: 12px; }

/* Results */
.results-screen { padding: 40px 0; }
.results-header { text-align: center; margin-bottom: 40px; }
.results-score {
  font-size: 72px; font-weight: 700; font-family: 'Poppins', Arial, sans-serif;
  letter-spacing: -3px; margin-bottom: 8px;
}
.results-pass { color: var(--accent-green); }
.results-fail { color: var(--accent-red); }
.results-label { font-size: 18px; color: var(--text-secondary); margin-bottom: 4px; }
.results-verdict {
  font-size: 14px; padding: 6px 16px; border-radius: 20px;
  display: inline-block; font-weight: 600;
  font-family: 'Poppins', Arial, sans-serif;
}
.verdict-pass { background: rgba(120,140,93,0.15); color: var(--accent-green); }
.verdict-fail { background: rgba(196,92,74,0.15); color: var(--accent-red); }

.domain-results { margin-bottom: 32px; }
.domain-result-row {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 0; border-bottom: 1px solid var(--border);
}
.domain-result-label { flex: 1; font-size: 14px; }
.domain-result-bar { width: 200px; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
.domain-result-fill { height: 100%; border-radius: 3px; transition: width 0.6s ease; }
.domain-result-pct { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 600; width: 45px; text-align: right; }

.review-section { margin-top: 32px; }
.review-title { font-size: 18px; font-weight: 600; margin-bottom: 16px; }
.review-item {
  background: var(--bg-card); border-radius: var(--radius);
  padding: 16px; margin-bottom: 8px; border-left: 3px solid;
}
.review-item.review-correct { border-color: var(--accent-green); }
.review-item.review-wrong { border-color: var(--accent-red); }
.review-q { font-size: 13px; color: var(--text-secondary); margin-bottom: 6px; }
.review-answer { font-size: 13px; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

@media (max-width: 640px) {
  .header-inner { flex-direction: column; gap: 12px; }
  .stats-bar { flex-wrap: wrap; gap: 12px; }
  .setup-title { font-size: 24px; }
  .q-text { font-size: 15px; }
  .results-score { font-size: 56px; }
  .domain-result-bar { width: 120px; }
  .mode-options { flex-direction: column; }
}
</style>
</head>

<header class="header">
  <div class="header-inner">
    <a href="index.html" class="logo">
      <img class="logo-icon" src="logo.png" alt="CCA-F" />
      <span class="logo-text">CCA-F Study Lab</span>
    </a>
    <nav class="nav">
      <a href="index.html" class="nav-link">Home</a>
      <a href="ccaf-faq.html" class="nav-link">FAQ</a>
      <div class="stats-bar" id="statsBar" style="display:none;">
        <div class="stat"><span>Q</span> <span class="stat-val" id="statCurrent">0</span>/<span class="stat-val" id="statTotal">0</span></div>
        <div class="stat stat-correct">✓ <span class="stat-val" id="statCorrect">0</span></div>
        <div class="stat stat-wrong">✗ <span class="stat-val" id="statWrong">0</span></div>
      </div>
    </nav>
  </div>
</header>

<div class="container">
  <!-- Setup Screen -->
  <div id="setupScreen" class="setup-screen">
    <div class="setup-title">Simulado Interativo</div>
    <div class="setup-subtitle">Escolha os domínios e o modo de estudo. 337 questões cenário-based no formato do exame real.</div>

    <div class="mode-label">Domínios</div>
    <div class="domain-grid" id="domainGrid"></div>

    <div class="mode-section">
      <div class="mode-label">Modo de feedback</div>
      <div class="mode-options">
        <button class="mode-btn selected" data-mode="immediate" onclick="setMode('immediate', this)">Feedback imediato</button>
        <button class="mode-btn" data-mode="end" onclick="setMode('end', this)">Resultado no final</button>
      </div>
    </div>

    <div class="mode-section">
      <div class="mode-label">Ordem das questões</div>
      <div class="mode-options">
        <button class="mode-btn selected" data-order="shuffle" onclick="setOrder('shuffle', this)">Embaralhar</button>
        <button class="mode-btn" data-order="sequential" onclick="setOrder('sequential', this)">Sequencial por domínio</button>
      </div>
    </div>

    <button class="start-btn" id="startBtn" onclick="startQuiz()">Iniciar Simulado</button>
  </div>

  <!-- Question Screen -->
  <div id="questionScreen" class="question-screen" style="display:none;"></div>

  <!-- Results Screen -->
  <div id="resultsScreen" class="results-screen" style="display:none;"></div>
</div>

<script>

const QUESTIONS = [{"id": "D1-001", "source": "official-exam-guide", "scenario": "Customer Support Resolution Agent", "task_statement": "1.4", "question": "Production data shows that in 12% of cases, your agent skips get_customer entirely and calls lookup_order using only the customer's stated name, occasionally leading to misidentified accounts and incorrect refunds. What change would most effectively address this reliability issue?", "options": {"A": "Add a programmatic prerequisite that blocks lookup_order and process_refund calls until get_customer has returned a verified customer ID.", "B": "Enhance the system prompt to state that customer verification via get_customer is mandatory before any order operations.", "C": "Add few-shot examples showing the agent always calling get_customer first, even when customers volunteer order details.", "D": "Implement a routing classifier that analyzes each request and enables only the subset of tools appropriate for that request type."}, "correct": "A", "explanation": "When a specific tool sequence is required for critical business logic (like verifying customer identity before processing refunds), programmatic enforcement provides deterministic guarantees that prompt-based approaches cannot. Options B and C rely on probabilistic LLM compliance, which is insufficient when errors have financial consequences. Option D addresses tool availability rather than tool ordering.", "domain": "D1"}, {"id": "D1-002", "source": "official-exam-guide", "scenario": "Multi-Agent Research System", "task_statement": "1.6", "question": "After running the system on the topic \"impact of AI on creative industries,\" you observe that each subagent completes successfully: the web search agent finds relevant articles, the document analysis agent summarizes papers correctly, and the synthesis agent produces coherent output. However, the final reports cover only visual arts, completely missing music, writing, and film production. When you examine the coordinator's logs, you see it decomposed the topic into three subtasks: \"AI in digital art creation,\" \"AI in graphic design,\" and \"AI in photography.\" What is the most likely root cause?", "options": {"A": "The synthesis agent lacks instructions for identifying coverage gaps in the findings it receives from other agents.", "B": "The coordinator agent's task decomposition is too narrow, resulting in subagent assignments that don't cover all relevant domains of the topic.", "C": "The web search agent's queries are not comprehensive enough and need to be expanded to cover more creative industry sectors.", "D": "The document analysis agent is filtering out sources related to non-visual creative industries due to overly restrictive relevance criteria."}, "correct": "B", "explanation": "The coordinator's logs reveal the root cause directly: it decomposed 'creative industries' into only visual arts subtasks. The subagents executed their assigned tasks correctly—the problem is what they were assigned. Options A, C, and D incorrectly blame downstream agents that are working correctly within their assigned scope.", "domain": "D1"}, {"id": "D1-003", "source": "official-exam-guide", "scenario": "Multi-Agent Research System", "task_statement": "1.3", "question": "The web search subagent times out while researching a complex topic. You need to design how this failure information flows back to the coordinator agent. Which error propagation approach best enables intelligent recovery?", "options": {"A": "Return structured error context to the coordinator including the failure type, the attempted query, any partial results, and potential alternative approaches.", "B": "Implement automatic retry logic with exponential backoff within the subagent, returning a generic 'search unavailable' status only after all retries are exhausted.", "C": "Catch the timeout within the subagent and return an empty result set marked as successful.", "D": "Propagate the timeout exception directly to a top-level handler that terminates the entire research workflow."}, "correct": "A", "explanation": "Structured error context gives the coordinator the information it needs to make intelligent recovery decisions—whether to retry with a modified query, try an alternative approach, or proceed with partial results. Option B hides valuable context. Option C suppresses the error. Option D terminates unnecessarily.", "domain": "D1"}, {"id": "D1-004", "source": "official-exam-guide", "scenario": "Multi-Agent Research System", "task_statement": "1.2", "question": "During testing, you observe that the synthesis agent frequently needs to verify specific claims while combining findings. Currently, when verification is needed, the synthesis agent returns control to the coordinator, which invokes the web search agent, then re-invokes synthesis with results. This adds 2-3 round trips per task and increases latency by 40%. Your evaluation shows that 85% of these verifications are simple fact-checks (dates, names, statistics) while 15% require deeper investigation. What's the most effective approach to reduce overhead while maintaining system reliability?", "options": {"A": "Give the synthesis agent a scoped verify_fact tool for simple lookups, while complex verifications continue delegating to the web search agent through the coordinator.", "B": "Have the synthesis agent accumulate all verification needs and return them as a batch to the coordinator at the end of its pass, which then sends them all to the web search agent at once.", "C": "Give the synthesis agent access to all web search tools so it can handle any verification need directly without round-trips through the coordinator.", "D": "Have the web search agent proactively cache extra context around each source during initial research, anticipating what the synthesis agent might need to verify."}, "correct": "A", "explanation": "Option A applies the principle of least privilege by giving the synthesis agent only what it needs for the 85% common case while preserving existing coordination for complex cases. Option B creates blocking dependencies. Option C over-provisions the synthesis agent, violating separation of concerns. Option D relies on speculative caching.", "domain": "D1"}, {"id": "D1-005", "source": "community-generated", "scenario": "Customer Support Resolution Agent", "task_statement": "1.1", "question": "Your agentic loop processes customer requests by calling Claude and executing tool calls. During testing, you notice that the agent sometimes terminates prematurely before completing all necessary steps. Which implementation correctly handles the agentic loop lifecycle?", "options": {"A": "Continue the loop when stop_reason is 'tool_use' and terminate when stop_reason is 'end_turn', appending tool results to conversation history between iterations.", "B": "Parse the assistant's text response for keywords like 'done' or 'complete' to determine when to stop the loop.", "C": "Set a maximum iteration count of 10 and stop the loop when reached, regardless of stop_reason.", "D": "Check if the assistant's response contains text content; if it does, terminate the loop since the agent must be responding to the user."}, "correct": "A", "explanation": "The correct agentic loop pattern uses stop_reason values: continue when 'tool_use' (the model wants to call a tool), terminate when 'end_turn' (the model is done). Tool results must be appended to conversation history so the model can reason about them. Options B, C, and D are all documented anti-patterns: parsing NL for loop termination, arbitrary iteration caps as primary stopping mechanism, and checking assistant text content.", "domain": "D1"}, {"id": "D1-006", "source": "community-generated", "scenario": "Multi-Agent Research System", "task_statement": "1.2", "question": "Your multi-agent research system uses a coordinator that delegates to specialized subagents. During testing, you notice the document analysis subagent is making decisions based on conversation context from the web search subagent's previous run. What architectural problem does this indicate?", "options": {"A": "The subagents are not operating with isolated context — they are sharing conversation history instead of receiving only their specific task context from the coordinator.", "B": "The coordinator is not properly aggregating results from subagents before passing them to the next stage.", "C": "The web search subagent is caching its results in a shared memory store that the document analysis subagent reads from.", "D": "The coordinator needs to implement a message queue to properly sequence subagent invocations."}, "correct": "A", "explanation": "In a hub-and-spoke architecture, subagents must operate with isolated context — they should not automatically inherit the coordinator's history or other subagents' context. Each subagent receives only what the coordinator explicitly passes in its prompt. Context leakage between subagents violates this isolation principle and leads to unpredictable behavior.", "domain": "D1"}, {"id": "D1-007", "source": "community-generated", "scenario": "Customer Support Resolution Agent", "task_statement": "1.5", "question": "Your customer support agent sometimes returns refund amounts as strings like '$42.50' and other times as numbers like 42.5, causing downstream payment system errors. You need to ensure all monetary values follow a consistent format. What's the best approach?", "options": {"A": "Implement a PostToolUse hook that intercepts tool results and normalizes monetary values to a consistent numeric format before they enter the conversation context.", "B": "Add detailed formatting instructions to the system prompt specifying that all monetary values must be returned as numbers without currency symbols.", "C": "Create a separate formatting agent that processes all tool results and standardizes data formats before returning them to the main agent.", "D": "Use JSON schema validation on all tool outputs to reject responses that don't match the expected numeric format."}, "correct": "A", "explanation": "PostToolUse hooks are designed for normalizing tool outputs programmatically. This provides deterministic format enforcement regardless of how the tool returns data. Prompt-based approaches (B) are probabilistic. A separate agent (C) adds unnecessary complexity. Schema validation (D) would reject valid results rather than transforming them.", "domain": "D1"}, {"id": "D1-008", "source": "community-generated", "scenario": "Customer Support Resolution Agent", "task_statement": "1.4", "question": "Your agent needs to process refunds, but company policy requires that refunds above $500 must be reviewed by a human supervisor. The agent currently attempts to process all refunds autonomously. How should you enforce this business rule?", "options": {"A": "Implement a programmatic hook that intercepts process_refund tool calls, checks the amount, and redirects to escalate_to_human when the threshold is exceeded.", "B": "Include the $500 threshold in the system prompt and instruct the agent to always check the amount before calling process_refund.", "C": "Create two separate tools: process_small_refund (up to $500) and process_large_refund (above $500), with the large refund tool always routing to a human.", "D": "Add a post-processing step that reviews all completed refunds and reverses any that exceeded $500 without human approval."}, "correct": "A", "explanation": "When business rules have financial consequences, programmatic enforcement via hooks provides deterministic guarantees. The hook intercepts the tool call before execution, checks the condition, and redirects flow. Prompt-based enforcement (B) is probabilistic. Splitting tools (C) doesn't guarantee the agent picks the right one. Post-processing (D) allows the error to occur before catching it.", "domain": "D1"}, {"id": "D1-009", "source": "community-generated", "scenario": "Multi-Agent Research System", "task_statement": "1.3", "question": "You need to spawn a subagent using the Claude Agent SDK's Task tool to analyze a batch of documents. The coordinator agent is configured with allowedTools. Which configuration is required for the coordinator to successfully create subagents?", "options": {"A": "The coordinator's allowedTools must include 'Task' in addition to any other tools it needs to use directly.", "B": "The coordinator needs a special 'spawn_agent' permission in its configuration separate from allowedTools.", "C": "Subagent spawning is handled automatically by the SDK and doesn't require any specific allowedTools configuration.", "D": "The coordinator must have all tools that the subagent will use listed in its own allowedTools."}, "correct": "A", "explanation": "The Task tool is used for subagent spawning in the Agent SDK. Like any other tool, it must be explicitly listed in the coordinator's allowedTools configuration. Option B describes a non-existent permission. Option C is incorrect — Task must be explicitly allowed. Option D confuses coordinator and subagent tool scopes; subagents have their own allowedTools.", "domain": "D1"}, {"id": "D1-010", "source": "community-generated", "scenario": "Multi-Agent Research System", "task_statement": "1.7", "question": "Your research agent system has been running for 45 minutes on a complex report. The coordinator agent's context window is nearing capacity due to accumulated subagent results. How should you handle this situation?", "options": {"A": "Use /compact to summarize the conversation context, preserving key findings while freeing context space for remaining work.", "B": "Restart the entire research process from scratch with a fresh context window.", "C": "Switch to a model with a larger context window mid-session to accommodate the accumulated results.", "D": "Split the coordinator's context by removing the oldest subagent results, assuming they've already been incorporated into later synthesis."}, "correct": "A", "explanation": "The /compact command is designed for exactly this situation — it summarizes conversation context to free space while preserving important information. Restarting (B) loses all progress. Switching models (C) isn't possible mid-session. Removing old results (D) risks losing information that hasn't been fully incorporated.", "domain": "D1"}, {"id": "D1-011", "source": "community-generated", "scenario": "Customer Support Resolution Agent", "task_statement": "1.1", "question": "Your agentic loop implementation uses the Claude API. After receiving a response where stop_reason is 'tool_use', your code executes the requested tool. What must happen next before sending the next API request?", "options": {"A": "Append the tool result as a new message with role 'user' containing a tool_result content block, maintaining the full conversation history.", "B": "Send only the tool result as the next message, without the previous conversation history, to save tokens.", "C": "Append the tool result to the system prompt so it persists across all future iterations.", "D": "Store the tool result in a separate context object and reference it by ID in the next request."}, "correct": "A", "explanation": "In the Claude API agentic loop, tool results must be appended to the conversation history as a user message with a tool_result content block. The full conversation history is sent with each request so the model can reason about all prior context. Sending only the result (B) loses context. System prompt storage (C) is incorrect usage. External references (D) aren't supported in the API.", "domain": "D1"}, {"id": "D1-012", "source": "community-generated", "scenario": "Multi-Agent Research System", "task_statement": "1.6", "question": "Your coordinator agent receives a request: 'Compare the regulatory approaches to AI in the EU, US, and China, and analyze how each affects multinational companies.' The coordinator decomposes this into a single task: 'Research AI regulation globally.' What's wrong with this decomposition?", "options": {"A": "The decomposition is too broad — it should be split into region-specific research tasks plus a comparative analysis task to ensure comprehensive coverage of each regulatory framework.", "B": "The decomposition is correct but needs a larger context window to handle all the information.", "C": "The task should be decomposed by company type rather than by region for better analysis.", "D": "Nothing is wrong — a single well-scoped task is always preferable to multiple smaller tasks to avoid coordination overhead."}, "correct": "A", "explanation": "Effective task decomposition should break complex multi-faceted requests into focused subtasks. A single broad task risks the same narrow-coverage problem seen in the exam guide's creative industries example. Region-specific research tasks ensure each area gets thorough coverage, and a separate comparative analysis task synthesizes findings.", "domain": "D1"}, {"id": "D2-001", "source": "official-exam-guide", "scenario": "Customer Support Resolution Agent", "task_statement": "2.1", "question": "Production logs show the agent frequently calls get_customer when users ask about orders (e.g., 'check my order #12345'), instead of calling lookup_order. Both tools have minimal descriptions ('Retrieves customer information' / 'Retrieves order details') and accept similar identifier formats. What's the most effective first step to improve tool selection reliability?", "options": {"A": "Add few-shot examples to the system prompt demonstrating correct tool selection patterns, with 5-8 examples showing order-related queries routing to lookup_order.", "B": "Expand each tool's description to include input formats it handles, example queries, edge cases, and boundaries explaining when to use it versus similar tools.", "C": "Implement a routing layer that parses user input before each turn and pre-selects the appropriate tool based on detected keywords and identifier patterns.", "D": "Consolidate both tools into a single lookup_entity tool that accepts any identifier and internally determines which backend to query."}, "correct": "B", "explanation": "Tool descriptions are the primary mechanism LLMs use for tool selection. When descriptions are minimal, models lack the context to differentiate between similar tools. Option B directly addresses this root cause with a low-effort, high-leverage fix. Few-shot examples (A) add token overhead without fixing the underlying issue. A routing layer (C) is over-engineered. Consolidating tools (D) requires more effort than a 'first step' warrants.", "domain": "D2"}, {"id": "D2-002", "source": "community-generated", "scenario": "Customer Support Resolution Agent", "task_statement": "2.2", "question": "Your process_refund tool occasionally fails due to various reasons: network timeouts, invalid order IDs, and insufficient permissions for certain refund types. Currently, all errors return a generic 'Refund failed' message. How should you improve error handling?", "options": {"A": "Return structured error responses with errorCategory (transient/validation/permission/business_logic), isRetryable boolean, a human-readable description, and suggested next steps.", "B": "Set the isError flag to true on all error responses and let the agent figure out what to do from the error message text.", "C": "Implement automatic retry logic for all errors with exponential backoff, only returning errors to the agent after 3 failed attempts.", "D": "Log all errors to an external monitoring system and return a success response with a note that the refund is 'pending review'."}, "correct": "A", "explanation": "Structured error responses with categorized errors enable the agent to make intelligent decisions: retry transient errors, explain validation issues to users, escalate permission problems. The isError flag (B) is a good start but insufficient without structured categories. Blanket retries (C) waste resources on non-retryable errors. Masking errors (D) is dangerous and misleading.", "domain": "D2"}, {"id": "D2-003", "source": "community-generated", "scenario": "Developer Productivity with Claude", "task_statement": "2.3", "question": "Your agent needs to first retrieve a customer record before performing any other operations. You want to guarantee that the first API call always uses the get_customer tool. Which tool_choice configuration achieves this?", "options": {"A": "Set tool_choice to {\"type\": \"tool\", \"name\": \"get_customer\"} for the first request, then switch to \"auto\" for subsequent iterations.", "B": "Set tool_choice to \"any\" which forces the model to call get_customer since it's the most relevant tool.", "C": "Set tool_choice to \"auto\" and add a strong instruction in the system prompt to always call get_customer first.", "D": "Remove all other tools from the first request and only include get_customer, using tool_choice \"auto\"."}, "correct": "A", "explanation": "Forced tool selection with {\"type\": \"tool\", \"name\": \"get_customer\"} guarantees the specific tool is called. After the first call, switching to \"auto\" lets the model choose tools normally. \"any\" (B) forces a tool call but doesn't specify which one. Prompt instructions (C) are probabilistic. Removing tools (D) works but is unnecessarily complex compared to direct forced selection.", "domain": "D2"}, {"id": "D2-004", "source": "community-generated", "scenario": "Developer Productivity with Claude", "task_statement": "2.4", "question": "Your team uses a private npm registry and a custom linting server. You want to configure these MCP servers so that all developers share the linting server config but each uses their own npm credentials. Where should each configuration go?", "options": {"A": "Linting server in project-level .mcp.json (version controlled), npm registry in user-level ~/.claude.json (personal credentials with environment variable expansion).", "B": "Both in .mcp.json since all team configuration should be version controlled together.", "C": "Both in ~/.claude.json since MCP servers are user-specific configuration.", "D": "Linting server in CLAUDE.md as a tool description, npm registry in a .env file."}, "correct": "A", "explanation": "MCP server configuration follows a clear split: .mcp.json is project-level and shared via version control (ideal for shared tools like linting). ~/.claude.json is user-level for personal/experimental servers or those requiring individual credentials. Environment variable expansion in the config allows each developer to inject their own credentials without exposing them in version control.", "domain": "D2"}, {"id": "D2-005", "source": "community-generated", "scenario": "Developer Productivity with Claude", "task_statement": "2.5", "question": "A developer asks Claude Code to 'find all files where the processRefund function is called and identify the associated test files.' Which built-in tool combination is most appropriate?", "options": {"A": "Use Grep to search for 'processRefund' across the codebase (finds callers), then use Glob to find test files matching the caller filenames (e.g., *.test.ts).", "B": "Use Bash to run 'find . -name \"*.ts\" | xargs grep processRefund' to search all files at once.", "C": "Use Read to open each file in the project and search for the function name manually.", "D": "Use Glob to find all TypeScript files, then use Read to check each one for the function call."}, "correct": "A", "explanation": "Grep is the purpose-built tool for searching content across files — it finds where processRefund is called. Glob then finds test files matching the naming pattern. This two-step approach is efficient and uses each built-in tool for its intended purpose. Bash (B) works but bypasses the purpose-built tools. Read (C/D) is inefficient for searching across many files.", "domain": "D2"}, {"id": "D2-006", "source": "community-generated", "scenario": "Customer Support Resolution Agent", "task_statement": "2.1", "question": "You have two MCP tools: 'get_order_status' and 'get_shipping_status'. Users frequently report that the agent calls the wrong tool. Both descriptions say 'Returns status information.' What is the root cause and best fix?", "options": {"A": "The descriptions are ambiguous — rewrite them to clearly differentiate: get_order_status for 'payment status, fulfillment stage, and item details for an order' vs get_shipping_status for 'carrier tracking, delivery ETA, and shipping location for a shipment'.", "B": "Consolidate into a single get_status tool since users don't differentiate between order and shipping status.", "C": "Add a pre-processing classifier that detects whether the user wants order or shipping information and forces the appropriate tool.", "D": "Rename the tools to have completely different names like 'check_purchase' and 'track_delivery' so the model can distinguish them."}, "correct": "A", "explanation": "Tool descriptions are the primary mechanism for tool selection. Ambiguous, overlapping descriptions cause misrouting. The fix is writing descriptions that include input formats, example queries, edge cases, and explicit boundaries between similar tools. Renaming (D) helps slightly but descriptions matter more than names. Consolidation (B) and classifiers (C) are over-engineered responses to what is fundamentally a description quality problem.", "domain": "D2"}, {"id": "D2-007", "source": "community-generated", "scenario": "Customer Support Resolution Agent", "task_statement": "2.2", "question": "Your lookup_order tool receives an order ID that doesn't exist in the database. The tool currently throws an unhandled exception. What is the correct way to handle this in an MCP tool?", "options": {"A": "Return a tool result with isError: true and a structured message explaining this is a validation error (invalid order ID), it is not retryable, and suggesting the agent verify the order ID with the customer.", "B": "Return an empty result set with isError: false, letting the agent interpret the absence of data.", "C": "Throw the exception and let the agentic loop's try-catch block handle it at the orchestration level.", "D": "Return a result with a text message saying 'Order not found' without setting any error flags."}, "correct": "A", "explanation": "MCP tools should use the isError flag combined with structured error information. A validation error (non-existent order ID) should be categorized as such, marked as non-retryable, and include a suggested recovery action. Returning empty results (B) hides the error. Throwing exceptions (C) breaks the agentic loop. Returning text without flags (D) makes it harder for the agent to distinguish errors from valid results.", "domain": "D2"}, {"id": "D2-008", "source": "community-generated", "scenario": "Multi-Agent Research System", "task_statement": "2.3", "question": "Your multi-agent system has a coordinator with 15 available tools. The coordinator frequently selects tools seemingly at random for the first step. You want the coordinator to always begin by calling plan_research to create a research plan. After planning, it should choose tools freely. What approach works best?", "options": {"A": "Use forced tool_choice for plan_research on the first request, then switch to tool_choice 'auto' for all subsequent requests.", "B": "Use tool_choice 'any' for all requests so the coordinator always calls at least one tool.", "C": "Remove all tools except plan_research for the first request, then add the rest back for subsequent requests.", "D": "Add 'ALWAYS call plan_research first' to the system prompt and keep tool_choice as 'auto'."}, "correct": "A", "explanation": "Forced tool selection guarantees a specific tool is called. This is the clean, documented approach for enforcing a first step. 'any' (B) forces some tool call but not the specific one needed. Dynamically modifying tool lists (C) works but is more complex. Prompt instructions (D) are probabilistic and may fail.", "domain": "D2"}, {"id": "D2-009", "source": "community-generated", "scenario": "Developer Productivity with Claude", "task_statement": "2.4", "question": "You're setting up an MCP server in .mcp.json that needs a database connection string containing a password. How should you handle the sensitive credential?", "options": {"A": "Use environment variable expansion in the .mcp.json configuration (e.g., $DB_PASSWORD) so the actual credential is never committed to version control.", "B": "Store the connection string directly in .mcp.json since it's a local configuration file.", "C": "Create a separate .mcp.secrets.json file and reference it from .mcp.json.", "D": "Encrypt the password and store the encrypted value in .mcp.json with the decryption key in an environment variable."}, "correct": "A", "explanation": "MCP configuration supports environment variable expansion, which is the standard approach for handling credentials. The actual values come from the developer's environment, keeping secrets out of version control. Direct storage (B) exposes credentials. Separate secrets files (C) aren't a standard MCP feature. Encryption (D) adds unnecessary complexity.", "domain": "D2"}, {"id": "D2-010", "source": "community-generated", "scenario": "Customer Support Resolution Agent", "task_statement": "2.3", "question": "Your agent has access to 8 tools but frequently tries to call tools that aren't relevant to its current task. For example, while handling a billing inquiry, it sometimes calls tools meant for shipping operations. What's the most effective tool distribution strategy?", "options": {"A": "Use allowedTools on the agent configuration to restrict which tools are available based on the agent's role, giving each specialized agent only the tools it needs.", "B": "Keep all 8 tools available but add negative examples to the system prompt showing which tools should NOT be used for each type of request.", "C": "Create a single super-tool that internally routes to the correct backend operation based on the request type.", "D": "Implement a tool pre-filter that hides irrelevant tools from the model based on keyword analysis of the user's message."}, "correct": "A", "explanation": "The allowedTools configuration on agent definitions is the clean way to restrict tool access per agent role. This follows the principle of least privilege — agents only see tools they need. Negative examples (B) add complexity without deterministic guarantees. A super-tool (C) obscures the tool selection from the model. Keyword-based filtering (D) is fragile and over-engineered.", "domain": "D2"}, {"id": "D3-001", "source": "official-exam-guide", "scenario": "Code Generation with Claude Code", "task_statement": "3.2", "question": "You want to create a custom /review slash command that runs your team's standard code review checklist. This command should be available to every developer when they clone or pull the repository. Where should you create this command file?", "options": {"A": "In the .claude/commands/ directory in the project repository", "B": "In ~/.claude/commands/ in each developer's home directory", "C": "In the CLAUDE.md file at the project root", "D": "In a .claude/config.json file with a commands array"}, "correct": "A", "explanation": "Project-scoped custom slash commands should be stored in .claude/commands/ within the repository. These are version-controlled and automatically available to all developers when they clone or pull. Option B is for personal commands not shared via VCS. Option C is for project instructions, not command definitions. Option D describes a mechanism that doesn't exist.", "domain": "D3"}, {"id": "D3-002", "source": "official-exam-guide", "scenario": "Code Generation with Claude Code", "task_statement": "3.4", "question": "You've been assigned to restructure the team's monolithic application into microservices. This will involve changes across dozens of files and requires decisions about service boundaries and module dependencies. Which approach should you take?", "options": {"A": "Enter plan mode to explore the codebase, understand dependencies, and design an implementation approach before making changes.", "B": "Start with direct execution and make changes incrementally, letting the implementation reveal the natural service boundaries.", "C": "Use direct execution with comprehensive upfront instructions detailing exactly how each service should be structured.", "D": "Begin in direct execution mode and only switch to plan mode if you encounter unexpected complexity during implementation."}, "correct": "A", "explanation": "Plan mode is designed for complex tasks involving large-scale changes, multiple valid approaches, and architectural decisions. It enables safe codebase exploration and design before committing to changes. Option B risks costly rework. Option C assumes you know the right structure without exploring. Option D ignores that complexity is already stated in the requirements.", "domain": "D3"}, {"id": "D3-003", "source": "official-exam-guide", "scenario": "Code Generation with Claude Code", "task_statement": "3.3", "question": "Your codebase has distinct areas with different coding conventions: React components use functional style with hooks, API handlers use async/await with specific error handling, and database models follow a repository pattern. Test files are spread throughout the codebase alongside the code they test. What's the most maintainable way to ensure Claude automatically applies the correct conventions?", "options": {"A": "Create rule files in .claude/rules/ with YAML frontmatter specifying glob patterns to conditionally apply conventions based on file paths", "B": "Consolidate all conventions in the root CLAUDE.md file under headers for each area, relying on Claude to infer which section applies", "C": "Create skills in .claude/skills/ for each code type that include the relevant conventions in their SKILL.md files", "D": "Place a separate CLAUDE.md file in each subdirectory containing that area's specific conventions"}, "correct": "A", "explanation": ".claude/rules/ with glob patterns (e.g., **/*.test.tsx) allows conventions to be automatically applied based on file paths regardless of directory location — essential for test files spread throughout the codebase. Option B relies on inference. Option C requires manual skill invocation. Option D can't handle files spread across many directories.", "domain": "D3"}, {"id": "D3-004", "source": "community-generated", "scenario": "Code Generation with Claude Code", "task_statement": "3.1", "question": "A developer has personal preferences for verbose logging during debugging, but the project CLAUDE.md specifies concise output. The developer also has a user-level CLAUDE.md. What is the correct CLAUDE.md hierarchy and which takes precedence?", "options": {"A": "User (~/.claude/CLAUDE.md), then project (.claude/CLAUDE.md), then directory-level CLAUDE.md — all are loaded, with more specific levels adding to (not overriding) broader levels.", "B": "Project CLAUDE.md always overrides user CLAUDE.md to maintain team consistency.", "C": "User CLAUDE.md has highest priority since it represents the individual developer's preferences.", "D": "Only one CLAUDE.md is loaded at a time — the most specific one (directory-level) wins completely."}, "correct": "A", "explanation": "The CLAUDE.md hierarchy loads all levels: user, project, and directory. They are additive — more specific levels add context rather than completely overriding broader ones. This means a developer can add personal preferences that complement (not conflict with) project standards.", "domain": "D3"}, {"id": "D3-005", "source": "community-generated", "scenario": "Code Generation with Claude Code", "task_statement": "3.2", "question": "You want to create a reusable code analysis skill that runs in isolation so its verbose output doesn't pollute the main conversation context. The skill needs access to Bash and Read tools only. How should you configure the SKILL.md frontmatter?", "options": {"A": "Use context: fork to run in an isolated sub-agent, and allowed-tools: ['Bash', 'Read'] to restrict tool access.", "B": "Use context: isolated and tools: ['Bash', 'Read'] in the frontmatter.", "C": "Use context: fork only — tool restrictions are configured separately in .claude/config.json.", "D": "Use mode: background and allowed-tools: ['Bash', 'Read'] to run the skill without affecting the main context."}, "correct": "A", "explanation": "SKILL.md frontmatter supports context: fork (runs skill in an isolated sub-agent, preventing output from polluting the main session) and allowed-tools (restricts which tools the skill can use). These are the documented frontmatter options. Options B and D use non-existent configuration keys.", "domain": "D3"}, {"id": "D3-006", "source": "community-generated", "scenario": "Claude Code for CI/CD", "task_statement": "3.6", "question": "Your CI pipeline needs Claude Code to analyze a pull request and output structured JSON that can be parsed by your pipeline script. Which command configuration achieves this?", "options": {"A": "Use claude -p 'Analyze this PR' --output-format json --json-schema '{...}' to get structured, parseable output.", "B": "Use claude 'Analyze this PR' | jq '.' to pipe the output through jq for JSON parsing.", "C": "Use claude --ci --format json 'Analyze this PR' with the dedicated CI mode flag.", "D": "Use claude -p 'Analyze this PR and return JSON' and parse the response text for JSON blocks."}, "correct": "A", "explanation": "Claude Code supports -p (non-interactive mode) combined with --output-format json for machine-readable output and --json-schema for enforcing a specific output structure. This is the documented approach for CI/CD integration. Option B doesn't use non-interactive mode. Option C uses non-existent flags. Option D relies on text parsing which is fragile.", "domain": "D3"}, {"id": "D3-007", "source": "community-generated", "scenario": "Code Generation with Claude Code", "task_statement": "3.1", "question": "Your project uses @import syntax in its CLAUDE.md to include shared conventions from a central file. A new developer reports that Claude isn't following some conventions that other team members see. What's the most likely cause?", "options": {"A": "The @import references a file that exists in the repo but the new developer hasn't pulled the latest changes that include it.", "B": "@import syntax only works in user-level CLAUDE.md files, not project-level ones.", "C": "@import files are cached and the cache needs to be cleared when new imports are added.", "D": "The new developer's user-level CLAUDE.md is overriding the project-level imports."}, "correct": "A", "explanation": "@import in CLAUDE.md references other files that must be present on disk. If a developer hasn't pulled the latest repo changes, the imported file may be missing or outdated. @import works at all levels (B is wrong). There's no caching mechanism (C). User-level CLAUDE.md adds to, not overrides, project-level (D).", "domain": "D3"}, {"id": "D3-008", "source": "community-generated", "scenario": "Code Generation with Claude Code", "task_statement": "3.5", "question": "Claude Code generated a function that passes basic tests but has edge case issues. You want to iteratively refine the implementation. What's the recommended approach?", "options": {"A": "Point out the specific failing edge cases, let Claude Code fix them, run tests again, and repeat until all cases pass — using the conversation context to build on previous iterations.", "B": "Delete the function entirely and re-prompt with more detailed specifications including all edge cases upfront.", "C": "Switch to plan mode to redesign the function from scratch before implementing.", "D": "Use --resume with a new session to get a fresh perspective on the edge cases."}, "correct": "A", "explanation": "Iterative refinement in Claude Code leverages the existing conversation context — each fix builds on prior understanding. Pointing out specific failing cases and re-running tests creates a tight feedback loop. Deleting and re-prompting (B) loses context. Plan mode (C) is overkill for incremental fixes. --resume (D) is for resuming interrupted sessions, not restarting fresh.", "domain": "D3"}, {"id": "D3-009", "source": "community-generated", "scenario": "Claude Code for CI/CD", "task_statement": "3.6", "question": "Your team runs Claude Code in a GitHub Actions workflow to review pull requests. The workflow sometimes stalls because Claude Code enters interactive mode waiting for approval to run certain tools. How do you prevent this in CI?", "options": {"A": "Use the -p (--print) flag which runs in non-interactive mode, processing the prompt and outputting results without waiting for user input.", "B": "Set CLAUDE_AUTO_APPROVE=true as an environment variable to skip all approval prompts.", "C": "Add --non-interactive to the claude command to suppress all prompts.", "D": "Pipe 'yes' to stdin: echo 'yes' | claude 'Review this PR' to auto-approve all prompts."}, "correct": "A", "explanation": "The -p (--print) flag is the documented way to run Claude Code in non-interactive mode for CI/CD pipelines. It processes the prompt, outputs results to stdout, and exits without waiting for input. Options B, C, and D describe non-existent features or Unix workarounds that don't properly address Claude Code's architecture.", "domain": "D3"}, {"id": "D3-010", "source": "community-generated", "scenario": "Code Generation with Claude Code", "task_statement": "3.4", "question": "A developer needs to add a simple utility function to format dates. The requirements are clear and well-defined. Should they use plan mode or direct execution?", "options": {"A": "Direct execution — the task is well-defined, simple, and doesn't require exploring the codebase or weighing multiple architectural approaches.", "B": "Plan mode — you should always plan before implementing to ensure the best approach.", "C": "Plan mode — even simple tasks benefit from the safety of exploring before implementing.", "D": "Direct execution with the --safe flag to prevent unintended changes."}, "correct": "A", "explanation": "Direct execution is appropriate for well-defined, simple tasks where the implementation path is clear. Plan mode is designed for complex tasks with multiple valid approaches, large-scale changes, or architectural decisions. Using plan mode for a simple utility function adds unnecessary overhead. The --safe flag (D) doesn't exist.", "domain": "D3"}, {"id": "D3-011", "source": "community-generated", "scenario": "Code Generation with Claude Code", "task_statement": "3.2", "question": "You want a skill that accepts a module name as an argument and generates a boilerplate file. The skill should hint to Claude what argument to provide. How do you configure this in the SKILL.md frontmatter?", "options": {"A": "Use the argument-hint field in the YAML frontmatter to specify what argument the skill expects (e.g., argument-hint: 'module name').", "B": "Include the argument description in the skill's filename (e.g., generate-module-NAME.md).", "C": "Add a required-args field in the frontmatter listing expected parameters.", "D": "Document the expected argument in the CLAUDE.md file rather than in the skill's frontmatter."}, "correct": "A", "explanation": "SKILL.md frontmatter supports argument-hint to describe what argument the skill expects. This helps Claude understand what to pass when invoking the skill. Options B, C, and D either use non-existent mechanisms or misplace the configuration.", "domain": "D3"}, {"id": "D3-012", "source": "community-generated", "scenario": "Code Generation with Claude Code", "task_statement": "3.5", "question": "You're using Claude Code to refactor a complex module. After several iterations, the conversation has become very long and Claude seems to be losing track of earlier decisions. What's the appropriate action?", "options": {"A": "Use /compact to summarize the conversation context, preserving key decisions while freeing context space.", "B": "Start a completely new session and re-explain all the requirements and decisions made so far.", "C": "Use /memory to save important decisions, then start a fresh session that automatically loads them.", "D": "Continue in the current session — Claude doesn't actually lose context within a single conversation."}, "correct": "A", "explanation": "/compact summarizes conversation context to free up space while preserving important information. This is the recommended approach for long sessions where context degradation becomes an issue. Starting fresh (B) loses contextual understanding. /memory (C) saves information across sessions but doesn't address within-session context management as efficiently. Context degradation is a real phenomenon (D is incorrect).", "domain": "D3"}, {"id": "D4-001", "source": "official-exam-guide", "scenario": "Customer Support Resolution Agent", "task_statement": "4.1", "question": "Your agent achieves 55% first-contact resolution, well below the 80% target. Logs show it escalates straightforward cases (standard damage replacements with photo evidence) while attempting to autonomously handle complex situations requiring policy exceptions. What's the most effective way to improve escalation calibration?", "options": {"A": "Add explicit escalation criteria to your system prompt with few-shot examples demonstrating when to escalate versus resolve autonomously.", "B": "Have the agent self-report a confidence score (1-10) before each response and automatically route requests to humans when confidence falls below a threshold.", "C": "Deploy a separate classifier model trained on historical tickets to predict which requests need escalation before the main agent begins processing.", "D": "Implement sentiment analysis to detect customer frustration levels and automatically escalate when negative sentiment exceeds a threshold."}, "correct": "A", "explanation": "Adding explicit escalation criteria with few-shot examples directly addresses the root cause: unclear decision boundaries. This is proportionate before adding infrastructure. Option B fails because LLM self-reported confidence is poorly calibrated. Option C is over-engineered. Option D solves a different problem — sentiment doesn't correlate with case complexity.", "domain": "D4"}, {"id": "D4-002", "source": "community-generated", "scenario": "Structured Data Extraction", "task_statement": "4.3", "question": "You need Claude to extract structured product information from unstructured product descriptions. What approach guarantees the output conforms to your expected schema?", "options": {"A": "Define a tool with a JSON schema specifying the exact output structure, and use tool_use — Claude is required to conform to the schema when calling a tool.", "B": "Include the desired JSON schema in the system prompt and ask Claude to output JSON matching that schema in its response text.", "C": "Use a JSON mode flag that forces all Claude responses to be valid JSON.", "D": "Parse Claude's natural language response and extract structured data using regex patterns."}, "correct": "A", "explanation": "When Claude calls a tool with a JSON schema, schema compliance is guaranteed — the output will always match the defined types, required fields, and structure. This is a mechanical guarantee, not probabilistic. Prompting for JSON (B) works often but can produce malformed output. There's no JSON mode flag (C). Regex parsing (D) is fragile and error-prone.", "domain": "D4"}, {"id": "D4-003", "source": "community-generated", "scenario": "Structured Data Extraction", "task_statement": "4.4", "question": "You're designing a JSON schema for extracting company information from documents. Some documents mention the company's founding year while others don't. The CEO field should always be present. Revenue is sometimes mentioned as 'undisclosed.' How should you design the schema?", "options": {"A": "Make founding_year optional (not in required), ceo as required, and revenue as a nullable field that can be null when 'undisclosed'.", "B": "Make all fields required and use empty strings as defaults when information is missing.", "C": "Make all fields optional so Claude never has to fabricate missing information.", "D": "Use a single 'extracted_data' string field and let Claude format the information however it finds it."}, "correct": "A", "explanation": "Good schema design distinguishes between: optional fields (may not appear in source data — omit from required), required fields (always expected — CEO), and nullable fields (known to exist but value may be 'undisclosed' — use nullable). Empty strings (B) lose the distinction between missing and empty. All optional (C) makes no fields reliable. A single string (D) defeats the purpose of structured extraction.", "domain": "D4"}, {"id": "D4-004", "source": "community-generated", "scenario": "Structured Data Extraction", "task_statement": "4.5", "question": "Your extraction pipeline processes invoices and occasionally produces invalid outputs — for example, negative amounts or dates in the future. You want to add automated quality checks. What's the recommended pattern?", "options": {"A": "Implement a validation-retry loop: validate the extracted output against business rules, and if validation fails, feed the error details back to Claude in a retry prompt so it can correct the specific issues.", "B": "Add all validation rules to the system prompt upfront so Claude never produces invalid output in the first place.", "C": "Run two independent extraction passes and only accept results where both passes agree.", "D": "Post-process the extraction output with a rule engine that silently corrects obvious errors (e.g., flip negative amounts to positive)."}, "correct": "A", "explanation": "Validation-retry loops are the standard pattern: extract, validate against business rules, and if invalid, send the specific errors back to Claude for correction. This leverages Claude's ability to fix targeted issues. Upfront rules (B) help but can't prevent all semantic errors. Dual extraction (C) is expensive and doesn't guarantee correctness. Silent correction (D) may introduce worse errors than it fixes.", "domain": "D4"}, {"id": "D4-005", "source": "community-generated", "scenario": "Structured Data Extraction", "task_statement": "4.2", "question": "Your extraction pipeline handles invoices from multiple vendors with very different formats — some are structured tables, others are free-form text, and some are scanned with OCR artifacts. Extraction quality varies wildly across formats. What's the most effective prompting improvement?", "options": {"A": "Add few-shot examples that cover each distinct format, showing Claude how to handle structured tables, free-form text, and OCR artifacts with correct extraction in each case.", "B": "Write a single, very detailed system prompt describing every possible format variation and how to handle it.", "C": "Create separate extraction pipelines for each vendor format, each with format-specific prompts.", "D": "Use a pre-processing step that normalizes all documents into a standard format before extraction."}, "correct": "A", "explanation": "Few-shot examples are the most effective technique for handling format variation — they show Claude the expected behavior across different input types. The model generalizes from examples better than from abstract instructions. A single detailed prompt (B) becomes unwieldy. Separate pipelines (C) are over-engineered. Pre-processing normalization (D) is fragile and may lose information.", "domain": "D4"}, {"id": "D4-006", "source": "community-generated", "scenario": "Structured Data Extraction", "task_statement": "4.4", "question": "You're designing a schema for extracting product categories. Products should be classified into known categories like 'electronics', 'clothing', 'food', but occasionally a product doesn't fit any category. What's the best schema design?", "options": {"A": "Use an enum with all known categories plus an 'other' value, and include a separate detail field where Claude can describe uncategorized items.", "B": "Use a free-text string field so Claude can describe any category it encounters.", "C": "Use an enum with only the known categories and force Claude to choose the closest match.", "D": "Use an array of strings so Claude can assign multiple categories when uncertain."}, "correct": "A", "explanation": "The 'enum with other + detail field' pattern is a documented best practice for schema design. It constrains outputs to known categories for most cases while gracefully handling edge cases. Free text (B) loses the benefits of structured output. Forced closest match (C) produces inaccurate classifications. Multiple categories (D) doesn't address the 'doesn't fit' problem.", "domain": "D4"}, {"id": "D4-007", "source": "community-generated", "scenario": "Claude Code for CI/CD", "task_statement": "4.6", "question": "Your single Claude instance reviews code it just generated. Testers report that obvious bugs slip through the self-review. What is the architectural root cause?", "options": {"A": "A model retains reasoning context from generation, making it less likely to question its own decisions — an independent review instance (without prior reasoning context) is more effective.", "B": "The model needs a larger context window to hold both the generated code and the review criteria simultaneously.", "C": "Self-review is actually equally effective as independent review, but the review prompt needs to be more specific.", "D": "The model needs extended thinking enabled to perform deeper analysis during review."}, "correct": "A", "explanation": "This is a documented limitation: a model retains reasoning context from generation, making it less likely to question its own decisions in the same session. Independent review instances (without prior reasoning context) are more effective at catching subtle issues. This is a fundamental architectural limitation, not a prompt quality issue (C) or context window issue (B).", "domain": "D4"}, {"id": "D4-008", "source": "official-exam-guide", "scenario": "Claude Code for CI/CD", "task_statement": "4.6", "question": "A pull request modifies 14 files across the stock tracking module. Your single-pass review analyzing all files together produces inconsistent results: detailed feedback for some files but superficial comments for others, obvious bugs missed, and contradictory feedback. How should you restructure the review?", "options": {"A": "Split into focused passes: analyze each file individually for local issues, then run a separate integration-focused pass examining cross-file data flow.", "B": "Require developers to split large PRs into smaller submissions of 3-4 files before the automated review runs.", "C": "Switch to a higher-tier model with a larger context window to give all 14 files adequate attention in one pass.", "D": "Run three independent review passes on the full PR and only flag issues that appear in at least two of the three runs."}, "correct": "A", "explanation": "Splitting into focused passes addresses the root cause: attention dilution when processing many files at once. File-by-file analysis ensures consistent depth, while a separate integration pass catches cross-file issues. Option B shifts burden to developers. Option C misunderstands that larger context windows don't solve attention quality issues. Option D suppresses real bug detection.", "domain": "D4"}, {"id": "D4-009", "source": "community-generated", "scenario": "Structured Data Extraction", "task_statement": "4.3", "question": "You've configured a tool with a JSON schema for extraction, and Claude's outputs always conform to the schema structure. However, the extracted values are sometimes semantically wrong — for example, putting the company name in the CEO field. What does this tell you about tool_use guarantees?", "options": {"A": "Tool_use with JSON schemas guarantees structural compliance (correct types, required fields present) but NOT semantic accuracy — the model can still put wrong values in correct fields.", "B": "This indicates the JSON schema is poorly designed and needs more specific field descriptions.", "C": "This is a model hallucination issue that can be fixed by using a lower temperature setting.", "D": "Tool_use should guarantee both structural and semantic correctness if the schema is properly defined."}, "correct": "A", "explanation": "This is a critical distinction: tool_use with JSON schemas provides mechanical guarantees on structure (types, required fields, enum values) but semantic accuracy — whether the correct value goes in the correct field — remains the model's responsibility and can still be wrong. Better descriptions (B) help but don't guarantee semantic correctness. Temperature (C) doesn't directly address this. Tool_use does not guarantee semantics (D is wrong).", "domain": "D4"}, {"id": "D4-010", "source": "community-generated", "scenario": "Customer Support Resolution Agent", "task_statement": "4.1", "question": "Your agent handles return requests but sometimes approves returns that don't meet the 30-day return policy. You add the rule 'Only approve returns within 30 days of purchase' to the system prompt, but violations continue at 8%. What's the most effective next step?", "options": {"A": "Add few-shot examples showing both approved returns (within 30 days) and denied returns (beyond 30 days), making the decision boundary explicit through concrete scenarios.", "B": "Repeat the 30-day rule multiple times in the system prompt with increasing emphasis (bold, caps, etc.).", "C": "Implement a programmatic check that verifies the purchase date before allowing the agent to call the approve_return tool.", "D": "Add a self-evaluation step where the agent checks its own decision against the 30-day rule before responding."}, "correct": "C", "explanation": "When a clear business rule continues to be violated despite prompt-based instructions, programmatic enforcement is the right escalation. A date check before the tool call provides deterministic guarantees. Few-shot examples (A) improve compliance but remain probabilistic. Repeating rules (B) has diminishing returns. Self-evaluation (D) suffers from the same self-review limitations as the model that made the error.", "domain": "D4"}, {"id": "D4-011", "source": "community-generated", "scenario": "Structured Data Extraction", "task_statement": "4.2", "question": "You're building an extraction system that processes medical records. Early testing shows Claude sometimes misidentifies medication dosages when the document uses abbreviations like 'mg', 'mcg', and 'mL'. What prompting approach addresses this most directly?", "options": {"A": "Provide few-shot examples that include documents with these specific abbreviations, showing the correct extracted dosages and units for each case.", "B": "Add a comprehensive list of medical abbreviations and their meanings to the system prompt.", "C": "Use a pre-processing step to expand all abbreviations before sending the document to Claude.", "D": "Tell Claude to 'be very careful with medical abbreviations' in the system prompt."}, "correct": "A", "explanation": "Few-shot examples showing correct handling of the specific problematic cases (mg, mcg, mL) are the most effective fix. They demonstrate the expected behavior concretely rather than abstractly. An abbreviation list (B) gives knowledge but not behavioral guidance. Pre-processing (C) is fragile. Vague instructions (D) don't provide actionable guidance.", "domain": "D4"}, {"id": "D4-012", "source": "community-generated", "scenario": "Structured Data Extraction", "task_statement": "4.1", "question": "You're designing a prompt for Claude to classify customer support tickets into priority levels (P1-P4). The initial prompt says 'Classify tickets by priority.' Results are inconsistent. What makes the prompt ineffective?", "options": {"A": "The prompt lacks explicit criteria — it should define what characteristics constitute each priority level (e.g., P1 = service outage affecting >100 users, P2 = degraded performance, etc.).", "B": "The prompt is too short — longer prompts always produce better results.", "C": "The prompt needs to specify the output format (JSON vs text) to get consistent results.", "D": "The prompt should instruct Claude to 'think step by step' before classifying."}, "correct": "A", "explanation": "Effective prompts need explicit criteria — concrete definitions of what each category means with examples and boundaries. Without this, Claude has no objective standard to classify against. Length (B) isn't the issue — specificity is. Output format (C) affects structure but not classification quality. Step-by-step thinking (D) helps with reasoning but not with undefined criteria.", "domain": "D4"}, {"id": "D5-001", "source": "community-generated", "scenario": "Multi-Agent Research System", "task_statement": "5.1", "question": "Your multi-agent research system aggregates findings from 5 subagents into a single context for the synthesis agent. Testing reveals the synthesis agent consistently misses findings from subagents 3 and 4 while correctly incorporating findings from 1, 2, and 5. What is the most likely cause?", "options": {"A": "The 'lost in the middle' effect — models process content at the beginning and end more reliably, while content in the middle of long inputs gets less attention.", "B": "Subagents 3 and 4 are producing lower-quality output that the synthesis agent correctly ignores.", "C": "The synthesis agent's system prompt prioritizes findings from certain subagents over others.", "D": "Context window overflow is causing the middle sections to be silently truncated."}, "correct": "A", "explanation": "The 'lost in the middle' effect is a well-documented phenomenon where models process content at the beginning and end of long inputs more reliably. Findings from subagents 3 and 4 (in the middle) get less attention. The fix is to restructure context positioning: place key summaries at the top, use explicit section headers, and consider reordering important findings.", "domain": "D5"}, {"id": "D5-002", "source": "community-generated", "scenario": "Customer Support Resolution Agent", "task_statement": "5.2", "question": "Your support agent needs to handle cases where it's uncertain about the correct resolution. You want to implement a human escalation pattern that doesn't disrupt the customer experience. What's the best approach?", "options": {"A": "Have the agent explain to the customer that it's connecting them with a specialist, pass full conversation context and the agent's preliminary assessment to the human reviewer, and allow the human to either approve the agent's suggestion or provide an alternative.", "B": "Silently route uncertain cases to a human queue without informing the customer, to avoid undermining confidence in the AI system.", "C": "Have the agent make its best guess and flag the case for post-hoc human review within 24 hours.", "D": "Require all responses to be approved by a human reviewer before being sent to the customer."}, "correct": "A", "explanation": "Effective human-in-the-loop patterns maintain transparency with the customer, pass full context to the human (including the agent's assessment), and allow the human to make the final decision. Silent routing (B) may confuse customers. Best-guess-then-review (C) risks incorrect resolutions. Blanket human approval (D) defeats the purpose of automation.", "domain": "D5"}, {"id": "D5-003", "source": "community-generated", "scenario": "Multi-Agent Research System", "task_statement": "5.3", "question": "Your research system's web search subagent fails with a timeout. The coordinator receives the error and needs to decide what to do. The document analysis subagent completed successfully. What's the best error handling strategy?", "options": {"A": "Proceed with partial results from the document analysis agent, annotate the final output with coverage gaps indicating web search data is missing, and optionally retry the web search with a simplified query.", "B": "Fail the entire research task since incomplete data produces unreliable results.", "C": "Retry the web search indefinitely until it succeeds, since the research isn't complete without it.", "D": "Substitute the web search results with the coordinator's own knowledge to fill the gap."}, "correct": "A", "explanation": "Graceful degradation with annotated gaps is the recommended pattern. The coordinator should proceed with available results, clearly mark what's missing, and optionally attempt recovery. Failing entirely (B) is disproportionate. Indefinite retries (C) can hang the system. Using the coordinator's knowledge (D) introduces unverified information without transparency.", "domain": "D5"}, {"id": "D5-004", "source": "community-generated", "scenario": "Multi-Agent Research System", "task_statement": "5.4", "question": "Your coordinator agent has been processing a complex research request for 20+ turns. You notice the quality of its task decomposition and delegation decisions is declining — it's assigning redundant tasks and forgetting earlier findings. What's happening and how do you address it?", "options": {"A": "Context degradation — as conversation length grows, earlier information receives less attention. Address it by using progressive summarization of completed work and spawning fresh subagents for subsequent questions.", "B": "The model is running out of tokens and needs a larger context window model.", "C": "This is expected behavior and cannot be mitigated — long conversations always degrade.", "D": "The coordinator needs more explicit instructions in the system prompt to remember all prior fin
