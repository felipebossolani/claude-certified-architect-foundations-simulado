dings."}, "correct": "A", "explanation": "Context degradation in long interactions is a real phenomenon that can be mitigated. Progressive summarization condenses completed work while preserving key findings. Spawning fresh subagents gives them clean context without the accumulated noise. This isn't simply a context window size issue (B). It can be mitigated (C is wrong). More instructions (D) add to the context burden.", "domain": "D5"}, {"id": "D5-005", "source": "community-generated", "scenario": "Structured Data Extraction", "task_statement": "5.5", "question": "Your extraction pipeline processes legal contracts. For high-value contracts, you want the system to flag items it's less certain about for human review rather than silently producing potentially incorrect extractions. What pattern achieves this?", "options": {"A": "Have the model self-report a confidence level alongside each extracted field, then route low-confidence extractions to human review based on a calibrated threshold.", "B": "Run extraction twice with different temperatures and flag fields where the outputs disagree.", "C": "Add 'only extract information you're 100% confident about' to the system prompt.", "D": "Use a stricter JSON schema that rejects any field the model isn't certain about."}, "correct": "A", "explanation": "Confidence self-reporting alongside extraction enables calibrated routing to human review. While LLM confidence isn't perfectly calibrated, it provides useful signal for identifying uncertain extractions. Dual extraction (B) catches some inconsistencies but doubles cost. Absolute confidence instructions (C) cause over-omission. JSON schemas (D) can't express confidence levels.", "domain": "D5"}, {"id": "D5-006", "source": "community-generated", "scenario": "Multi-Agent Research System", "task_statement": "5.6", "question": "Your research system produces a final report that cites statistics and findings from multiple subagents. A reviewer questions the source of a specific statistic. The system cannot trace which subagent produced it or which original source it came from. What's missing?", "options": {"A": "Information provenance — each finding should carry source attribution metadata through the agent pipeline, so the final report can trace any claim back to its original source and the subagent that produced it.", "B": "A centralized logging system that records all API calls made by all subagents.", "C": "A citation database where subagents deposit their sources for later retrieval.", "D": "The synthesis agent should include footnotes with URLs for all statistics."}, "correct": "A", "explanation": "Information provenance means carrying source attribution through the entire pipeline. Each finding should include metadata about its original source and which agent produced it, preserved through aggregation and synthesis. Logging (B) captures API calls but not the semantic connection between findings and sources. A citation database (C) and footnotes (D) are partial solutions that don't address the structural need for provenance throughout the pipeline.", "domain": "D5"}, {"id": "D5-007", "source": "community-generated", "scenario": "Customer Support Resolution Agent", "task_statement": "5.2", "question": "Your agent is handling a return request for a customer who is becoming increasingly frustrated. The agent has attempted a resolution twice but the customer rejects both options. Company policy allows a manager override for exceptional cases. When should the agent escalate?", "options": {"A": "After the second failed resolution attempt — the agent should recognize that repeated failures with an escalating customer indicate it cannot resolve the case and should transfer to a human with full conversation context and a summary of attempted resolutions.", "B": "Only when the customer explicitly asks to speak with a manager.", "C": "Immediately at the first sign of frustration, before attempting any resolution.", "D": "Never — the agent should continue trying different approaches until the customer is satisfied or disconnects."}, "correct": "A", "explanation": "Effective escalation patterns recognize when an agent has exhausted its capabilities — repeated failed resolutions with increasing frustration is a clear signal. The escalation should include full context and what was already tried. Waiting for explicit requests (B) misses cases where customers don't know to ask. Immediate escalation (C) prevents the agent from handling routine cases. Never escalating (D) guarantees poor customer outcomes.", "domain": "D5"}, {"id": "D5-008", "source": "community-generated", "scenario": "Multi-Agent Research System", "task_statement": "5.1", "question": "You're passing a large aggregated context (findings from 5 subagents) to your synthesis agent. How should you structure this context to mitigate the 'lost in the middle' effect?", "options": {"A": "Place a key summary of all findings at the top, use explicit section headers for each subagent's contribution, and put the synthesis instructions at the end — prioritizing critical information at the beginning and end.", "B": "Order the findings alphabetically by subagent name for consistency.", "C": "Interleave findings from different subagents to prevent the model from getting bored with any single source.", "D": "Place the synthesis instructions at the top, followed by all findings in the order they were received."}, "correct": "A", "explanation": "To mitigate the 'lost in the middle' effect: place key summaries at the beginning (where attention is highest), use explicit section headers to create structure, and put important instructions at the end (second-highest attention area). Alphabetical ordering (B) is arbitrary. Interleaving (C) doesn't address the positional attention issue. Instructions at the top with findings below (D) risks the middle findings being overlooked.", "domain": "D5"}, {"id": "D5-009", "source": "official-exam-guide", "scenario": "Claude Code for CI/CD", "task_statement": "5.4", "question": "Your team wants to reduce API costs for automated analysis. Currently, real-time Claude calls power two workflows: (1) a blocking pre-merge check that must complete before developers can merge, and (2) a technical debt report generated overnight for review the next morning. Your manager proposes switching both to the Message Batches API for its 50% cost savings. How should you evaluate this proposal?", "options": {"A": "Use batch processing for the technical debt reports only; keep real-time calls for pre-merge checks.", "B": "Switch both workflows to batch processing with status polling to check for completion.", "C": "Keep real-time calls for both workflows to avoid batch result ordering issues.", "D": "Switch both to batch processing with a timeout fallback to real-time if batches take too long."}, "correct": "A", "explanation": "The Message Batches API offers 50% cost savings but has processing times up to 24 hours with no guaranteed latency SLA. Ideal for overnight batch jobs but unsuitable for blocking pre-merge checks where developers wait for results. Option B is wrong because 'often faster' completion isn't acceptable for blocking workflows. Option C misunderstands batch result correlation. Option D adds unnecessary complexity.", "domain": "D5"}, {"id": "D5-010", "source": "community-generated", "scenario": "Structured Data Extraction", "task_statement": "5.5", "question": "Your extraction system encounters two credible sources with conflicting statistics about a company's revenue. Source A says $4.2B and Source B says $3.8B. How should the system handle this?", "options": {"A": "Preserve both values with source attribution, distinguishing well-established findings from contested ones, rather than arbitrarily selecting one.", "B": "Use the most recent source's value as the correct one.", "C": "Average the two values and report $4.0B as a compromise.", "D": "Discard both values since conflicting data indicates unreliable sources."}, "correct": "A", "explanation": "When sources conflict, the system should preserve both values with clear source attribution. This maintains information integrity and allows downstream consumers to make informed decisions. Selecting one (B), averaging (C), or discarding both (D) all lose valuable information and make opaque decisions that should be left to the human reviewer.", "domain": "D5"}, {"id": "SG-T01-Q01", "source": "sgridworks", "scenario": "Customer Support Resolution Agent", "task_statement": "1.1", "domain": "D1", "question": "You are building a customer support agent. Your agentic loop currently checks if the assistant's response contains the phrase \"I've completed the task\" to decide when to stop iterating. During testing, the agent sometimes generates this phrase mid-conversation while still needing to call additional tools. What should you change?", "options": {"A": "Add additional termination phrases like \"No further action needed\" to make detection more robust.", "B": "Check `stop_reason` in the API response: continue when it equals `\"tool_use\"` and terminate when it equals `\"end_turn\"`.", "C": "Set a maximum iteration count and stop after that many loops regardless of the response content.", "D": "Parse the assistant's response for tool call JSON to determine if more tools need to be invoked."}, "correct": "B", "explanation": "The `stop_reason` field is the reliable, API-provided mechanism for determining whether the model wants to call a tool or has finished its response. Parsing natural language (A, D) is an anti-pattern -- the model may include completion-sounding phrases while still intending to call tools. Arbitrary iteration caps (C) are a secondary safety measure, not a primary stopping mechanism."}, {"id": "SG-T01-Q02", "source": "sgridworks", "scenario": "Customer Support Resolution Agent", "task_statement": "1.1", "domain": "D1", "question": "Your agentic loop processes tool results but does not append them to the conversation history before sending the next request. The agent appears to \"forget\" what tools returned and re-calls the same tools repeatedly. What is the root cause?", "options": {"A": "The model's context window is too small to hold the tool results.", "B": "Tool results must be appended to the conversation history so the model can reason about them in the next iteration.", "C": "The model needs a system prompt instruction telling it not to repeat tool calls.", "D": "You need to implement a deduplication layer that prevents the same tool from being called twice."}, "correct": "B", "explanation": "Tool results must be added to the conversation history between iterations. Without this, the model has no record of previous tool outputs and cannot incorporate that information into its reasoning. The issue is not context window size (A), prompt instructions (C), or deduplication (D) -- it is the fundamental requirement that tool results be part of the conversation context."}, {"id": "SG-T01-Q03", "source": "sgridworks", "scenario": "Customer Support Resolution Agent", "task_statement": "1.1", "domain": "D1", "question": "A developer implements an agentic loop with `max_iterations = 5` as the primary stopping condition. The agent frequently hits this limit mid-task, producing incomplete responses. The developer's fix is to increase the limit to 20. What is the better approach?", "options": {"A": "Use `stop_reason == \"end_turn\"` as the primary termination condition, with the iteration cap as a safety fallback only.", "B": "Set `max_iterations = 50` to ensure the agent always has enough room to complete.", "C": "Remove the iteration cap entirely and let the agent run until it finishes naturally.", "D": "Add a timer-based cutoff (e.g., 60 seconds) instead of an iteration count."}, "correct": "A", "explanation": "The primary loop control should be the model's own `stop_reason`. When the model returns `\"end_turn\"`, it has decided it is done. An iteration cap should exist as a safety fallback to prevent runaway loops, but should not be the primary mechanism for determining when the agent is finished. Removing caps entirely (C) is dangerous. Increasing them (B) just moves the problem. Timer-based cutoffs (D) do not align with task completion."}, {"id": "SG-T01-Q04", "source": "sgridworks", "scenario": "Customer Support Resolution Agent", "task_statement": "1.1", "domain": "D1", "question": "In your agentic loop, after the model returns a response with `stop_reason: \"tool_use\"`, you execute the requested tool and get a result. What should happen next?", "options": {"A": "Send a new API request with only the tool result as the user message.", "B": "Append the assistant's response (with the tool call) and the tool result to the conversation history, then send the full updated history in the next API request.", "C": "Parse the tool result and include a summary in the next system prompt update.", "D": "Store the tool result in a database and include a reference ID in the next message."}, "correct": "B", "explanation": "The complete conversation history, including the assistant's tool call request and the tool's result, must be appended and sent in the next API request. This gives the model full context to reason about the result and decide what to do next. Sending only the tool result (A) loses conversation context. Summarizing in the system prompt (C) or storing externally (D) breaks the conversational flow the model needs."}, {"id": "SG-T01-Q05", "source": "sgridworks", "scenario": "Customer Support Resolution Agent", "task_statement": "1.1", "domain": "D1", "question": "You notice your agentic loop terminates when the assistant message contains text content alongside a tool call. The code checks `if response.content[0].type == \"text\": break`. Why is this incorrect?", "options": {"A": "The `content` array can contain both text blocks and tool_use blocks in the same response. The model often explains its reasoning (text) before or after requesting a tool call.", "B": "Text content is only present in error responses, so this check is correct for normal flow.", "C": "The `content` array always has exactly one element, so checking the first element is fine.", "D": "Tool calls are never mixed with text content in the same response."}, "correct": "A", "explanation": "A single assistant response can contain both text blocks (the model's reasoning or explanation) and `tool_use` blocks in the same `content` array. Checking for text content as a completion indicator is an anti-pattern because the model frequently explains its reasoning alongside tool calls. The correct check is `stop_reason`, not content type inspection."}, {"id": "SG-T01-Q06", "source": "sgridworks", "scenario": "Customer Support Resolution Agent", "task_statement": "1.1", "domain": "D1", "question": "Your customer support agent uses an agentic loop. In production, you observe that the agent sometimes enters an infinite loop, calling the same two tools alternately without making progress. What is the best mitigation?", "options": {"A": "Parse each tool result for the word \"error\" and terminate the loop if detected.", "B": "Maintain a reasonable iteration safety cap as a fallback and monitor for repeated identical tool calls as a signal to investigate prompt or tool design issues.", "C": "After each tool call, ask the model \"Are you done?\" and terminate if it says yes.", "D": "Limit each tool to being called only once per session."}, "correct": "B", "explanation": "An iteration safety cap prevents infinite loops, while monitoring for repeated identical calls helps identify root causes (poor tool descriptions, ambiguous results). Parsing for \"error\" (A) is unreliable natural language parsing. Asking \"Are you done?\" (C) adds unnecessary turns. Limiting tools to one call (D) is too restrictive -- legitimate workflows may need to call the same tool multiple times with different parameters."}, {"id": "SG-T01-Q07", "source": "sgridworks", "scenario": "Customer Support Resolution Agent", "task_statement": "1.1", "domain": "D1", "question": "What distinguishes model-driven decision-making in an agentic loop from a pre-configured decision tree?", "options": {"A": "Model-driven decision-making is slower but more accurate than decision trees.", "B": "In model-driven loops, Claude reasons about which tool to call next based on the current context, rather than following a fixed sequence of tool calls.", "C": "Decision trees use the API while model-driven approaches use local inference.", "D": "Model-driven approaches require fewer tools to be defined."}, "correct": "B", "explanation": "The key distinction is that in model-driven agentic loops, Claude analyzes the current context (conversation history, tool results, user request) and dynamically decides which tool to call. This contrasts with pre-configured decision trees where the sequence of tool calls is determined by hard-coded logic. Model-driven approaches are more flexible and can adapt to novel situations."}, {"id": "SG-T01-Q08", "source": "sgridworks", "scenario": "Customer Support Resolution Agent", "task_statement": "1.1", "domain": "D1", "question": "You are designing an agentic loop for a billing dispute agent. The agent must: (1) look up the customer, (2) retrieve the disputed charge, (3) check the refund policy, and (4) either process the refund or escalate. A junior developer suggests hard-coding this sequence. What is the tradeoff?", "options": {"A": "Hard-coding is always better because it guarantees the correct order.", "B": "Hard-coding ensures the sequence but loses the model's ability to adapt when steps fail or when context makes some steps unnecessary. A hybrid approach using programmatic prerequisites for critical steps and model-driven logic for adaptive steps is often better.", "C": "Model-driven is always better because it is more flexible.", "D": "There is no difference -- the model will follow the same sequence either way."}, "correct": "B", "explanation": "Neither extreme is always best. Hard-coding ensures order but loses adaptability (e.g., if the customer already provided their ID, `get_customer` might not be needed). Model-driven logic allows adaptation but might skip critical steps. The best approach is a hybrid: use programmatic enforcement for non-negotiable prerequisites (e.g., customer verification before refunds) while letting the model reason about optional or adaptive steps."}, {"id": "SG-T01-Q09", "source": "sgridworks", "scenario": "Customer Support Resolution Agent", "task_statement": "1.1", "domain": "D1", "question": "Your agentic loop implementation sends the API request, receives a response, and checks `stop_reason`. The response has `stop_reason: \"max_tokens\"`. What does this indicate and how should you handle it?", "options": {"A": "The model finished its response normally. Terminate the loop.", "B": "The model's response was truncated because it hit the `max_tokens` limit. You should continue the conversation so the model can complete its response, or increase `max_tokens`.", "C": "The model encountered an error. Retry the same request.", "D": "The model wants to call a tool but ran out of space to specify which one. Terminate and report an error."}, "correct": "B", "explanation": "`stop_reason: \"max_tokens\"` means the response was cut off before the model finished. This is distinct from `\"end_turn\"` (model chose to stop) and `\"tool_use\"` (model wants to call a tool). The response is incomplete and may contain a partial tool call or truncated text. You should either increase `max_tokens` or send a continuation request."}, {"id": "SG-T01-Q10", "source": "sgridworks", "scenario": "Customer Support Resolution Agent", "task_statement": "1.1", "domain": "D1", "question": "Which of the following is the correct agentic loop control flow?", "options": {"A": "Send request -> Check if response contains tool JSON -> Execute tool -> Loop until no tool JSON found", "B": "Send request -> Check `stop_reason` -> If `\"tool_use\"`: execute tool, append results to history, send next request -> If `\"end_turn\"`: return final response", "C": "Send request -> Execute all tools defined in the system -> Append results -> Send next request -> Check for \"done\" in response text", "D": "Send request -> If response has text content, return it -> If response has tool content, execute and loop"}, "correct": "B", "explanation": "The correct flow is: (1) send the API request, (2) check `stop_reason`, (3) if `\"tool_use\"`, execute the requested tools, append both the assistant's response and tool results to the conversation history, and send the next request, (4) if `\"end_turn\"`, return the final response. This is the canonical agentic loop pattern. Options A and D check content types instead of `stop_reason`. Option C executes tools proactively rather than on-demand."}, {"id": "SG-T02-Q01", "source": "sgridworks", "scenario": "Multi-Agent Research System", "task_statement": "1.2-1.3", "domain": "D1", "question": "You are building a multi-agent research system with a coordinator, a web search agent, a document analysis agent, and a synthesis agent. The synthesis agent produces reports that consistently miss findings from the document analysis agent. Investigation shows the coordinator passes web search results to synthesis but only passes a summary reference to the document analysis output. What is the most likely fix?", "options": {"A": "Increase the synthesis agent's context window to accommodate more data.", "B": "Include complete findings from the document analysis agent directly in the synthesis subagent's prompt, not just summary references.", "C": "Have the synthesis agent call the document analysis agent directly to retrieve the full results.", "D": "Add instructions to the coordinator to always include all results, assuming the current prompt just needs better wording."}, "correct": "B", "explanation": "Subagent context must be explicitly provided -- subagents do not inherit parent context or share memory. The coordinator must include the complete document analysis findings directly in the synthesis agent's prompt. Option C violates the hub-and-spoke pattern (subagents should not call each other directly). Option D assumes the issue is prompt wording rather than missing data in the prompt. Option A does not address missing data."}, {"id": "SG-T02-Q02", "source": "sgridworks", "scenario": "Multi-Agent Research System", "task_statement": "1.2-1.3", "domain": "D1", "question": "Your coordinator agent needs to invoke three subagents: web search, document analysis, and fact checking. The web search and document analysis can run independently, but fact checking needs the results from both. What is the optimal execution pattern?", "options": {"A": "Run all three sequentially: web search, then document analysis, then fact checking.", "B": "Have the coordinator emit two Task tool calls in a single response (web search + document analysis) for parallel execution, then invoke fact checking in the next turn with both results.", "C": "Run all three in parallel and have fact checking poll for results from the other two.", "D": "Create a pipeline where web search feeds into document analysis which feeds into fact checking."}, "correct": "B", "explanation": "Parallel subagent execution is achieved by emitting multiple Task tool calls in a single coordinator response. Since web search and document analysis are independent, they can run in parallel. Fact checking depends on both results, so it must run after both complete. Option A is unnecessarily sequential. Option C is not how subagent coordination works (no polling). Option D creates false dependencies between web search and document analysis."}, {"id": "SG-T02-Q03", "source": "sgridworks", "scenario": "Multi-Agent Research System", "task_statement": "1.2-1.3", "domain": "D1", "question": "A team configures their coordinator agent but forgets to include \"Task\" in the `allowedTools` list. What happens when the coordinator tries to spawn a subagent?", "options": {"A": "The coordinator automatically gains Task tool access when it detects the need for subagents.", "B": "The coordinator cannot spawn subagents because Task is not in its allowed tools.", "C": "The coordinator spawns subagents but they run with restricted permissions.", "D": "The system falls back to running the subagent's work inline within the coordinator's context."}, "correct": "B", "explanation": "`allowedTools` must explicitly include \"Task\" for a coordinator to invoke subagents. Without it, the coordinator simply cannot call the Task tool and will be unable to delegate work. There is no automatic fallback or permission escalation."}, {"id": "SG-T02-Q04", "source": "sgridworks", "scenario": "Multi-Agent Research System", "task_statement": "1.2-1.3", "domain": "D1", "question": "Your multi-agent system uses a coordinator that delegates research on \"renewable energy policy\" to three subagents. You observe the subagents frequently research overlapping topics, producing duplicate findings that waste tokens and processing time. What is the most effective fix?", "options": {"A": "Add deduplication logic in the coordinator that filters duplicate findings after all subagents complete.", "B": "Partition the research scope across subagents to minimize overlap (e.g., assign distinct subtopics or source types to each agent).", "C": "Reduce the number of subagents to one to eliminate duplication entirely.", "D": "Have each subagent check with the coordinator before researching each subtopic."}, "correct": "B", "explanation": "The coordinator should partition the research scope so each subagent has a distinct assignment (e.g., one handles academic sources, one handles news, one handles government reports, or each covers a distinct subtopic). This minimizes duplication at the source. Option A wastes resources by allowing duplication then filtering. Option C loses the benefits of parallelism. Option D adds excessive coordination overhead."}, {"id": "SG-T02-Q05", "source": "sgridworks", "scenario": "Multi-Agent Research System", "task_statement": "1.2-1.3", "domain": "D1", "question": "In a hub-and-spoke architecture, a subagent encounters an error while analyzing a document. The developer configures the subagent to send a message directly to the synthesis subagent explaining the failure. Why is this problematic?", "options": {"A": "Subagents cannot communicate with each other -- all inter-subagent communication must route through the coordinator for observability, consistent error handling, and controlled information flow.", "B": "The synthesis agent might not be running yet when the error occurs.", "C": "Direct communication is fine but should use a different message format than normal results.", "D": "The error should be logged to a file instead of communicated to any agent."}, "correct": "A", "explanation": "In hub-and-spoke architecture, the coordinator manages all inter-subagent communication. Routing through the coordinator ensures observability (you can log and monitor all agent interactions), consistent error handling (the coordinator applies uniform recovery strategies), and controlled information flow. Direct subagent-to-subagent communication bypasses all of these guarantees."}, {"id": "SG-T02-Q06", "source": "sgridworks", "scenario": "Multi-Agent Research System", "task_statement": "1.2-1.3", "domain": "D1", "question": "You need to configure subagent definitions. Which elements should an `AgentDefinition` include?", "options": {"A": "Only a system prompt -- everything else is inherited from the coordinator.", "B": "Descriptions, system prompts, and tool restrictions for each subagent type.", "C": "Only tool restrictions -- the model determines its own role from context.", "D": "A reference to the coordinator's configuration that the subagent clones."}, "correct": "B", "explanation": "An `AgentDefinition` should include descriptions (explaining the agent's role and capabilities), system prompts (guiding its behavior), and tool restrictions (limiting which tools it can access). Subagents do not inherit from the coordinator -- they operate with isolated context and need explicit configuration."}, {"id": "SG-T02-Q07", "source": "sgridworks", "scenario": "Multi-Agent Research System", "task_statement": "1.2-1.3", "domain": "D1", "question": "Your coordinator receives results from a web search subagent. The results contain source URLs, article titles, and extracted content, but this metadata is mixed into the prose of the findings. When the synthesis agent later uses these results, source attribution is lost. What should you change?", "options": {"A": "Have the synthesis agent search for URLs in the text using regex to extract sources.", "B": "Use structured data formats to separate content from metadata (source URLs, document names, page numbers) when passing context between agents.", "C": "Have the coordinator add source attributions after synthesis is complete.", "D": "Include instructions in the synthesis agent's prompt to preserve any URLs it finds."}, "correct": "B", "explanation": "Using structured data formats (e.g., JSON or clearly delimited sections) to separate content from metadata ensures that source information is preserved through the synthesis step. This is a foundational principle of inter-agent context passing. Options A and D rely on unreliable text parsing. Option C is too late -- attribution context may already be lost."}, {"id": "SG-T02-Q08", "source": "sgridworks", "scenario": "Multi-Agent Research System", "task_statement": "1.2-1.3", "domain": "D1", "question": "Your coordinator agent always routes every query through the full pipeline: web search -> document analysis -> synthesis -> report generation, even for simple factual questions that only need a web search. What should you change?", "options": {"A": "Add a timeout to each agent so simple queries complete faster.", "B": "Design the coordinator to analyze query requirements and dynamically select which subagents to invoke rather than always routing through the full pipeline.", "C": "Create a separate \"simple query\" coordinator that only uses web search.", "D": "Add a classifier model before the coordinator that decides the pipeline."}, "correct": "B", "explanation": "The coordinator should dynamically assess query complexity and invoke only the subagents needed. Simple factual queries might only need web search; complex analytical queries might need the full pipeline. This is a core coordinator responsibility: task decomposition and selective delegation. Option C creates unnecessary infrastructure duplication. Option D adds complexity when the coordinator itself can make this decision."}, {"id": "SG-T02-Q09", "source": "sgridworks", "scenario": "Multi-Agent Research System", "task_statement": "1.2-1.3", "domain": "D1", "question": "You are designing a coordinator prompt for a research system. A colleague suggests writing detailed step-by-step procedural instructions: \"Step 1: Call web search agent with query X. Step 2: Take result and call document analysis agent...\" Why might this approach be suboptimal?", "options": {"A": "Procedural instructions are always better because they ensure consistent behavior.", "B": "Coordinator prompts should specify research goals and quality criteria rather than step-by-step procedures, to enable subagent adaptability to different query types.", "C": "Procedural instructions use more tokens than goal-oriented instructions.", "D": "The coordinator cannot follow step-by-step instructions with the Agent SDK."}, "correct": "B", "explanation": "Goal-oriented prompts allow the coordinator to adapt its strategy based on the specific query. Procedural instructions lock in a single approach regardless of context, preventing the coordinator from skipping unnecessary steps, running agents in parallel, or adapting to unexpected results. The coordinator should know what to achieve and what quality standards to meet, not be micromanaged on how to achieve it."}, {"id": "SG-T02-Q10", "source": "sgridworks", "scenario": "Multi-Agent Research System", "task_statement": "1.2-1.3", "domain": "D1", "question": "You want to explore two different testing strategies for a legacy codebase from a shared analysis baseline. You have already completed an initial codebase analysis. What is the best approach?", "options": {"A": "Start two completely new sessions, re-running the codebase analysis in each.", "B": "Use `fork_session` to create independent branches from the shared analysis baseline to explore each strategy without re-doing the initial analysis.", "C": "Use the same session for both explorations sequentially, clearing context between them.", "D": "Create two subagents that each receive a copy of the analysis and explore one strategy."}, "correct": "B", "explanation": "`fork_session` creates independent branches from a shared analysis baseline. Both branches retain the initial codebase analysis context and can explore divergent approaches independently. Option A wastes time re-running analysis. Option C risks context contamination between explorations. Option D could work but `fork_session` is the purpose-built mechanism for this exact use case."}, {"id": "SG-T03-Q01", "source": "sgridworks", "scenario": "Customer Support Resolution Agent", "task_statement": "1.4-1.7", "domain": "D1", "question": "Your customer support agent must verify customer identity before processing any refund. In production, logs show the agent skips `get_customer` and calls `process_refund` directly in 8% of cases, despite clear system prompt instructions. What change provides the strongest guarantee?", "options": {"A": "Add bold, capitalized instructions in the system prompt: \"YOU MUST ALWAYS call get_customer BEFORE process_refund.\"", "B": "Add 5 few-shot examples showing the agent always calling get_customer first.", "C": "Implement a programmatic prerequisite that blocks `process_refund` until `get_customer` has returned a verified customer ID.", "D": "Add a confidence check: have the agent rate its certainty about the customer's identity before proceeding."}, "correct": "C", "explanation": "When errors have financial consequences, programmatic enforcement is required. Prompt-based approaches (A, B) have a non-zero failure rate -- even with strong instructions, the model will occasionally deviate. Confidence self-assessment (D) is unreliable. Only programmatic prerequisites provide deterministic guarantees that the required sequence is followed every time."}, {"id": "SG-T03-Q02", "source": "sgridworks", "scenario": "Customer Support Resolution Agent", "task_statement": "1.4-1.7", "domain": "D1", "question": "Your agent handles a customer request: \"I want to return my damaged headphones and also change my shipping address for order #5678.\" The agent resolves the address change but forgets to handle the return. What architectural change would prevent this?", "options": {"A": "Add a system prompt instruction: \"Always address all parts of the customer's message.\"", "B": "Decompose multi-concern requests into distinct items, investigate each in parallel using shared context, then synthesize a unified resolution.", "C": "Limit customers to one request per message.", "D": "Add a checklist tool that the agent must mark items complete before responding."}, "correct": "B", "explanation": "The solution is to explicitly decompose multi-concern requests into separate items and handle each one. Using shared context allows related items to inform each other, while parallel investigation prevents the agent from losing track of items. Option A is a prompt instruction that may help but does not guarantee coverage. Option C degrades the customer experience. Option D is a partial solution but does not address the decomposition step."}, {"id": "SG-T03-Q03", "source": "sgridworks", "scenario": "Customer Support Resolution Agent", "task_statement": "1.4-1.7", "domain": "D1", "question": "A PostToolUse hook receives order data from different MCP tools. Tool A returns timestamps as Unix epochs, Tool B returns ISO 8601 strings, and Tool C returns dates as \"MM/DD/YYYY\". The agent struggles to compare dates across tool results. What should the hook do?", "options": {"A": "Add instructions to the system prompt explaining each date format so the model can convert them.", "B": "Normalize all date formats to a consistent format (e.g., ISO 8601) in the PostToolUse hook before the model processes them.", "C": "Create separate agents for each tool, each specialized in its date format.", "D": "Store all dates in a database and let the agent query them with SQL."}, "correct": "B", "explanation": "PostToolUse hooks are designed to intercept and transform tool results before the model processes them. Normalizing heterogeneous data formats (timestamps, dates, status codes) in hooks ensures the model always sees consistent data without needing to understand each tool's format. This is deterministic and reliable, unlike prompt-based approaches (A)."}, {"id": "SG-T03-Q04", "source": "sgridworks", "scenario": "Customer Support Resolution Agent", "task_statement": "1.4-1.7", "domain": "D1", "question": "Your company policy prohibits refunds over $500 without manager approval. You need to enforce this in your customer support agent. Which approach provides guaranteed compliance?", "options": {"A": "Include the $500 limit in the system prompt with clear instructions to escalate above that amount.", "B": "Implement a tool call interception hook that blocks `process_refund` when the amount exceeds $500 and redirects to a human escalation workflow.", "C": "Add few-shot examples showing the agent escalating for large refunds.", "D": "Have the agent calculate the refund amount and ask for confirmation before processing."}, "correct": "B", "explanation": "Tool call interception hooks provide deterministic enforcement of business rules. The hook inspects the tool call parameters before execution and blocks policy-violating actions, redirecting to alternative workflows. This guarantees compliance -- the refund physically cannot be processed through the system. Prompt-based approaches (A, C) have a non-zero failure rate. Agent self-checking (D) is also probabilistic."}, {"id": "SG-T03-Q05", "source": "sgridworks", "scenario": "Customer Support Resolution Agent", "task_statement": "1.4-1.7", "domain": "D1", "question": "When escalating a complex case to a human agent, your AI agent currently transfers the conversation with \"Transferring you to a human agent.\" The human agent has no access to the conversation transcript. What information should the handoff include?", "options": {"A": "Just the customer's name and account number.", "B": "A structured handoff summary: customer ID, root cause analysis, refund amount, recommended action, and what has already been investigated.", "C": "The entire conversation transcript.", "D": "A sentiment score and customer satisfaction prediction."}, "correct": "B", "explanation": "Structured handoff summaries should include actionable information: customer ID, root cause analysis, what was investigated, refund amount, and recommended action. This gives the human agent enough context to continue without re-investigating. The full transcript (C) is too verbose. Just name/account (A) requires complete re-investigation. Sentiment scores (D) are not actionable."}, {"id": "SG-T03-Q06", "source": "sgridworks", "scenario": "Customer Support Resolution Agent", "task_statement": "1.4-1.7", "domain": "D1", "question": "What is the key distinction between using hooks for enforcement versus prompt instructions?", "options": {"A": "Hooks are faster to implement than prompt instructions.", "B": "Hooks provide deterministic guarantees while prompt instructions provide probabilistic compliance -- choose hooks when business rules require guaranteed compliance.", "C": "Prompt instructions are more reliable than hooks because the model understands context.", "D": "Hooks and prompt instructions provide equivalent compliance rates."}, "correct": "B", "explanation": "This is a fundamental distinction tested throughout the exam. Hooks operate programmatically outside the model's decision-making, providing deterministic (100%) compliance. Prompt instructions influence the model's behavior but have a non-zero failure rate. For critical business rules with financial, legal, or safety consequences, hooks are required. For best-effort guidance where occasional deviations are acceptable, prompt instructions suffice."}, {"id": "SG-T03-Q07", "source": "sgridworks", "scenario": "Customer Support Resolution Agent", "task_statement": "1.4-1.7", "domain": "D1", "question": "You are resuming a Claude Code session after making several code changes to files the agent previously analyzed. The session context still contains the old analysis. What should you do?", "options": {"A": "Resume the session and trust the model to detect that files have changed.", "B": "Start a completely new session and re-analyze everything from scratch.", "C": "Resume the session and inform the agent about specific file changes for targeted re-analysis.", "D": "Delete the session and all associated state before starting fresh."}, "correct": "C", "explanation": "When resuming sessions after code modifications, inform the agent about specific changes so it can perform targeted re-analysis rather than full re-exploration. This preserves valuable prior context while ensuring stale information is updated. Option A risks the model reasoning about outdated code. Option B wastes time re-analyzing unchanged files. Option D is destructive and unnecessary."}, {"id": "SG-T03-Q08", "source": "sgridworks", "scenario": "Customer Support Resolution Agent", "task_statement": "1.4-1.7", "domain": "D1", "question": "You have a long-running investigation session with extensive tool results from 3 hours of codebase exploration. The tool results contain many details that are no longer relevant. You want to continue the investigation in a new session. What is the most reliable approach?", "options": {"A": "Resume the existing session since it has all the context.", "B": "Start a new session with a structured summary of key findings from the previous session injected into the initial context.", "C": "Export the full conversation transcript and paste it into the new session.", "D": "Resume with `--resume` and hope the model ignores stale results."}, "correct": "B", "explanation": "Starting fresh with a structured summary is more reliable than resuming with stale tool results. The summary preserves key findings while discarding irrelevant details. Resuming a session with extensive stale tool results (A, D) can lead to the model reasoning about outdated information. Pasting the full transcript (C) reintroduces the same stale data problem."}, {"id": "SG-T03-Q09", "source": "sgridworks", "scenario": "Customer Support Resolution Agent", "task_statement": "1.4-1.7", "domain": "D1", "question": "Your task is to add comprehensive tests to a large legacy codebase with no existing test coverage. Which task decomposition approach is most appropriate?", "options": {"A": "Prompt chaining: write tests for file A, then file B, then file C, in alphabetical order.", "B": "Dynamic adaptive decomposition: first map the codebase structure, identify high-impact areas, then create a prioritized plan that adapts as dependencies are discovered.", "C": "Write all tests in a single session with comprehensive upfront instructions.", "D": "Use a pre-configured pipeline that generates one test file per source file."}, "correct": "B", "explanation": "Open-ended tasks with unknown scope require dynamic adaptive decomposition. Start by mapping structure, identify which areas have the highest impact (most critical business logic, most error-prone), then create a prioritized plan. As you discover dependencies between modules, the plan adapts. Alphabetical order (A) ignores priority. Single session (C) will exhaust context. Fixed pipeline (D) does not adapt to discovered dependencies."}, {"id": "SG-T03-Q10", "source": "sgridworks", "scenario": "Customer Support Resolution Agent", "task_statement": "1.4-1.7", "domain": "D1", "question": "A code review task involves analyzing a PR that modifies 12 files. Which task decomposition pattern is most appropriate?", "options": {"A": "Dynamic decomposition where the agent explores files in whatever order seems best.", "B": "Prompt chaining: analyze each file individually for local issues, then run a separate cross-file integration pass to catch data flow and consistency issues.", "C": "Analyze all 12 files in a single pass to catch cross-file issues.", "D": "Randomly sample 4 files for review to stay within context limits."}, "correct": "B", "explanation": "Code reviews are predictable multi-aspect tasks well-suited to prompt chaining. Per-file analysis ensures consistent depth (avoiding the attention dilution of analyzing all files at once). The separate cross-file integration pass catches issues that only emerge when considering how files interact. Single-pass (C) leads to inconsistent depth. Random sampling (D) misses files. Unstructured exploration (A) lacks the systematic coverage a review requires."}, {"id": "SG-T04-Q01", "source": "sgridworks", "scenario": "Developer Productivity with Claude", "task_statement": "2.1-2.5", "domain": "D2", "question": "Your agent has two tools: `analyze_content` (\"Analyzes content for insights\") and `analyze_document` (\"Analyzes documents for insights\"). In production, the agent frequently calls the wrong one. What is the most effective first step?", "options": {"A": "Add a routing classifier that examines user input and pre-selects the correct tool.", "B": "Rename the tools and update descriptions to clearly differentiate each tool's purpose, expected inputs, outputs, and when to use it versus the alternative (e.g., rename to `extract_web_results` with a web-specific description).", "C": "Consolidate them into a single `analyze` tool.", "D": "Add few-shot examples showing correct tool selection for 20 different scenarios."}, "correct": "B", "explanation": "Tool descriptions are the primary mechanism LLMs use for tool selection. When tools have overlapping names and near-identical descriptions, the model cannot reliably distinguish them. The fix is to rename tools to reflect their specific purpose and update descriptions with clear differentiation: what inputs each handles, what outputs it produces, and when to use one versus the other. This is the highest-leverage, lowest-effort fix."}, {"id": "SG-T04-Q02", "source": "sgridworks", "scenario": "Developer Productivity with Claude", "task_statement": "2.1-2.5", "domain": "D2", "question": "Your MCP tool returns `{\"status\": \"error\", \"message\": \"Operation failed\"}` for all failure types: timeouts, invalid input, permission denied, and policy violations. The agent wastes tokens retrying non-retryable errors. What should you change?", "options": {"A": "Add retry logic with exponential backoff for all errors.", "B": "Return structured error metadata including `errorCategory` (transient/validation/permission), `isRetryable` boolean, and human-readable descriptions.", "C": "Have the agent parse the error message text to determine if it should retry.", "D": "Eliminate all error responses and always return a successful result with a warning field."}, "correct": "B", "explanation": "Structured error metadata allows the agent to make intelligent recovery decisions. `errorCategory` tells the agent what kind of failure occurred. `isRetryable` prevents wasted retry attempts on non-retryable errors (validation, permission, policy violations). Human-readable descriptions help the agent communicate appropriately to users. Generic messages (the current state) hide information needed for recovery decisions."}, {"id": "SG-T04-Q03", "source": "sgridworks", "scenario": "Developer Productivity with Claude", "task_statement": "2.1-2.5", "domain": "D2", "question": "Your agent has access to 18 tools spanning customer lookup, order management, billing, and shipping. Tool selection accuracy has degraded significantly. What is the primary cause and fix?", "options": {"A": "The model needs more training data on tool selection.", "B": "Giving an agent access to too many tools degrades tool selection reliability. Restrict each agent's tool set to 4-5 tools relevant to its specific role.", "C": "Add more detailed descriptions to all 18 tools.", "D": "Implement a keyword-based pre-filter that selects 5 candidate tools before each model call."}, "correct": "B", "explanation": "Research shows that agents with too many tools (e.g., 18 instead of 4-5) experience degraded tool selection. The solution is scoped tool access: each agent gets only the tools needed for its role. If you need all 18 tools, create specialized sub-agents each with a focused tool set. Better descriptions (C) help but do not solve the fundamental decision complexity problem. Pre-filters (D) bypass the model's understanding."}, {"id": "SG-T04-Q04", "source": "sgridworks", "scenario": "Developer Productivity with Claude", "task_statement": "2.1-2.5", "domain": "D2", "question": "A synthesis agent in your multi-agent system has been given web search tools \"for convenience.\" In testing, the synthesis agent frequently makes web searches instead of synthesizing the findings it already received. What should you do?", "options": {"A": "Add prompt instructions telling the synthesis agent not to search.", "B": "Remove web search tools from the synthesis agent. Give it only synthesis-relevant tools, and route complex verification needs through the coordinator.", "C": "Keep the web search tools but rename them to discourage use.", "D": "Add a usage quota limiting the synthesis agent to 2 web searches per task."}, "correct": "B", "explanation": "Agents with tools outside their specialization tend to misuse them. The synthesis agent should only have tools needed for synthesis. If it needs to verify facts, provide a scoped `verify_fact` tool for simple lookups and route complex cases through the coordinator. Removing cross-specialization tools is the cleanest solution. Prompt instructions (A) and quotas (D) are probabilistic workarounds."}, {"id": "SG-T04-Q05", "source": "sgridworks", "scenario": "Developer Productivity with Claude", "task_statement": "2.1-2.5", "domain": "D2", "question": "You want to ensure your extraction pipeline always calls `extract_metadata` before any enrichment tools. Which `tool_choice` configuration achieves this?", "options": {"A": "`tool_choice: \"auto\"` with system prompt instructions to call metadata extraction first.", "B": "`tool_choice: {\"type\": \"tool\", \"name\": \"extract_metadata\"}` for the first turn, then process subsequent steps in follow-up turns.", "C": "`tool_choice: \"any\"` which guarantees the model calls some tool.", "D": "Define `extract_metadata` first in the tools array, since the model prefers tools listed first."}, "correct": "B", "explanation": "Forced tool selection (`{\"type\": \"tool\", \"name\": \"...\"}`) ensures a specific tool is called. Use it for the first turn to guarantee metadata extraction, then switch to `\"auto\"` or `\"any\"` for subsequent turns. Option A is probabilistic. Option C guarantees a tool call but not which tool. Option D relies on an unreliable assumption about tool ordering preference."}, {"id": "SG-T04-Q06", "source": "sgridworks", "scenario": "Developer Productivity with Claude", "task_statement": "2.1-2.5", "domain": "D2", "question": "Your team wants to share MCP server configurations across all developers working on the project. Where should the configuration be placed?", "options": {"A": "In each developer's `~/.claude.json` file.", "B": "In the project's `.mcp.json` file, committed to version control, with `${GITHUB_TOKEN}` style environment variable expansion for credentials.", "C": "In the project's CLAUDE.md file with server connection strings.", "D": "In a shared Google Doc that developers reference when setting up their environment."}, "correct": "B", "explanation": "Project-scoped MCP configuration goes in `.mcp.json` at the project root. This file is version-controlled so all developers get the same configuration. Environment variable expansion (e.g., `${GITHUB_TOKEN}`) allows each developer to use their own credentials without committing secrets. Option A is user-scoped and not shared. Option C is for instructions, not server configuration. Option D is not programmatic."}, {"id": "SG-T04-Q07", "source": "sgridworks", "scenario": "Developer Productivity with Claude", "task_statement": "2.1-2.5", "domain": "D2", "question": "A developer adds a personal experimental MCP server for testing. Where should this be configured so it does not affect teammates?", "options": {"A": "In the project's `.mcp.json` file with a comment marking it as experimental.", "B": "In `~/.claude.json` (user-scoped configuration).", "C": "In a git-ignored `.mcp.local.json` file.", "D": "In the project's CLAUDE.md file under an \"experimental\" section."}, "correct": "B", "explanation": "User-scoped configuration in `~/.claude.json` is for personal and experimental servers. This configuration applies only to that user and is not shared via version control. All configured servers (both project and user scoped) are discovered at connection time and available simultaneously. Option A would affect all teammates. Option C is not a recognized configuration mechanism. Option D is for instructions."}, {"id": "SG-T04-Q08", "source": "sgridworks", "scenario": "Developer Productivity with Claude", "task_statement": "2.1-2.5", "domain": "D2", "question": "Your MCP server has a `search_issues` tool that returns detailed issue data including summaries, labels, and status. But the agent keeps using the built-in `Grep` tool to search for issue references in code instead. What is the likely cause?", "options": {"A": "The agent prefers built-in tools by default and cannot be changed.", "B": "The MCP tool's description does not clearly explain its capabilities and outputs, causing the agent to prefer the familiar built-in Grep tool.", "C": "Built-in tools always take priority over MCP tools.", "D": "The MCP server connection is too slow."}, "correct": "B", "explanation": "When MCP tool descriptions are vague or incomplete, the agent defaults to familiar built-in tools. Enhancing the MCP tool description to clearly explain what it can do, what data it returns, and when it should be used over alternatives prevents this. The fix is to write richer descriptions that help the agent understand the MCP tool's unique value. Built-in tools do not have automatic priority (A, C)."}, {"id": "SG-T04-Q09", "source": "sgridworks", "scenario": "Developer Productivity with Claude", "task_statement": "2.1-2.5", "domain": "D2", "question": "A developer needs to find all files in a project that match the pattern `*.test.tsx`. Which built-in tool should they use?", "options": {"A": "Grep -- search for \"test.tsx\" in file contents.", "B": "Glob -- find files matching the naming pattern `**/*.test.tsx`.", "C": "Read -- read each directory to find test files.", "D": "Bash -- run `find . -name \"*.test.tsx\"`."}, "correct": "B", "explanation": "Glob is the built-in tool for file path pattern matching -- finding files by name or extension patterns. Grep is for searching file contents (not file names). Read is for loading file contents (not finding files). Bash with `find` works but Glob is the dedicated tool for this purpose and is preferred."}, {"id": "SG-T04-Q10", "source": "sgridworks", "scenario": "Developer Productivity with Claude", "task_statement": "2.1-2.5", "domain": "D2", "question": "Your agent needs to understand how a function `processRefund` is used across the codebase. It should find all callers, trace the data flow, and understand the function's dependencies. What is the recommended approach using built-in tools?", "options": {"A": "Use Read to load every file in the project and search through them.", "B": "Start with Grep to find all callers of `processRefund`, then use Read to follow imports and trace flows incrementally.", "C": "Use Bash to run a static analysis tool.", "D": "Use Glob to find all JavaScript files, then Read each one looking for the function name."}, "correct": "B", "explanation": "Build codebase understanding incrementally: start with Grep to find entry points (all callers of the function), then use Read to follow imports and trace flows from those entry points. This targeted approach is more efficient than reading all files (A, D) and uses the built-in tools for their intended purposes. Running external tools via Bash (C) should be a fallback, not the first approach."}, {"id": "SG-T05-Q01", "source": "sgridworks", "scenario": "Code Generation with Claude Code", "task_statement": "3.1-3.3", "domain": "D3", "question": "A new team member reports that Claude Code is not following the project's coding standards, while all other developers see them applied correctly. The standards are documented in a CLAUDE.md file. Where is the most likely misconfiguration?", "options": {"A": "The standards are in the project-level `.claude/CLAUDE.md` but the new member has not pulled the latest changes.", "B": "The standards are in `~/.claude/CLAUDE.md` (user-level) on another developer's machine, so they are not shared via version control.", "C": "The CLAUDE.md file is too large for Claude to process.", "D": "The new member's Claude Code version is outdated."}, "correct": "B", "explanation": "User-level configuration in `~/.claude/CLAUDE.md` applies only to that user and is not shared through version control. If coding standards are placed there instead of project-level (`.claude/CLAUDE.md` or root `CLAUDE.md`), new team members will not receive them. This is the classic configuration hierarchy diagnostic question."}, {"id": "SG-T05-Q02", "source": "sgridworks", "scenario": "Code Generation with Claude Code", "task_statement": "3.1-3.3", "domain": "D3", "question": "Your project has a large CLAUDE.md file (500+ lines) covering API conventions, testing standards, deployment procedures, security policies, and style guides. It is becoming hard to maintain. What is the best refactoring approach?", "options": {"A": "Split it into multiple files in `.claude/rules/` (e.g., `testing.md`, `api-conventions.md`, `deployment.md`) with topic-specific focus.", "B": "Create a summary CLAUDE.md and link to external documentation.", "C": "Keep the single file but add a table of contents.", "D": "Move all content to the README.md instead."}, "correct": "A", "explanation": "The `.claude/rules/` directory is designed for organizing topic-specific rule files as an alternative to a monolithic CLAUDE.md. Each file can focus on one area (testing, API conventions, deployment, security) making maintenance easier. Files in `.claude/rules/` can also have YAML frontmatter for path-scoping, adding conditional loading. README.md (D) is for human documentation, not Claude configuration."}, {"id": "SG-T05-Q03", "source": "sgridworks", "scenario": "Code Generation with Claude Code", "task_statement": "3.1-3.3", "domain": "D3", "question": "Your monorepo has 5 packages, each maintained by a different team with different coding standards. Package A uses React hooks, Package B uses Angular, Package C is a Go backend. You want each package to use its own standards document. What is the most maintainable approach?", "options": {"A": "Put all standards in the root CLAUDE.md under package-specific headers.", "B": "Use `@import` in each package's CLAUDE.md to selectively include relevant standards files.", "C": "Create identical CLAUDE.md files in each package directory, duplicating shared standards.", "D": "Use a single `.claude/rules/` file with conditional logic for each package."}, "correct": "B", "explanation": "The `@import` syntax lets each package's CLAUDE.md reference specific standards files relevant to its domain (e.g., Package A imports `react-standards.md`, Package C imports `go-standards.md`). Shared standards can be in a common file that all packages import. This avoids duplication (C) and keeps each package's configuration focused (vs putting everything in root, A)."}, {"id": "SG-T05-Q04", "source": "sgridworks", "scenario": "Code Generation with Claude Code", "task_statement": "3.1-3.3", "domain": "D3", "question": "You want to create a `/deploy` command that is available only to you for testing, without affecting your teammates. Where should you create it?", "options": {"A": "`.claude/commands/deploy.md` in the project repository.", "B": "`~/.claude/commands/deploy.md` in your home directory.", "C": "`.claude/skills/deploy/SKILL.md` in the project repository.", "D": "Add it to your personal CLAUDE.md."}, "correct": "B", "explanation": "User-scoped commands in `~/.claude/commands/` are personal and not shared via version control. Project-scoped commands in `.claude/commands/` (A) would be shared with all teammates via the repository. Skills (C) are also project-scoped when in the project directory. CLAUDE.md (D) is for instructions, not command definitions."}, {"id": "SG-T05-Q05", "source": "sgridworks", "scenario": "Code Generation with Claude Code", "task_statement": "3.1-3.3", "domain": "D3", "question": "You are creating a skill that performs verbose codebase analysis, generating extensive output. You do not want this output to pollute the main conversation context. What frontmatter option should you use?", "options": {"A": "`output: hidden`", "B": "`context: fork`", "C": "`verbose: false`", "D": "`context: isolated`"}, "correct": "B", "explanation": "The `context: fork` frontmatter option runs the skill in an isolated sub-agent context. This prevents verbose skill outputs from consuming tokens in the main conversation. The skill runs, produces its output, and returns a summary without the detailed exploration polluting the main session. Options A, C, and D are not valid frontmatter options."}, {"id": "SG-T05-Q06", "source": "sgridworks", "scenario": "Code Generation with Claude Code", "task_statement": "3.1-3.3", "domain": "D3", "question": "A skill needs to generate code files but should not be allowed to execute shell commands or delete files. How do you restrict its capabilities?", "options": {"A": "Add instructions in the skill's prompt saying \"Do not use Bash or delete files.\"", "B": "Configure `allowed-tools` in the SKILL.md frontmatter to limit tool access (e.g., only Read, Write, Edit).", "C": "Create a separate Claude Code profile with reduced permissions.", "D": "Use a lower-capability model for the skill."}, "correct": "B", "explanation": "The `allowed-tools` frontmatter in SKILL.md restricts which tools the skill can access during execution. Setting it to only file write operations (Read, Write, Edit) prevents the skill from running Bash commands or performing destructive actions. This is deterministic tool restriction, not prompt-based (A)."}, {"id": "SG-T05-Q07", "source": "sgridworks", "scenario": "Code Generation with Claude Code", "task_statement": "3.1-3.3", "domain": "D3", "question": "A skill for code review should prompt the developer for a PR number when invoked without arguments. Which frontmatter option enables this?", "options": {"A": "`required-args: [\"pr_number\"]`", "B": "`argument-hint: \"PR number to review\"`", "C": "`prompt: \"Enter PR number\"`", "D": "`input-required: true`"}, "correct": "B", "explanation": "The `argument-hint` frontmatter prompts developers for required parameters when they invoke the skill without arguments. It provides a hint about what input is expected. The other options are not valid SKILL.md frontmatter fields."}, {"id": "SG-T05-Q08", "source": "sgridworks", "scenario": "Code Generation with Claude Code", "task_statement": "3.1-3.3", "domain": "D3", "question": "Your team needs both always-loaded universal coding standards AND on-demand task-specific workflows (like code review, deployment checks, migration helpers). How should these be organized?", "options": {"A": "Put everything in CLAUDE.md -- it handles both standards and workflows.", "B": "Use CLAUDE.md for always-loaded universal standards and skills (.claude/skills/) for on-demand task-specific workflows.", "C": "Use skills for everything since they are more flexible.", "D": "Use .claude/rules/ for workflows and CLAUDE.md for standards."}, "correct": "B", "explanation": "CLAUDE.md is always loaded and suited for universal standards that should apply to every interaction. Skills are invoked on-demand and suited for task-specific workflows that only apply when explicitly needed. This separation keeps the always-loaded context lean (saving tokens) while providing rich task-specific guidance when needed."}, {"id": "SG-T05-Q09", "source": "sgridworks", "scenario": "Code Generation with Claude Code", "task_statement": "3.1-3.3", "domain": "D3", "question": "You want to verify which memory files are currently loaded in your Claude Code session and diagnose why some sessions seem to have different behavior. Which command should you use?", "options": {"A": "`/status`", "B": "`/memory`", "C": "`/config`", "D": "`/debug`"}, "correct": "B", "explanation": "The `/memory` command shows which memory files are loaded in the current session. This helps diagnose inconsistent behavior across sessions -- if different memory files are loaded, behavior will differ. This is the designated diagnostic tool for memory-related issues."}, {"id": "SG-T05-Q10", "source": "sgridworks", "scenario": "Code Generation with Claude Code", "task_statement": "3.1-3.3", "domain": "D3", "question": "A developer creates a personal variant of a team skill with different behavior. They want to avoid affecting teammates. What is the correct approach?", "options": {"A": "Modify the team skill in `.claude/skills/` and add a git ignore rule.", "B": "Create a personal skill variant in `~/.claude/skills/` with a different name.", "C": "Override the team skill by creating one with the same name in `~/.claude/skills/`.", "D": "Add conditional logic to the team skill that checks the username."}, "correct": "B", "explanation": "Personal skill customization is done by creating variants in `~/.claude/skills/` with different names. Using a different name avoids conflicts with the team skill and prevents unintended effects on teammates. Same-name overrides (C) could cause confusion. Modifying the team skill (A) affects everyone even with gitignore. Conditional logic (D) adds unnecessary complexity."}, {"id": "SG-T06-Q01", "source": "sgridworks", "scenario": "Claude Code for CI/CD", "task_statement": "3.4-3.6", "domain": "D3", "question": "A developer needs to add a null check to a single function in one file. The bug is clear from the stack trace. Which mode should they use?", "options": {"A": "Plan mode to explore the codebase and understand the full impact before making the change.", "B": "Direct execution -- the change is well-understood, single-file, and has clear scope.", "C": "Plan mode first, then direct execution for the implementation.", "D": "Start in direct execution and switch to plan mode if the fix is more complex than expected."}, "correct": "B", "explanation": "Direct execution is appropriate for simple, well-scoped changes: a single-file bug fix with a clear stack trace. Plan mode adds unnecessary overhead for changes where the scope and solution are already understood. Plan mode is for complex tasks with multiple valid approaches and architectural decisions."}, {"id": "SG-T06-Q02", "source": "sgridworks", "scenario": "Claude Code for CI/CD", "task_statement": "3.4-3.6", "domain": "D3", "question": "Your team needs to migrate from library X to library Y. The migration affects 45+ files across the codebase, and there are multiple valid approaches (gradual migration with adapters vs big-bang replacement). Which approach should you take?", "options": {"A": "Direct execution with comprehensive upfront instructions detailing exactly how each file should change.", "B": "Plan mode to explore the codebase, understand dependencies, and design an implementation approach before making changes.", "C": "Direct execution, changing files one at a time and fixing issues as they arise.", "D": "Create a script that does automated find-and-replace across all files."}, "correct": "B", "explanation": "Plan mode is designed for complex tasks involving: large-scale changes (45+ files), multiple valid approaches (gradual vs big-bang), and architectural decisions (adapter patterns, dependency management). Plan mode enables safe exploration and design before committing to changes, preventing costly rework when dependencies are discovered late (C) or when the chosen approach proves wrong (A)."}, {"id": "SG-T06-Q03", "source": "sgridworks", "scenario": "Claude Code for CI/CD", "task_statement": "3.4-3.6", "domain": "D3", "question": "During a complex multi-phase task, the Explore subagent is used for verbose discovery. Why is this preferred over doing discovery in the main conversation?", "options": {"A": "The Explore subagent has access to more tools than the main conversation.", "B": "The Explore subagent isolates verbose discovery output and returns summaries, preserving main conversation context from being exhausted by exploration data.", "C": "The Explore subagent runs faster than the main conversation.", "D": "The Explore subagent can access files that the main conversation cannot."}, "correct": "B", "explanation": "The Explore subagent's primary benefit is context isolation. Verbose discovery output (reading many files, searching across the codebase) consumes significant context tokens. By delegating this to the Explore subagent, only the summarized findings return to the main conversation, preventing context window exhaustion during multi-phase tasks."}, {"id": "SG-T06-Q04", "source": "sgridworks", "scenario": "Claude Code for CI/CD", "task_statement": "3.4-3.6", "domain": "D3", "question": "Your CI pipeline needs to run Claude Code for automated code review on every PR. The current command `claude \"Review this PR\"` hangs indefinitely. What is the fix?", "options": {"A": "Set `CLAUDE_HEADLESS=true` environment variable.", "B": "Add `< /dev/null` to redirect stdin.", "C": "Use the `-p` flag: `claude -p \"Review this PR\"`.", "D": "Add `--batch` flag: `claude --batch \"Review this PR\"`."}, "correct": "C", "explanation": "The `-p` (or `--print`) flag runs Claude Code in non-interactive mode: it processes the prompt, outputs the result to stdout, and exits without waiting for user input. This is the documented approach for CI/CD pipelines. Options A and D reference non-existent features. Option B is a Unix workaround that does not properly address Claude Code's command syntax."}, {"id": "SG-T06-Q05", "source": "sgridworks", "scenario": "Claude Code for CI/CD", "task_statement": "3.4-3.6", "domain": "D3", "question": "Your CI review pipeline needs to output structured findings that can be automatically posted as inline PR comments. Which CLI flags should you use?", "options": {"A": "`-p --verbose` to get detailed output in text format.", "B": "`-p --output-format json --json-schema <schema>` to produce machine-parseable structured findings.", "C": "`-p --format markdown` to get formatted output.", "D": "`-p > output.json` to redirect output to a JSON file."}, "correct": "B", "explanation": "`--output-format json` combined with `--json-schema` produces structured output that matches a defined schema, making it machine-parseable for automated posting as inline PR comments. Simple text output (A, C) requires parsing. Redirecting to a file (D) does not make the output structured."}, {"id": "SG-T06-Q06", "source": "sgridworks", "scenario": "Claude Code for CI/CD", "task_statement": "3.4-3.6", "domain": "D3", "question": "Your CI pipeline runs Claude Code to generate tests. The generated tests frequently duplicate scenarios already covered by the existing test suite. How should you fix this?", "options": {"A": "Add a deduplication step that removes duplicate tests after generation.", "B": "Provide existing test files in context so test generation avoids suggesting duplicate scenarios already covered.", "C": "Limit the number of generated tests to reduce the chance of duplication.", "D": "Run generated tests against the existing suite and delete any that test the same thing."}, "correct": "B", "explanation": "Providing existing test files in the context allows Claude to see what is already covered and generate only new, non-duplicative test scenarios. This is the preventive approach -- avoid generating duplicates in the first place rather than filtering them after (A, D). Limiting count (C) does not ensure the generated tests are unique."}, {"id": "SG-T06-Q07", "source": "sgridworks", "scenario": "Claude Code for CI/CD", "task_statement": "3.4-3.6", "domain": "D3", "question": "The same Claude session that generated code is tasked with reviewing that code for bugs. The review finds no issues, but an independent reviewer later discovers several bugs. Why did the self-review fail?", "options": {"A": "The model's context window was too full to perform a thorough review.", "B": "The model retains reasoning context from generation, making it less likely to question its own decisions in the same session.", "C": "The review prompt was not detailed enough.", "D": "The model cannot perform both generation and review tasks."}, "correct": "B", "explanation": "Self-review within the same session is inherently limited because the model retains the reasoning context that led to its original decisions. It is biased toward confirming its own choices rather than questioning them. An independent review instance (without prior reasoning context) is more effective at catching subtle issues. This is a key concept for CI review architectures."}, {"id": "SG-T06-Q08", "source": "sgridworks", "scenario": "Claude Code for CI/CD", "task_statement": "3.4-3.6", "domain": "D3", "question": "Your CI pipeline re-runs reviews after new commits are pushed. Previous review comments remain on the PR, and the new review produces duplicate findings for issues that were already flagged. How do you fix this?", "options": {"A": "Delete all previous review comments before each new review run.", "B": "Include prior review findings in context when re-running, instructing Claude to report only new or still-unaddressed issues.", "C": "Use a different review template for re-reviews.", "D": "Only review the files changed in the latest commit, ignoring previously reviewed files."}, "correct": "B", "explanation": "Including prior review findings in the context allows the new review to distinguish between already-flagged issues and new ones. Instruct Claude to report only new or still-unaddressed issues to avoid duplicate comments. Deleting comments (A) loses valuable feedback history. Ignoring files (D) might miss issues introduced by interactions between old and new changes."}, {"id": "SG-T06-Q09", "source": "sgridworks", "scenario": "Claude Code for CI/CD", "task_statement": "3.4-3.6", "domain": "D3", "question": "You want to improve the quality of CI-generated tests. Which CLAUDE.md configuration would be most effective?", "options": {"A": "Add a generic instruction: \"Generate high-quality tests.\"", "B": "Document testing standards, valuable test criteria, available fixtures, and examples of good vs low-value tests in CLAUDE.md.", "C": "Specify the minimum number of tests to generate per file.", "D": "List every possible edge case that tests should cover."}, "correct": "B", "explanation": "CLAUDE.md is the mechanism for providing project context to CI-invoked Claude Code. Documenting testing standards (what makes a test valuable), available fixtures (what test infrastructure exists), and examples of good vs bad tests gives Claude the context needed to generate high-quality, relevant tests. Generic instructions (A) lack specificity. Counts (C) and exhaustive lists (D) are rigid and unscalable."}, {"id": "SG-T06-Q10", "source": "sgridworks", "scenario": "Claude Code for CI/CD", "task_statement": "3.4-3.6", "domain": "D3", "question": "A developer finds that natural language descriptions produce inconsistent results when asking Claude to transform code. They have tried rewording the instructions several times. What technique is most effective for communicating the exact transformation expected?", "options": {"A": "Add more detailed prose descriptions of the transformation.", "B": "Provide 2-3 concrete input/output examples showing the transformation applied to real code.", "C": "Use technical jargon to be more precise about the transformation.", "D": "Break the transformation into 10 smaller steps."}, "correct": "B", "explanation": "Concrete input/output examples are the most effective way to communicate expected transformations when prose descriptions are interpreted inconsistently. 2-3 examples demonstrating the exact before-and-after pattern resolve ambiguity that words alone cannot. This is a core iterative refinement technique that consistently outperforms more detailed prose (A), jargon (C), or excessive decomposition (D)."}, {"id": "SG-T07-Q01", "source": "sgridworks", "scenario": "Structured Data Extraction", "task_statement": "4.1-4.3", "domain": "D4", "question": "Your automated code review flags 40% false positives, primarily in the \"comment accuracy\" category. Developers have stopped trusting the review output entirely, including the accurate bug and security findings. What is the most effective immediate action?", "options": {"A": "Add \"be more conservative\" to the review prompt.", "B": "Add \"only report high-confidence findings\" to reduce output volume.", "C": "Temporarily disable the high false-positive category (comment accuracy) to restore developer trust while improving prompts for that category separately.", "D": "Switch to a more capable model that will naturally produce fewer false positives."}, "correct": "C", "explanation": "High false positive rates in one category undermine confidence in all categories. The most effective immediate action is to disable the problematic category, restoring trust in the remaining accurate findings. Then improve the prompts for the disabled category offline before re-enabling it. Generic confidence instructions (A, B) do not improve precision -- they need specific criteria. Model changes (D) do not address the prompt design issue."}, {"id": "SG-T07-Q02", "source": "sgridworks", "scenario": "Structured Data Extraction", "task_statement": "4.1-4.3", "domain": "D4", "question": "Your code review prompt says \"check that comments are accurate.\" This produces many false positives where Claude flags comments that are technically imprecise but not misleading. How should you refine the prompt?", "options": {"A": "Change to \"carefully check that comments are accurate, being conservative in your findings.\"", "B": "Replace with explicit criteria: \"Flag comments only when the claimed behavior directly contradicts the actual code behavior. Do not flag comments that are merely incomplete or use imprecise terminology.\"", "C": "Remove comment checking entirely since it is unreliable.", "D": "Add a confidence threshold: \"Only flag comments you are 95% confident are wrong.\""}, "correct": "B", "explanation": "Explicit criteria defining what to flag (contradictory behavior) and what to skip (imprecise but not misleading) directly addresses the false positive source. Vague modifiers like \"conservative\" (A) or confidence thresholds (D) do not help the model distinguish between genuinely wrong comments and mer
