"question": "You are building a customer support agent using the Claude Agent SDK. The agent processes billing disputes by calling tools like `lookup_order`, `get_invoice`, and `process_refund`. A code review notes that after each tool call, your loop checks whether Claude's response text contains the phrase \"I have completed\" to decide whether to stop.  What is the primary problem with this loop termination approach?", "options": {"A": "The agent will never terminate because `process_refund` always returns a success message that prevents \"I have completed\" from appearing.", "B": "Relying on natural language signals in the assistant's text is unreliable; the correct approach is to inspect `stop_reason` and only terminate when it equals `\"end_turn\"`.", "C": "The loop should terminate as soon as any tool call fails, since continuing after a failure will corrupt the conversation history.", "D": "Checking response text is only valid in synchronous mode; you must use a callback handler for proper loop control in async contexts."}, "correct": "B", "explanation": "Inspecting `stop_reason` is the canonical method for agentic loop control: continue iterating when `stop_reason` is `\"tool_use\"`, stop when it is `\"end_turn\"`. Natural language phrases like \"I have completed\" are not reliable termination signals because Claude's phrasing varies across responses and prompt updates. Options A and C are based on incorrect assumptions about how tools interact with response text. Option D conflates asynchronous execution patterns with loop control logic."}, {"id": "OA-Q14", "source": "olivier-alter", "scenario": "", "domain": "D1", "task_statement": "1.1", "question": "A developer productivity agent investigates bug reports by calling `search_codebase`, `read_file`, and `run_tests`. During a code review, a colleague proposes adding an iteration cap: if the loop has not finished after 15 tool calls, terminate with a generic \"investigation incomplete\" response.  What is the correct characterization of this design?", "options": {"A": "Iteration caps are the recommended primary stopping mechanism because they prevent runaway costs in production.", "B": "Iteration caps are a reasonable safety boundary for long-running tasks but should not be the primary termination mechanism; `stop_reason: \"end_turn\"` remains the authoritative signal.", "C": "The iteration cap should be replaced with a time-based timeout, since token counts are a more reliable measure of completion than iteration count.", "D": "Iteration caps are unnecessary if the system prompt instructs the agent to always request only the minimum tools needed."}, "correct": "B", "explanation": "The agentic loop should terminate primarily when `stop_reason` equals `\"end_turn\"`, which signals that the model has finished its task. An iteration cap can serve as a safety guardrail against runaway loops, but treating it as the primary stopping mechanism means the loop may cut off legitimate multi-step investigations. Options A and C misstate recommended practice. Option D conflates prompt-based guidance with loop control: even a well-prompted agent may legitimately need many tool calls for complex investigations."}, {"id": "OA-Q15", "source": "olivier-alter", "scenario": "", "domain": "D1", "task_statement": "1.1", "question": "Your multi-agent research system's agentic loop appends each tool result to the conversation history before sending the next request. A teammate suggests instead storing all tool results in a separate database and providing only a summary to the model at each iteration, rather than the full result.  Under what condition would this change most likely degrade agent performance?", "options": {"A": "When the tool results contain binary data such as images or file attachments.", "B": "When the model needs to reason across multiple tool results simultaneously to determine its next action, since summaries may omit details required for that reasoning.", "C": "When the number of tool calls per session exceeds 10, since larger histories slow down the API.", "D": "When tools return results faster than 200ms, making history appending redundant."}, "correct": "B", "explanation": "The agentic loop depends on tool results being present in conversation history so the model can reason about what it has already discovered before deciding its next action. Summaries may omit field values, error codes, or conditional data the model needs to make correct decisions. Option A is a valid concern but not the primary performance risk for text-based research tasks. Options C and D are not recognized failure modes for this architecture.\n\n---\n\n### Task 1.2: Orchestrate multi-agent systems with coordinator-subagent patterns"}, {"id": "OA-Q07", "source": "olivier-alter", "scenario": "", "domain": "D1", "task_statement": "1.2", "question": "After running on \"impact of AI on creative industries,\" each subagent completes successfully but the final reports cover only visual arts, missing music, writing, and film production. The coordinator decomposed the topic into: \"AI in digital art creation,\" \"AI in graphic design,\" and \"AI in photography.\" What is the most likely root cause?", "options": {"A": "The synthesis agent lacks instructions for identifying coverage gaps in the findings it receives from other agents.", "B": "The coordinator agent's task decomposition is too narrow, resulting in subagent assignments that don't cover all relevant domains.", "C": "The web search agent's queries are not comprehensive enough and need to be expanded to cover more creative industry sectors.", "D": "The document analysis agent is filtering out sources related to non-visual creative industries due to overly restrictive relevance criteria."}, "correct": "B", "explanation": "The coordinator's logs reveal the root cause directly: it decomposed \"creative industries\" into only visual arts subtasks. The subagents executed their assigned tasks correctly. The problem is what they were assigned."}, {"id": "OA-Q16", "source": "olivier-alter", "scenario": "", "domain": "D1", "task_statement": "1.2", "question": "Your multi-agent research system uses a coordinator that always routes every query through all four subagents (web search, document analysis, synthesis, and report generation) regardless of query complexity. For a simple factual question like \"What year was the Anthropic API released?\", the system takes 45 seconds and incurs unnecessary cost.  What design change most directly addresses this?", "options": {"A": "Replace the coordinator with a static routing table that maps query keywords to specific subagent pipelines.", "B": "Have each subagent evaluate its own relevance to the current query and self-select into or out of the pipeline.", "C": "Design the coordinator to dynamically select which subagents to invoke based on query complexity and type, rather than always routing through the full pipeline.", "D": "Reduce the number of subagents from four to two by merging web search and document analysis into a single \"retrieval\" agent."}, "correct": "C", "explanation": "A coordinator that always runs the full pipeline regardless of query complexity wastes resources and adds latency for simple requests. The correct design is a coordinator that evaluates the query and selects only the subagents needed for that specific task. Option A replaces adaptive intelligence with a brittle keyword table. Option B distributes coordination logic across subagents, breaking the hub-and-spoke pattern and reducing observability. Option D reduces capability unnecessarily instead of improving routing logic."}, {"id": "OA-Q17", "source": "olivier-alter", "scenario": "", "domain": "D1", "task_statement": "1.2", "question": "A coordinator agent in your research system has delegated document analysis to a subagent. After the subagent finishes, the coordinator notices the findings are incomplete: the subagent covered only three of the five specified sources. The coordinator needs to get the remaining two sources analyzed.  What is the correct approach for re-delegating this work?", "options": {"A": "Invoke the synthesis agent with the partial findings and instruct it to infer what the missing sources likely contain based on patterns from the three completed analyses.", "B": "The coordinator should re-invoke the document analysis subagent with an explicit prompt specifying only the two missing sources, including the previously completed findings as context.", "C": "Send all five sources again to a new document analysis subagent instance, which will re-analyze the three already-completed sources along with the two missing ones.", "D": "Let the coordinator generate its own analysis of the remaining two sources directly, rather than spawning another subagent delegation."}, "correct": "B", "explanation": "The coordinator's role includes evaluating output for gaps and re-delegating targeted work to close those gaps. Re-invoking the subagent with only the unfinished sources and providing the completed findings as context is efficient and correct. Option A asks synthesis to fabricate content, which undermines report accuracy. Option C wastes resources by re-processing already-completed sources. Option D bypasses the coordinator-subagent architecture and ignores the subagent's specialization.\n\n---\n\n### Task 1.3: Configure subagent invocation, context passing, and spawning"}, {"id": "OA-Q18", "source": "olivier-alter", "scenario": "", "domain": "D1", "task_statement": "1.3", "question": "You are building a coordinator that delegates research tasks to subagents using the `Task` tool. When you test the system, the coordinator cannot invoke any subagents. Reviewing the coordinator's `AgentDefinition`, you notice the `allowedTools` field is set to `[\"web_search\", \"read_document\"]`.  What is the most likely cause of the failure?", "options": {"A": "The `Task` tool requires an explicit `subagent_endpoint` configuration before it can be invoked.", "B": "`\"Task\"` is not included in the coordinator's `allowedTools`, so it cannot spawn subagents.", "C": "The coordinator's system prompt does not include instructions to use the `Task` tool, so the model never attempts to call it.", "D": "Subagent invocation requires the coordinator to be running in plan mode rather than direct execution mode."}, "correct": "B", "explanation": "The `Task` tool is the mechanism for spawning subagents in the Claude Agent SDK. For a coordinator to invoke subagents, `\"Task\"` must be explicitly included in its `allowedTools`. Simply having other tools available does not grant subagent spawning capability. Option A describes a configuration parameter that does not exist. Option C conflates prompt instructions with capability gating: even a well-prompted coordinator cannot call a tool that is not in its allowed set. Option D conflates plan mode with subagent spawning."}, {"id": "OA-Q19", "source": "olivier-alter", "scenario": "", "domain": "D1", "task_statement": "1.3", "question": "Your multi-agent research system has a web search subagent that consistently returns findings without identifying which sources correspond to which claims. When the synthesis agent receives these findings, it cannot produce properly cited reports.  What is the correct fix during context passing from the web search subagent to the synthesis agent?", "options": {"A": "Instruct the synthesis agent to run its own web searches to re-locate the original sources.", "B": "Use structured data formats that separate claim content from metadata (source URLs, publication dates, page numbers) in the subagent's output, and include this structure when passing context to the synthesis agent.", "C": "Have the coordinator concatenate all subagent outputs into a single text block before forwarding to synthesis, since synthesis will extract citations naturally.", "D": "Configure the web search subagent to return only source URLs, and have the synthesis agent re-read each source to reconstruct the findings."}, "correct": "B", "explanation": "Structured data formats that separate content from metadata ensure that claim-source mappings survive the handoff between agents. When context is passed as unstructured text, citation information is easily lost. Option A introduces redundant work and potentially different search results. Option C risks losing the claim-source associations during concatenation. Option D is extremely inefficient and requires the synthesis agent to redo retrieval work."}, {"id": "OA-Q20", "source": "olivier-alter", "scenario": "", "domain": "D1", "task_statement": "1.3", "question": "A coordinator needs to research three independent subtopics in parallel: market trends, competitor analysis, and regulatory environment. Each requires a separate web search subagent. How should the coordinator spawn these subagents to maximize throughput?", "options": {"A": "Spawn the subtopics sequentially: start the first subagent, wait for its result, then start the second, and so on, to avoid context conflicts.", "B": "Emit all three `Task` tool calls in a single coordinator response, which allows the subagents to run in parallel.", "C": "Route all three subtopics through a single subagent sequentially, sharing context between them to reduce total memory usage.", "D": "Use a single subagent with three separate prompts in sequence, passing prior results as context for each subsequent prompt."}, "correct": "B", "explanation": "The Claude Agent SDK supports parallel subagent execution by emitting multiple `Task` tool calls in a single coordinator response. This maximizes throughput for independent subtopics that do not depend on each other's results. Option A introduces unnecessary serial latency. Option C assumes a dependency that the question does not establish. Option D collapses three specialists into one sequential process, eliminating parallelism.\n\n---\n\n### Task 1.4: Implement multi-step workflows with enforcement and handoff patterns"}, {"id": "OA-Q21", "source": "olivier-alter", "scenario": "", "domain": "D1", "task_statement": "1.4", "question": "Your customer support agent handles account closure requests. The workflow requires: (1) verify customer identity via `get_customer`, (2) check for active subscriptions via `check_subscriptions`, (3) process closure via `close_account`. Production logs show the agent occasionally calls `close_account` before completing the identity verification step, resulting in unauthorized account closures.  A colleague suggests adding a system prompt instruction: \"Always verify identity before closing accounts.\" What is the most effective approach?", "options": {"A": "The system prompt instruction is sufficient because it explicitly describes the required order.", "B": "Add few-shot examples showing the correct three-step sequence alongside the system prompt instruction.", "C": "Implement a programmatic prerequisite that blocks `close_account` from executing until `get_customer` has returned a verified customer ID.", "D": "Add a routing classifier that analyzes the request type and pre-selects the appropriate tools before the agent begins."}, "correct": "C", "explanation": "When a tool ordering requirement has serious consequences (unauthorized account closures), programmatic enforcement provides deterministic guarantees. Prompt instructions have a non-zero failure rate even when explicit. Option A relies on probabilistic compliance, which the logs already show is insufficient. Option B improves the odds but still does not guarantee compliance. Option D addresses tool selection rather than ordering enforcement."}, {"id": "OA-Q22", "source": "olivier-alter", "scenario": "", "domain": "D1", "task_statement": "1.4", "question": "A customer contacts your support agent about three issues in a single message: a billing charge dispute, a missing order, and a request to update their email address. The agent processes these sequentially, taking 3-4 minutes per request. A senior architect suggests you redesign the handling approach.  What design change would most improve efficiency while maintaining accuracy?", "options": {"A": "Instruct the agent to address only the highest-priority issue per conversation turn and ask the customer to submit separate tickets for the remaining issues.", "B": "Decompose the three concerns into distinct investigation items and process each in parallel using shared customer context, then compile a unified response.", "C": "Process the three issues sequentially but cache intermediate results so subsequent issues benefit from data already retrieved.", "D": "Delegate all three issues to a single specialized \"multi-issue\" subagent that handles complex requests with multiple concerns."}, "correct": "B", "explanation": "When a customer presents multiple independent concerns, decomposing them into parallel investigation items dramatically reduces latency. Each concern can be investigated simultaneously using the shared customer context already retrieved. Option A creates a poor customer experience and extra work for the customer. Option C improves caching but does not eliminate the serial bottleneck. Option D creates an undifferentiated subagent that doesn't reflect the coordinator-subagent specialization pattern.\n\n---\n\n### Task 1.5: Apply Agent SDK hooks for tool call interception and data normalization"}, {"id": "OA-Q23", "source": "olivier-alter", "scenario": "", "domain": "D1", "task_statement": "1.5", "question": "Your customer support agent integrates with three backend MCP tools: a legacy billing system returning Unix timestamps, an order management system returning ISO 8601 dates, and a subscription service returning numeric status codes (1=active, 2=paused, 3=cancelled). The agent frequently misinterprets these heterogeneous formats when reasoning about customer records.  What is the most appropriate architectural fix?", "options": {"A": "Update each backend system to return a uniform date and status format before the agent calls them.", "B": "Add format conversion instructions to the system prompt explaining how to interpret each tool's output conventions.", "C": "Implement `PostToolUse` hooks that intercept tool results from each source and normalize timestamps, dates, and status codes into a consistent format before the model processes them.", "D": "Add a post-processing step after the agent produces its final response to re-format any dates and statuses that appear in the output."}, "correct": "C", "explanation": "`PostToolUse` hooks are the correct mechanism for intercepting and transforming tool results before the model processes them. This ensures the model always sees normalized data regardless of backend heterogeneity. Option A requires backend changes that may not be feasible and introduces coupling. Option B relies on probabilistic compliance and adds token overhead. Option D applies normalization after the model has already reasoned on inconsistent data, which cannot repair any incorrect conclusions already made."}, {"id": "OA-Q24", "source": "olivier-alter", "scenario": "", "domain": "D1", "task_statement": "1.5", "question": "Your customer support agent has a policy: refunds above $500 require manager approval and must not be processed autonomously. Your system prompt states \"Do not process refunds above $500 without manager approval.\" Production logs show this rule is violated in approximately 3% of cases.  What is the most effective way to guarantee compliance?", "options": {"A": "Strengthen the system prompt language: \"You are strictly forbidden from processing refunds above $500 without explicit manager approval under any circumstances.\"", "B": "Add 10 few-shot examples in the system prompt, all demonstrating the agent requesting manager approval for high-value refunds.", "C": "Implement a hook that intercepts outgoing `process_refund` tool calls, checks the refund amount, and blocks execution or redirects to the manager approval workflow when the amount exceeds $500.", "D": "Implement a validation step that runs after `process_refund` completes and reverses any refunds that exceeded the threshold."}, "correct": "C", "explanation": "Business rules that require guaranteed compliance must be enforced programmatically, not through prompt instructions alone. A hook that intercepts `process_refund` calls before execution provides deterministic enforcement regardless of how the model interprets the system prompt. Options A and B both improve adherence probabilistically but cannot guarantee zero violations. Option D runs after the action has already been taken, which means the policy violation has already occurred."}, {"id": "OA-Q25", "source": "olivier-alter", "scenario": "", "domain": "D1", "task_statement": "1.5", "question": "A developer productivity agent has a `PostToolUse` hook that transforms raw Bash output. Currently the hook appends a formatted summary but also preserves the full raw output in the result passed to the model. Sessions exploring large codebases are hitting context limits faster than expected.  What change would most effectively reduce unnecessary context consumption from tool results?", "options": {"A": "Disable the `PostToolUse` hook entirely and let the model process raw Bash output directly.", "B": "Modify the hook to return only the formatted summary to the model, trimming the verbose raw output rather than preserving it alongside the summary.", "C": "Increase the model's `max_tokens` parameter to accommodate the additional context from both raw and formatted output.", "D": "Switch from `PostToolUse` hooks to pre-processing the Bash commands themselves to produce shorter output."}, "correct": "B", "explanation": "`PostToolUse` hooks can trim verbose tool outputs to only the relevant data before the model processes them. Keeping both raw and summary output doubles the context consumption from each tool call. Modifying the hook to return only the formatted summary addresses the root cause directly. Option A removes normalization benefits. Option C increases output capacity but does not address the growing input context. Option D would require significant changes to tool invocation patterns and may not be feasible for all commands.\n\n---\n\n### Task 1.6: Design task decomposition strategies for complex workflows"}, {"id": "OA-Q26", "source": "olivier-alter", "scenario": "", "domain": "D1", "task_statement": "1.6", "question": "You are building an automated code review system using Claude. The review must cover three aspects for every pull request: security vulnerabilities, style compliance, and performance implications. Each aspect has clear, defined criteria documented in your engineering handbook.  Which decomposition strategy is most appropriate?", "options": {"A": "Dynamic adaptive decomposition: have the agent start by scanning the full PR and generate a review plan based on what it finds.", "B": "Prompt chaining with sequential focused passes: one pass per review aspect (security, style, performance), each with dedicated criteria.", "C": "A single comprehensive pass that examines all three aspects simultaneously to capture cross-cutting concerns.", "D": "Spawn three fully independent agents without shared context, then merge their outputs in a final aggregation step."}, "correct": "B", "explanation": "When a workflow has predictable, well-defined aspects that must each be covered, prompt chaining with sequential focused passes is the appropriate pattern. Each pass dedicates full attention to one concern rather than dividing attention across all three. Option A uses dynamic decomposition for a workflow whose structure is already known, adding unnecessary overhead. Option C suffers from the attention dilution problem that prompt chaining is designed to solve. Option D loses cross-file integration context by fully isolating the three agents."}, {"id": "OA-Q27", "source": "olivier-alter", "scenario": "", "domain": "D1", "task_statement": "1.6", "question": "An engineering team asks you to design a Claude-based system to investigate a production incident. The system must root-cause a bug that was introduced somewhere in the past two weeks across an unknown set of files and services. The scope of the investigation cannot be known in advance.  Which decomposition approach is most appropriate?", "options": {"A": "Prompt chaining: design a fixed sequence of investigation steps (check logs, read configs, trace service calls) that the agent executes in order.", "B": "Dynamic adaptive decomposition: the agent first maps the affected services and symptom timeline, then generates and prioritizes investigation subtasks based on what is discovered at each step.", "C": "Split the investigation between two agents: one agent reads logs while the other reads source code, and they report findings independently to a human operator.", "D": "Have the agent run a comprehensive search of all changed files in the past two weeks and produce a ranked list of candidates for manual review."}, "correct": "B", "explanation": "Open-ended investigation tasks with unknown scope require dynamic adaptive decomposition, where the agent builds its investigation plan based on intermediate findings rather than following a fixed sequence. A static prompt chain cannot adapt when the investigation reveals unexpected service dependencies or anomalous patterns. Option A is appropriate for predictable multi-aspect reviews, not exploratory investigations. Option C removes the coordinating intelligence and requires human intervention for synthesis. Option D is a single-pass heuristic that does not apply the model's reasoning capability.\n\n---\n\n### Task 1.7: Manage session state, resumption, and forking"}, {"id": "OA-Q28", "source": "olivier-alter", "scenario": "", "domain": "D1", "task_statement": "1.7", "question": "A developer has been using Claude Code to investigate a legacy authentication service. After several hours, they have built up a detailed session with findings about the service's token validation logic. They need to step away and return tomorrow. Three core files in the authentication module will be modified overnight by another team.  What is the most reliable approach for resuming the investigation productively the next day?", "options": {"A": "Resume the named session with `--resume <session-name>` and notify the agent about the specific files that were changed, so it can re-analyze those files in the context of its prior understanding.", "B": "Start a completely new session each time, since stale tool results from the previous session make resumption unreliable for any scenario.", "C": "Resume the named session without any notification about file changes; the agent will detect modifications automatically when it next reads those files.", "D": "Use `fork_session` to create a branch of the current session before stepping away, then resume from the fork the next day."}, "correct": "A", "explanation": "When resuming a session after code modifications, the correct approach is to use `--resume <session-name>` to continue the named session and explicitly inform the agent about which files changed so it can target re-analysis appropriately. Option B is overly conservative: starting fresh is appropriate when prior tool results are broadly stale, but when only a few known files changed, resumption with targeted context about those changes is more efficient. Option C is incorrect because the agent does not automatically detect file changes on resume. Option D misuses `fork_session`, which is designed for exploring divergent approaches from a shared baseline, not for session continuity across time gaps."}, {"id": "OA-Q29", "source": "olivier-alter", "scenario": "", "domain": "D1", "task_statement": "1.7", "question": "You are leading a research investigation using Claude Code. You have completed an initial analysis of a competitor's public API documentation and want to explore two divergent architectural approaches for your response strategy: one focused on feature parity, one focused on differentiation. You want both explorations to start from the same analysis baseline.  Which session management approach best fits this scenario?", "options": {"A": "Run two separate new sessions, each with a copy of the analysis findings injected as context in the initial prompt.", "B": "Use `--resume` to resume the current session twice in parallel, once for each exploration direction.", "C": "Use `fork_session` to create two independent branches from the current session, then explore each approach in its respective branch.", "D": "Continue in the same session, exploring one approach, then using `/compact` to clear context before exploring the second approach."}, "correct": "C", "explanation": "`fork_session` is designed precisely for this scenario: creating independent branches from a shared analysis baseline to explore divergent approaches. Each branch inherits the common findings and can be explored independently without contaminating the other. Option A requires duplicating context and does not preserve the live session state. Option B describes a mechanism that does not work this way: `--resume` continues a single session sequentially, not in parallel branches. Option D uses `/compact` destructively, losing the baseline context needed for the second exploration.\n\n---\n\n## Domain 2: Tool Design & MCP Integration\n\n### Task 2.1: Design effective tool interfaces with clear descriptions and boundaries"}, {"id": "OA-Q02", "source": "olivier-alter", "scenario": "", "domain": "D2", "task_statement": "2.1", "question": "Production logs show the agent frequently calls `get_customer` when users ask about orders, instead of calling `lookup_order`. Both tools have minimal descriptions and accept similar identifier formats. What's the most effective first step to improve tool selection reliability?", "options": {"A": "Add few-shot examples to the system prompt demonstrating correct tool selection patterns, with 5-8 examples.", "B": "Expand each tool's description to include input formats it handles, example queries, edge cases, and boundaries explaining when to use it versus similar tools.", "C": "Implement a routing layer that parses user input before each turn and pre-selects the appropriate tool based on detected keywords.", "D": "Consolidate both tools into a single `lookup_entity` tool that accepts any identifier and internally determines which backend to query."}, "correct": "B", "explanation": "Tool descriptions are the primary mechanism LLMs use for tool selection. Option B directly addresses the root cause. Few-shot examples (A) add token overhead without fixing the underlying issue. A routing layer (C) is over-engineered. Consolidating tools (D) requires more effort than a \"first step\" warrants."}, {"id": "OA-Q30", "source": "olivier-alter", "scenario": "", "domain": "D2", "task_statement": "2.1", "question": "Your customer support agent has a `lookup_order` tool that is called at the right times, but frequently returns errors. Logs show the agent passes free-text descriptions like \"order from last Tuesday\" instead of the required ISO-8601 timestamp format. The tool description reads: \"Retrieves order details given a date or identifier.\" No examples or format constraints are provided.  What change to the tool definition would most directly reduce these input format errors?", "options": {"A": "Add input format constraints, accepted value formats, and example inputs to the tool description so the model knows exactly how to format its calls.", "B": "Add a system prompt instruction: \"Always use ISO-8601 format when calling lookup_order.\"", "C": "Add input schema validation that rejects malformed inputs and returns an error to the agent.", "D": "Split `lookup_order` into two tools: `lookup_order_by_id` and `lookup_order_by_date` to reduce ambiguity."}, "correct": "A", "explanation": "Tool descriptions are the primary mechanism the model uses to understand how to call a tool. Adding format constraints and examples directly to the description gives the model the information it needs at decision time. Option B adds token overhead in the system prompt but is more fragile than a tool-specific description. Option C adds validation but does not prevent the model from sending malformed inputs in the first place, creating unnecessary error cycles. Option D addresses a different problem (disambiguation) rather than the format guidance issue."}, {"id": "OA-Q31", "source": "olivier-alter", "scenario": "", "domain": "D2", "task_statement": "2.1", "question": "Your customer support agent has three tools with overlapping names and descriptions: `get_account_info` (\"Get information about the account\"), `fetch_account_details` (\"Fetch account details\"), and `retrieve_customer_record` (\"Retrieve customer information\"). All three call different backend systems with different data. The agent frequently picks the wrong tool.  Which approach most effectively resolves the misrouting?", "options": {"A": "Add a system prompt instruction listing all three tools and specifying exactly when each should be used based on the request type.", "B": "Rename the tools to reflect their distinct data sources and rewrite their descriptions to explain what data each returns, what backend it queries, and what use case it serves.", "C": "Consolidate all three tools into one tool with a `source` parameter that specifies which backend to query.", "D": "Keep the current tools but randomize which one the agent calls, then merge the responses in a post-processing step."}, "correct": "B", "explanation": "Ambiguous or overlapping tool names and descriptions cause misrouting. Renaming tools to reflect their distinct backends and writing descriptions that explain what each one returns, where its data comes from, and when to use it are the right fixes. Option A may reduce misrouting but does not fix the root problem: the tool descriptions themselves are indistinguishable. Option C collapses three specialized tools into one generic tool with a parameter, which shifts the burden of correct routing back to the model in a less structured way. Option D is not a viable architecture.\n\n---\n\n### Task 2.2: Implement structured error responses for MCP tools"}, {"id": "OA-Q32", "source": "olivier-alter", "scenario": "", "domain": "D2", "task_statement": "2.2", "question": "Your customer support MCP tool `process_refund` returns the same error response for all failures: `{\"status\": \"error\", \"message\": \"Operation failed\"}`. The agent currently handles all errors by apologizing to the customer and ending the conversation. Logs show this response is triggered by: network timeouts, invalid refund amounts, refunds blocked by fraud detection, and expired order IDs.  What structured error response design would most improve the agent's ability to recover appropriately?", "options": {"A": "Return different HTTP status codes for each failure type and have the agent interpret the status code to determine recovery action.", "B": "Return structured error metadata including `errorCategory` (transient/validation/permission/business), `isRetryable` boolean, and a human-readable explanation specific to the failure reason.", "C": "Return a verbose error log with the full stack trace and system state so the agent has maximum information to reason from.", "D": "Return a numeric error code and have the system prompt map each code to a recovery action."}, "correct": "B", "explanation": "Structured error metadata gives the agent the information it needs to choose the correct recovery path: retry a transient failure, ask the customer for corrected input on a validation failure, or explain a policy block on a business rule violation. Option A relies on HTTP semantics that may not map cleanly to all failure categories and are not as expressive as structured fields. Option C provides excessive detail that consumes context without improving decision quality. Option D encodes recovery logic in the system prompt rather than in a principled error structure, making it harder to maintain."}, {"id": "OA-Q33", "source": "olivier-alter", "scenario": "", "domain": "D2", "task_statement": "2.2", "question": "A web search subagent in your research system calls `search_web` and receives the following response: `{\"results\": [], \"status\": \"success\"}`. The subagent reports to the coordinator: \"Web search was successful but no relevant results were found.\" Later you discover the search API was actually down and returning empty results for all queries.  What change to the MCP tool's error handling would prevent this confusion?", "options": {"A": "Always return a non-empty results array by including fallback content when the actual search returns nothing.", "B": "Distinguish between access failures (where the backend could not be reached or returned an error) and valid empty results (where the search succeeded but found no matches), using the `isError` flag for the former.", "C": "Add a `confidence` field to the response so the agent can infer whether the empty result is a real outcome or a failure.", "D": "Implement automatic retry in the MCP tool itself, so the agent never sees an empty result unless all retries were exhausted."}, "correct": "B", "explanation": "Access failures and valid empty results are fundamentally different conditions that require different agent responses. Using the `isError` flag for access failures while returning `{\"results\": [], \"status\": \"success\"}` only for genuine empty-result queries gives the coordinator accurate information to make retry and recovery decisions. Option A masks failures by fabricating content. Option C introduces ambiguity; a confidence score on a genuinely empty result is meaningless. Option D handles retries locally but does not solve the agent's inability to distinguish the two conditions."}, {"id": "OA-Q34", "source": "olivier-alter", "scenario": "", "domain": "D2", "task_statement": "2.2", "question": "Your MCP tool `check_fraud_risk` returns `{\"isError\": true, \"message\": \"Refund blocked\"}` when a refund is flagged by fraud detection. The agent interprets this as a transient failure and retries the refund three times before giving up. Each retry generates a separate fraud alert in your compliance system.  What is the missing element in the error response design?", "options": {"A": "The response should include a `retry_after` timestamp so the agent knows when to retry.", "B": "The response should include `isRetryable: false` and a customer-appropriate explanation distinguishing this business rule block from a transient system error.", "C": "The tool should suppress the `isError` flag for fraud blocks and instead return the result as a successful response with a `blocked: true` field.", "D": "The response should include the fraud risk score so the agent can decide whether the score is high enough to justify blocking."}, "correct": "B", "explanation": "A business rule block from fraud detection is a non-retryable error. Including `isRetryable: false` signals to the agent that retrying will not resolve the situation, preventing redundant attempts that trigger compliance alerts. A customer-appropriate explanation helps the agent communicate the block appropriately. Option A implies the block is temporary and retriable, which is the opposite of the intended behavior. Option C hides the error nature of the response and makes recovery logic less clear. Option D provides fraud risk data to the agent that it may not be authorized to act on directly.\n\n---\n\n### Task 2.3: Distribute tools appropriately across agents and configure tool_choice"}, {"id": "OA-Q09", "source": "olivier-alter", "scenario": "", "domain": "D1", "task_statement": "2.3", "question": "The synthesis agent frequently needs to verify specific claims while combining findings. Currently, this creates 2-3 round trips per task, increasing latency by 40%. 85% of verifications are simple fact-checks; 15% require deeper investigation. What's the most effective approach to reduce overhead while maintaining reliability?", "options": {"A": "Give the synthesis agent a scoped `verify_fact` tool for simple lookups, while complex verifications continue delegating to the web search agent through the coordinator.", "B": "Have the synthesis agent accumulate all verification needs and return them as a batch to the coordinator at the end of its pass.", "C": "Give the synthesis agent access to all web search tools so it can handle any verification need directly without round-trips.", "D": "Have the web search agent proactively cache extra context around each source during initial research, anticipating what the synthesis agent might need to verify."}, "correct": "A", "explanation": "Option A applies the principle of least privilege by giving the synthesis agent only what it needs for the 85% common case while preserving the existing coordination pattern for complex cases. Option B creates blocking dependencies. Option C over-provisions the synthesis agent. Option D relies on speculative caching."}, {"id": "OA-Q35", "source": "olivier-alter", "scenario": "", "domain": "D2", "task_statement": "2.3", "question": "You are building a multi-agent research system with a synthesis agent whose sole job is combining findings from subagents and producing a structured report. You have given the synthesis agent access to all 18 tools in your system: web search, file reading, database queries, email sending, calendar access, and more, reasoning that more tools provide more flexibility.  What problem does this configuration most likely introduce?", "options": {"A": "The synthesis agent will refuse to call any tools because it is overwhelmed by the number of choices.", "B": "Having access to tools outside its specialization increases the likelihood the synthesis agent will misuse them, such as initiating new web searches instead of synthesizing the provided findings.", "C": "18 tools will exceed the context window limit for tool schemas, causing API errors on every request.", "D": "The additional tools will slow down the synthesis agent because the model must read all tool descriptions before producing output."}, "correct": "B", "explanation": "Giving an agent access to tools outside its specialization degrades tool selection reliability. A synthesis agent with web search tools will sometimes initiate new searches rather than working with the findings already provided, breaking the intended workflow. Option A overstates the effect: the agent will still call tools, but may call the wrong ones. Option C is not a realistic failure mode for 18 tools with typical schema sizes. Option D mischaracterizes how tool descriptions affect latency."}, {"id": "OA-Q36", "source": "olivier-alter", "scenario": "", "domain": "D2", "task_statement": "2.3", "question": "Your customer support system requires that every response from the `draft_response` agent includes a structured JSON summary before the agent returns its output. You want to guarantee the agent calls the `generate_summary` tool on every invocation, not optionally.  Which `tool_choice` configuration achieves this?", "options": {"A": "Set `tool_choice: \"auto\"` so the model decides when the summary tool is needed.", "B": "Set `tool_choice: \"any\"` so the model must call at least one tool, though it may choose a different tool instead.", "C": "Set `tool_choice: {\"type\": \"tool\", \"name\": \"generate_summary\"}` to force the model to call `generate_summary` specifically.", "D": "Remove all other tools from the agent's tool list so `generate_summary` is the only option available."}, "correct": "C", "explanation": "Forced tool selection via `tool_choice: {\"type\": \"tool\", \"name\": \"generate_summary\"}` guarantees the model calls that specific tool on every invocation. Option A (`\"auto\"`) allows the model to return text without calling any tool. Option B (`\"any\"`) guarantees a tool call but does not guarantee which tool, so the model might choose a different one. Option D achieves the same result indirectly but removes legitimate tools the agent may need for its other tasks.\n\n---\n\n### Task 2.4: Integrate MCP servers into Claude Code and agent workflows"}, {"id": "OA-Q37", "source": "olivier-alter", "scenario": "", "domain": "D2", "task_statement": "2.4", "question": "Your team is setting up a shared GitHub MCP server for all engineers on a project. The server requires a GitHub API token for authentication. You want every engineer who clones the repository to have the MCP server available without each person having to manually configure it, and you want to avoid committing the actual token to version control.  What is the correct configuration approach?", "options": {"A": "Add the MCP server to `~/.claude.json` on each developer's machine with their personal token hardcoded.", "B": "Add the MCP server to the project-scoped `.mcp.json` file with the token specified using environment variable expansion (e.g., `${GITHUB_TOKEN}`), and commit `.mcp.json` to the repository.", "C": "Add the MCP server configuration to the root `CLAUDE.md` file under a `[mcp_servers]` section.", "D": "Create a setup script that each developer runs once to add the MCP server to their personal `~/.claude.json` with their token."}, "correct": "B", "explanation": "Project-scoped `.mcp.json` with environment variable expansion is the correct pattern for shared MCP servers: it is committed to the repository so all team members get the configuration automatically, and tokens are injected via environment variables at runtime rather than committed as plaintext. Option A requires manual per-person setup and hardcodes tokens. Option C describes a configuration mechanism that does not exist in CLAUDE.md. Option D also requires manual setup and does not solve the commit-to-version-control problem."}, {"id": "OA-Q38", "source": "olivier-alter", "scenario": "", "domain": "D2", "task_statement": "2.4", "question": "A developer productivity agent frequently makes multiple exploratory tool calls to discover what data sources are available in your MCP server before it can answer user questions. This pattern increases latency and consumes context for routine requests.  What MCP feature most directly addresses this discovery overhead?", "options": {"A": "Add a `list_tools` meta-tool to the MCP server that returns all available tool names and descriptions.", "B": "Expose content catalogs as MCP resources, giving the agent visibility into available data at connection time rather than through exploratory tool calls.", "C": "Reduce the number of tools in the MCP server by merging similar tools together to minimize the discovery surface.", "D": "Add a caching layer that stores the results of previous exploratory calls and reuses them across sessions."}, "correct": "B", "explanation": "MCP resources are designed to expose content catalogs so agents know what data is available without making exploratory tool calls. This gives the agent upfront visibility at connection time, reducing the need for repeated discovery queries. Option A would still require a tool call to discover available resources. Option C reduces functionality to avoid a structural problem. Option D addresses symptom rather than cause, and cross-session caching of content catalogs may return stale data.\n\n---\n\n### Task 2.5: Select and apply built-in tools (Read, Write, Edit, Bash, Grep, Glob) effectively"}, {"id": "OA-Q39", "source": "olivier-alter", "scenario": "", "domain": "D2", "task_statement": "2.5", "question": "A developer productivity agent needs to find all TypeScript files in a project that import from a deprecated module named `legacy-auth`. The project has thousands of files across many directories.  Which combination of built-in tools is most appropriate for this task?", "options": {"A": "Use `Bash` to run `find . -name \"*.ts\"` and then `Bash` again to run `grep` on each file found.", "B": "Use `Glob` to find all `.ts` files, then use `Read` to open each file and check whether it contains the import.", "C": "Use `Grep` to search for the import pattern across all TypeScript files in the codebase.", "D": "Use `Read` on the project root directory to get a file listing, then recursively `Read` each subdirectory."}, "correct": "C", "explanation": "`Grep` is the correct built-in tool for searching file contents across a codebase. It efficiently searches all TypeScript files for the import pattern without requiring separate file enumeration. Option A uses Bash shell commands that should be replaced by dedicated tools when those tools are available. Option B uses `Glob` for enumeration and then `Read` on each file, which is far less efficient than `Grep` for a content search. Option D uses `Read` for directory traversal, which is not a supported use of that tool."}, {"id": "OA-Q40", "source": "olivier-alter", "scenario": "", "domain": "D2", "task_statement": "2.5", "question": "A developer productivity agent needs to update a configuration value in a file. The value appears in a block of code that contains several nearly identical lines. When the agent uses `Edit`, the tool returns an error: \"Match not unique: found 3 occurrences of the target text.\"  What is the correct fallback approach?", "options": {"A": "Use `Bash` to run a `sed` command to replace all occurrences of the target text simultaneously.", "B": "Use `Read` to load the full file contents, identify the exact surrounding context needed to make the edit unique, and retry `Edit` with a larger `old_string` that uniquely identifies the correct location.", "C": "Use `Write` to overwrite the entire file with a corrected version, based on the contents loaded by `Read`.", "D": "Use `Grep` to locate the line number of each occurrence, then use `Edit` with a line number parameter to target the correct one."}, "correct": "B", "explanation": "When `Edit` fails due to non-unique text, the correct first step is to use `Read` to examine the full file and find enough surrounding context to construct a unique `old_string`. This is more surgical than a full `Write` overwrite. Option C using `Read + Write` is a valid fallback but should only be used when `Edit` still cannot find a unique anchor even with additional context. Option A uses Bash shell commands when built-in tools should be preferred, and would replace all occurrences rather than targeting the correct one. Option D describes a line number parameter that `Edit` does not support.\n\n---\n\n## Domain 3: Claude Code Configuration & Workflows\n\n### Task 3.1: Configure CLAUDE.md files with appropriate hierarchy, scoping, and modular organization"}, {"id": "OA-Q41", "source": "olivier-alter", "scenario": "", "domain": "D3", "task_statement": "3.1", "question": "A senior engineer adds detailed coding standards and security guidelines to their `~/.claude/CLAUDE.md` file. When a new team member joins and clones the repository, they report that Claude Code behaves differently and does not appear to follow the team's documented standards. What is the most likely cause?", "options": {"A": "The new team member's Claude Code version is outdated and does not support shared configuration files.", "B": "The `~/.claude/CLAUDE.md` file is user-scoped and not version-controlled, so teammates do not receive it when they clone the repository.", "C": "CLAUDE.md files must be placed in the `.claude/` subdirectory to be recognized; a root-level `CLAUDE.md` is ignored.", "D": "The configuration hierarchy requires the project-level file to explicitly import from user-level files using `@import`."}, "correct": "B", "explanation": "User-level configuration in `~/.claude/CLAUDE.md` applies only to the individual developer and is never committed to version control. Teammates will not see it regardless of their setup. To share standards across the team, those instructions must live in the project-level `CLAUDE.md` or `.claude/CLAUDE.md`, which are committed to the repository. Options A and D describe mechanisms that do not exist. Option C is incorrect because a root-level `CLAUDE.md` is a valid project-level location."}, {"id": "OA-Q42", "source": "olivier-alter", "scenario": "", "domain": "D3", "task_statement": "3.1", "question": "Your monorepo has a root `CLAUDE.md` that has grown to over 400 lines, covering Python conventions, TypeScript conventions, infrastructure rules, and testing standards. Developers report that Claude sometimes applies the wrong conventions to the wrong files, and the file is difficult to maintain. What is the best approach to reorganize this configuration?", "options": {"A": "Split the content into multiple files in `.claude/rules/`, with each file covering a focused topic, and use path-scoped YAML frontmatter to activate rules only for relevant files.", "B": "Create a separate `CLAUDE.md` in each top-level package directory and delete the root file entirely.", "C": "Add inline section headers to the monolithic file and use the `/memory` command to tell Claude which section to prioritize for each task.", "D": "Break the root `CLAUDE.md` into topic files and use `@import` directives in the root file to pull them all in unconditionally."}, "correct": "A", "explanation": "The `.claude/rules/` directory is designed for exactly this scenario: organizing topic-specific rule files with YAML frontmatter path scoping so each rule set activates only when editing relevant files. This reduces irrelevant context and token usage. Option B would require duplicating shared rules across package directories. Option C relies on manual intervention each session and is not maintainable. Option D with unconditional `@import` addresses the maintenance concern but not the wrong-conventions problem, since all rules would still load regardless of context."}, {"id": "OA-Q54", "source": "olivier-alter", "scenario": "", "domain": "D3", "task_statement": "3.1", "question": "You maintain a monorepo with five packages: a Python backend, a TypeScript frontend, a Go service, shared infrastructure Terraform, and a documentation site. Each package has different linting standards, testing conventions, and framework-specific rules. The root `CLAUDE.md` has grown to 600 lines and developers report that rules intended for one package often bleed into sessions working on another. What is the most modular and maintainable solution using CLAUDE.md configuration?", "options": {"A": "Create a `CLAUDE.md` in each package directory with that package's rules, and use `@import` in the root `CLAUDE.md` to include shared conventions that apply to all packages.", "B": "Keep the 600-line root file but add explicit section headers and instruct developers to tell Claude which section applies at the start of each session.", "C": "Delete the root `CLAUDE.md` and rely entirely on package-level files, accepting that shared conventions must be duplicated across packages.", "D": "Move all rules into `.claude/rules/` files and tag each with a `projects:` key in their frontmatter specifying which subdirectory the rule applies to."}, "correct": "A", "explanation": "The `@import` syntax in CLAUDE.md is designed for exactly this modular pattern: shared conventions in the root file, package-specific rules in each package's own `CLAUDE.md`, with the root file importing common standards that apply globally. This keeps each file focused and maintainable while eliminating rule bleed between packages. Option B relies on developer discipline to manually scope rules each session, which is error-prone and does not scale. Option C eliminates the shared baseline and requires duplicating common conventions across five files, creating maintenance drift. Option D is a valid approach for path-scoped rules within a single project but does not address the need for package-level CLAUDE.md isolation.\n\n---\n\n### Task 3.2: Create and configure custom slash commands and skills"}, {"id": "OA-Q04", "source": "olivier-alter", "scenario": "", "domain": "D3", "task_statement": "3.2", "question": "You want to create a custom `/review` slash command that runs your team's standard code review checklist and should be available to every developer when they clone or pull the repository. Where should you create this command file?", "options": {"A": "In the `.claude/commands/` directory in the project repository", "B": "In `~/.claude/commands/` in each developer's home directory", "C": "In the `CLAUDE.md` file at the project root", "D": "In a `.claude/config.json` file with a `commands` array"}, "correct": "A", "explanation": "Project-scoped custom slash commands are stored in `.claude/commands/` within the repository, version-controlled and automatically available to all developers. Option B is for personal, non-shared commands. Option C is for project instructions, not command definitions. Option D describes a mechanism that doesn't exist."}, {"id": "OA-Q43", "source": "olivier-alter", "scenario": "", "domain": "D3", "task_statement": "3.2", "question": "A developer wants a `/scaffold` skill that generates boilerplate for a new microservice. The skill runs many exploratory file reads and Bash commands to understand existing patterns before generating output, producing hundreds of lines of intermediate output. Teammates complain this pollutes their main conversation context. Which frontmatter setting resolves this?", "options": {"A": "Set `allowed-tools: []` in the skill's frontmatter to prevent tool use during execution.", "B": "Set `context: fork` in the skill's frontmatter to run the skill in an isolated sub-agent context that does not affect the main session.", "C": "Move the skill file from `.claude/skills/` to `.claude/commands/` so it runs as a command rather than a skill.", "D": "Add `argument-hint: \"service-name\"` to the frontmatter so the skill receives a clean input without inheriting session context."}, "correct": "B", "explanation": "The `context: fork` frontmatter option runs the skill in an isolated sub-agent context. All exploratory output, intermediate tool calls, and reasoning happen in the fork and do not accumulate in the main conversation context. Only the final output is returned to the parent session. Option A would disable the tool use the skill depends on. Option C does not change execution isolation behavior. Option D is for prompting the user for input parameters, unrelated to output isolation.\n\n---\n\n### Task 3.3: Apply path-specific rules for conditional convention loading"}, {"id": "OA-Q06", "source": "olivier-alter", "scenario": "", "domain": "D3", "task_statement": "3.3", "question": "Your codebase has distinct areas with different conventions. Test files are spread throughout the codebase alongside the code they test. You want all tests to follow the same conventions regardless of location. What's the most maintainable way to ensure Claude automatically applies the correct conventions when generating code?", "options": {"A": "Create rule files in `.claude/rules/` with YAML frontmatter specifying glob patterns to conditionally apply conventions based on file paths.", "B": "Consolidate all conventions in the root `CLAUDE.md` file under headers for each area, relying on Claude to infer which section applies.", "C": "Create skills in `.claude/skills/` for each code type that include the relevant conventions in their `SKILL.md` files.", "D": "Place a separate `CLAUDE.md` file in each subdirectory containing that area's specific conventions."}, "correct": "A", "explanation": "`.claude/rules/` with glob patterns (e.g., `**/*.test.tsx`) allows conventions to be automatically applied based on file paths regardless of directory location. Option B relies on inference rather than explicit matching. Option C requires manual invocation. Option D can't easily handle files spread across many directories."}, {"id": "OA-Q44", "source": "olivier-alter", "scenario": "", "domain": "D3", "task_statement": "3.3", "question": "Your team uses Terraform for infrastructure but only in the `infra/` directory. You want Claude to automatically apply Terraform naming conventions and module structure rules only when editing `.tf` files, without those rules appearing in unrelated Python or TypeScript sessions. What is the correct approach?", "options": {"A": "Create a `CLAUDE.md` file inside `infra/` that contains the Terraform rules so they apply only within that subdirectory.", "B": "Create a rules file in `.claude/rules/terraform.md` with YAML frontmatter specifying `paths: [\"infra/**/*\"]` and listing the Terraform conventions.", "C": "Add the Terraform rules to the root `CLAUDE.md` under a clearly marked section, and instruct Claude in the system prompt to apply them only to `.tf` files.", "D": "Create a skill in `.claude/skills/terraform.md` with `allowed-tools` restricted to file operations on the `infra/` directory."}, "correct": "B", "explanation": "The `.claude/rules/` directory with YAML frontmatter path scoping is the correct mechanism for conditionally loading conventions. Setting `paths: [\"infra/**/*\"]` ensures the Terraform rules load only when editing files in that directory tree. Option A would work for files inside `infra/` but cannot use glob patterns to further filter by file type. Option C relies on Claude's inference rather than explicit path matching, leading to inconsistent behavior. Option D requires manual skill invocation and does not activate automatically.\n\n---\n\n### Task 3.4: Determine when to use plan mode vs direct execution"}, {"id": "OA-Q05", "source": "olivier-alter", "scenario": "", "domain": "D3", "task_statement": "3.4", "question": "You've been assigned to restructure a monolithic application into microservices. This will involve changes across dozens of files and requires decisions about service boundaries and module dependencies. Which approach should you take?", "options": {"A": "Enter plan mode to explore the codebase, understand dependencies, and design an implementation approach before making changes.", "B": "Start with direct execution and make changes incrementally, letting the implementation reveal the natural service boundaries.", "C": "Use direct execution with comprehensive upfront instructions detailing exactly how each service should be structured.", "D": "Begin in direct execution mode and only switch to plan mode if you encounter unexpected complexity during implementation."}, "correct": "A", "explanation": "Plan mode is designed for complex tasks involving large-scale changes, multiple valid approaches, and architectural decisions. Option B risks costly rework when dependencies are discovered late. Option C assumes you already know the right structure without exploring the code. Option D ignores that the complexity is already stated."}, {"id": "OA-Q45", "source": "olivier-alter", "scenario": "", "domain": "D3", "task_statement": "3.4", "question": "A developer asks Claude Code to add a single null-check to one function in a utility module. The function signature, expected behavior, and fix are all clear. Should they use plan mode or direct execution?", "options": {"A": "Plan mode, because any code change could have unexpected side effects that need exploration before committing.", "B": "Direct execution, because the task is well-scoped with a clear fix that does not require architectural decisions or multi-file analysis.", "C": "Plan mode, because exploring the codebase first prevents Claude from making assumptions about dependencies.", "D": "Use direct execution first, but run a quick plan mode scan afterward to catch any side effects before committing."}, "correct": "B", "explanation": "Direct execution is appropriate for simple, well-understood, single-location changes with clear scope. Plan mode is designed for tasks involving large-scale changes, multiple valid approaches, architectural decisions, or multi-file modifications. A null-check to one function meets none of the criteria for plan mode. Options A and C describe an over-cautious heuristic that does not reflect the intended use of plan mode. Option D inverts the correct workflow: plan mode is used before execution to explore and decide, not after as a post-execution check."}, {"id": "OA-Q46", "source": "olivier-alter", "scenario": "", "domain": "D3", "task_statement": "3.4", "question": "A developer is using plan mode to explore a large codebase before deciding how to approach a library migration. During exploration, Claude generates dozens of tool results including full file reads, search outputs, and dependency traces. The developer notices the main conversation context is filling up rapidly and fears context exhaustion before the plan is complete. What is the most appropriate technique to preserve main session context during verbose exploration?", "options": {"A": "Switch to direct execution partway through exploration so that Claude uses fewer tool calls.", "B": "Use the Explore subagent to isolate verbose discovery output, having it return a structured summary to the main session rather than accumulating raw results.", "C": "Run `/compact` immediately after each tool call to keep the context window from growing.", "D": "Restrict Claude to reading only entry point files during plan mode to limit tool call volume."}, "correct": "B", "explanation": "The Explore subagent is specifically designed to isolate verbose discovery work from the main conversation context. It performs the exploration and returns a structured summary, preventing raw tool results from consuming the main session's context budget. Option A abandons the architectural exploration prematurely. Option C helps but running `/compact` after every tool call is operationally cumbersome and loses detail that may still be needed. Option D artificially limits the exploration and would produce an incomplete analysis for complex migrations.\n\n---\n\n### Task 3.5: Apply iterative refinement techniques for progressive improvement"}, {"id": "OA-Q47", "source": "olivier-alter", "scenario": "", "domain": "D3", "task_statement": "3.5", "question": "A developer asks Claude Code to reformat date strings in a data pipeline. After the first attempt, the output format is partially correct but inconsistent: some dates are formatted as `YYYY-MM-DD`, others as `MM/DD/YYYY`. Prose instructions like \"always use ISO 8601\" have been tried twice without improvement. What technique is most likely to resolve the inconsistency?", "options": {"A": "Rewrite the instruction to be more emphatic, using capitalization and repetition to signal importance.", "B": "Provide 2-3 concrete input/output examples showing the exact transformation expected, including edge cases like two-digit years and ambiguous formats.", "C": "Switch to plan mode so Claude can explore the codebase before formatting dates.", "D": "Ask Claude to generate a formatting function first, then apply it in a second pass."}, "correct": "B", "explanation": "Concrete input/output examples are the most effective way to communicate expected transformations when prose instructions are interpreted inconsistently. Showing `\"3/15/2024\" -> \"2024-03-15\"` is unambiguous in a way that \"use ISO 8601\" is not. Option A is unlikely to improve results; emphasis does not resolve ambiguity. Option C is for architectural decisions, not formatting refinement. Option D adds complexity and still does not clarify what the correct transformation looks like."}, {"id": "OA-Q48", "source": "olivier-alter", "scenario": "", "domain": "D3", "task_statement": "3.5", "question": "A development team is using Claude Code to implement a new authentication module. Before any implementation begins, the team lead wants to ensure Claude surfaces potential security considerations, edge cases, and design tradeoffs that the team may not have anticipated. Which iterative refinement technique is most appropriate here?", "options": {"A": "Write a detailed specification document and pass it to Claude for direct implementation.", "B": "Use the interview pattern: ask Claude to question the team about their requirements, constraints, and assumptions before proposing a design.", "C": "Start with a minimal implementation and iterate by describing issues found during code review.", "D": "Provide a complete test suite first and ask Claude to write code that passes all tests."}, "correct": "B", "explanation": "The interview pattern is designed to surface design considerations and uncover assumptions the developer may not have anticipated before any implementation begins. It is particularly valuable in domains like security where overlooked edge cases carry high risk. Option A bypasses the opportunity to surface gaps before implementation is locked in. Option C defers the discovery of design issues until after implementation, when the cost of changes is higher. Option D (test-driven iteration) is effective for well-defined behavior but cannot surface considerations the team has not yet thought of."}, {"id": "OA-Q49", "source": "olivier-alter", "scenario": "", "domain": "D3", "task_statement": "3.5", "question": "Claude Code generated a data transformation function that has three separate issues: an off-by-one error in a loop, a missing null check for an optional field, and an incorrect sort order. Each issue is in a completely different part of the function and none of them interact. What is the recommended approach for addressing these issues?", "options": {"A": "Report all three issues in a single detailed message so Claude has full context for all fixes at once.", "B": "Fix them sequentially: address each issue in a separate message and verify the fix before moving to the next.", "C": "Ask Claude to regenerate the entire function from scratch rather than patching the existing code.", "D": "Address the off-by-one error and null check together since they are in loops, then fix the sort order separately."}, "correct": "B", "explanation": "When issues are independent, sequential iteration is appropriate: fixing each one separately and verifying the fix before moving on reduces the chance of fixes interfering with each other and makes each change easier to review. The guidance for sending all issues in a single message applies when the issues interact and Claude needs full context to resolve them together. Option A is suited to interacting problems, not independent ones. Option C discards working code unnecessarily. Option D creates an arbitrary grouping not based on actual interaction."}, {"id": "OA-Q51", "source": "olivier-alter", "scenario": "", "domain": "D3", "task_statement": "3.5", "question": "A developer has identified three issues in a data processing module: two logic bugs that interact because they both affect the same intermediate result, and a set of five inconsistent variable names scattered across multiple files. The logic bugs produce incorrect output only when both are present; the naming violations are independent style issues. How should these issues be addressed using iterative refinement?", "options": {"A": "Report all eight issues in a single message so Claude can resolve them together with full context.", "B": "Send the two interacting logic bugs in one message so Claude can resolve them together, then address the naming violations sequentially in separate follow-up messages after verifying the bug fixes.", "C": "Fix all naming violations first since they are simpler, then tackle the two logic bugs in a single message.", "D": "Fix each of the eight issues in eight separate sequential messages, verifying each before proceeding."}, "correct": "B", "explanation": "The guidance for batching issues is based on whether they interact. The two logic bugs interact and Claude needs full context on both to resolve them correctly, so they should be reported together. The naming violations are independent and do not affect correctness, so sequential iteration is appropriate: fix each one and verify before moving to the next. Option A lumps all issues together, which adds noise when Claude is resolving the interacting bugs. Option C addresses ordering by complexity rather than by interaction. Option D applies sequential iteration to interacting bugs, which risks an incomplete fix."}, {"id": "OA-Q52", "source": "olivier-alter", "scenario": "", "domain": "D3", "task_statement": "3.5", "question": "A team is adding a caching layer to an existing microservice. The service was written two years ago by engineers who are no longer on the team, and its internal patterns for dependency injection and lifecycle management are unfamiliar to the current developer. Before writing any code, the developer wants to ensure Claude surfaces all relevant design considerations. Which iterative refinement technique is most appropriate?", "options": {"A": "Ask Claude to implement a generic Redis-based caching layer using standard patterns for the framework, then review its output for compatibility issues.", "B": "Use the interview pattern: ask Claude to question you about the service's architecture, existing lifecycle hooks, and caching requirements before proposing any design.", "C": "Provide the service's entry point files to Claude and ask it to generate a caching design document for review.", "D": "Start with a minimal proof-of-concept cache for one endpoint and iterate by describing any failures encountered during testing."}, "correct": "B", "explanation": "The interview pattern is specifically designed for situations where the developer may not have anticipated all relevant design considerations. By asking Claude to question the developer about the service's patterns and constraints before implementing, it surfaces assumptions about lifecycle management, cache invalidation strategy, and dependency injection that the developer may not have known to specify upfront. Option A proceeds with generic patterns that may be incompatible with the unfamiliar service. Option C produces a design document but does not interactively surface considerations the developer has not yet thought of. Option D defers discovery to runtime failures rather than surfacing design issues before any code is written.\n\n---\n\n### Task 3.6: Integrate Claude Code into CI/CD pipelines"}, {"id": "OA-Q10", "source": "olivier-alter", "scenario": "", "domain": "D3", "task_statement": "3.6", "question": "Your pipeline script runs `claude \"Analyze this pull request for security issues\"` but the job hangs indefinitely. Logs indicate Claude Code is waiting for interactive input. What's the correct approach?", "options": {"A": "Add the `-p` flag: `claude -p \"Analyze this pull request for security issues\"`", "B": "Set the environment variable `CLAUDE_HEADLESS=true` before running the command", "C": "Redirect stdin from `/dev/null`: `claude \"Analyze this pull request for security issues\" < /dev/null`", "D": "Add the `--batch` flag: `claude --batch \"Analyze this pull request for security issues\"`"}, "correct": "A", "explanation": "The `-p` (or `--print`) flag is the documented way to run Claude Code in non-interactive mode. Options B and D reference non-existent features. Option C is a Unix workaround that doesn't properly address Claude Code's command syntax."}, {"id": "OA-Q50", "source": "olivier-alter", "scenario": "", "domain": "D3", "task_statement": "3.6", "question": "A CI pipeline runs Claude Code to generate test cases for each pull request. The team discovers that Claude is consistently suggesting test scenarios that already exist in the existing test files, wasting review time. Which approach in the CLAUDE.md configuration most directly addresses this problem?", "options": {"A": "Add the `-p` flag to the CI invocation command to prevent interactive prompts.", "B": "Use `--output-format json` with `--json-schema` so that test suggestions are machine-parseable for deduplication.", "C": "Document in `CLAUDE.md` the testing standards, available fixtures, and instruct Claude to review existing test files before suggesting new scenarios.", "D": "Add a post-processing script to the pipeline that compares Claude's suggestions against the existing test files and filters duplicates."}, "correct": "C", "explanation": "Providing existing test files in context and documenting testing standards in `CLAUDE.md` directly instructs Claude to avoid duplicate suggestions at generation time. This is the most efficient fix because it addresses the root cause: Claude does not know what tests already exist. Option A prevents interactive hangs but does not affect test content. Option B improves parseability but does not prevent duplicate suggestions. Option D is a workaround that adds pipeline complexity without fixing the underlying issue."}, {"id": "OA-Q53", "source": "olivier-alter", "scenario": "", "domain": "D3", "task_statement": "3.6", "question": "A CI pipeline uses Claude Code to review pull requests and needs to post inline comments on specific lines in GitHub. The pipeline currently receives Claude's output as unstructured text, which requires a fragile regex parser to extract file paths, line numbers, and comment text. The parser breaks regularly as Claude's output format drifts between runs. What is the most robust solution?", "options": {"A": "Add stricter formatting instructions to the system prompt specifying the exact text structure expected, and add validation to reject any response that does not match.", "B": "Use `--output-format json` combined with `--json-schema` to define a schema with `file`, `line`, and `comment` fields, so each finding is machine-parseable by construction.", "C": "Add a post-processing step that uses a second Claude call to normalize the first response into a consistent structured format.", "D": "Switch from inline comments to a single summary comment, which is easier to extract since it does not require line-level parsing."}, "correct": "B", "explanation": "Using `--output-format json` with `--json-schema` produces structured output that conforms to the defined schema by construction, eliminating format drift entirely. The pipeline can parse the JSON directly without a regex layer. Option A makes prompt instructions more rigid but still relies on Claude maintaining format consistency across runs, which is the root cause of the breakage. Option C adds latency and cost by introducing a second API call for normalization. Option D changes the feature behavior to work around the parsing problem rather than solving it.\n\n---\n\n## Domain 4: Prompt Engineering & Structured Output\n\n### Task 4.1: Design prompts with explicit criteria to improve precision and reduce false positives"}, {"id": "OA-Q55", "source": "olivier-alter", "scenario": "", "domain": "D4", "task_statement": "4.1", "question": "A CI code review prompt flags 60% of pull requests for \"potential security vulnerabilities.\" Developers have stopped reading the reports because nearly all flags are false positives on standard input validation patterns they consider acceptable. Adding \"only report high-confidence findings\" to the prompt has had no measurable effect. What is the most effective next step?", "options": {"A": "Replace the security review prompt with a rule-based static analysis tool that has zero false positives.", "B": "Temporarily disable the security category and add explicit criteria defining which patterns constitute a reportable vulnerability versus acceptable practice, with concrete code examples for each.", "C": "Increase the review model to a larger tier to improve its judgment on security issues.", "D": "Add a post-processing confidence threshold: discard any finding where Claude rates its own confidence below 80%."}, "correct": "B", "explanation": "General instructions like \"only report high-confidence findings\" fail to reduce false positives because they do not define what counts as a positive. Tempora
