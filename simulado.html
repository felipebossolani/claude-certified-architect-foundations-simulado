rily disabling the noisy category restores developer trust immediately while explicit criteria with examples give Claude the specificity needed to distinguish real issues from acceptable patterns. Option A abandons the AI-based review entirely rather than fixing it. Option C is unlikely to change false positive rates when the root cause is imprecise criteria. Option D relies on self-reported confidence scores, which are poorly calibrated for LLMs."}, {"id": "OA-Q56", "source": "olivier-alter", "scenario": "", "domain": "D4", "task_statement": "4.1", "question": "A Claude-based pull request reviewer raises \"magic number\" warnings on every numeric literal in the codebase, including well-understood constants like HTTP status codes and standard buffer sizes. Developers want magic numbers flagged only when they appear in business logic with no explanation. How should the prompt be updated?", "options": {"A": "Add an instruction to \"use good judgment about whether numbers are truly magic numbers.\"", "B": "Define explicit criteria: flag numeric literals that appear in business logic calculations with no accompanying comment or named constant; exclude HTTP status codes, standard buffer sizes, and any value documented in a comment.", "C": "Add a severity field to findings and instruct Claude to omit any finding with severity \"low.\"", "D": "Provide a list of allowed numeric values that should never be flagged."}, "correct": "B", "explanation": "Explicit, specific criteria that define what to report and what to exclude are far more effective than general guidance or exclusion lists. Describing the precise conditions that make a number \"magic\" gives Claude a clear decision rule rather than requiring inference. Option A is the kind of vague instruction that causes the problem in the first place. Option C introduces a severity layer that does not address the underlying definitional problem. Option D would require maintaining an incomplete and fragile list that does not generalize to new values."}, {"id": "OA-Q57", "source": "olivier-alter", "scenario": "", "domain": "D4", "task_statement": "4.1", "question": "A Claude-based code reviewer is generating inconsistent feedback on documentation quality: sometimes flagging missing docstrings for private helper functions, sometimes not; sometimes requiring full parameter descriptions, sometimes accepting one-line summaries. The team wants consistent, predictable documentation feedback on public API functions only. Which change most directly addresses the inconsistency?", "options": {"A": "Instruct Claude to \"apply documentation standards consistently and carefully.\"", "B": "Define explicit documentation criteria: public API functions must have a docstring with a one-sentence summary, parameter descriptions, and return value description; private functions are excluded from documentation checks.", "C": "Run three parallel review instances and accept feedback that appears in at least two of the three.", "D": "Restrict the review prompt to only one concern at a time, alternating between security, documentation, and style in separate runs."}, "correct": "B", "explanation": "Explicit criteria that specify exactly what is required, for which functions, and at what level of detail eliminate the ambiguity that causes inconsistency. Without a clear definition of \"documented,\" Claude must infer the threshold each time, leading to variable results. Option A is the type of general instruction that already produces the problem. Option C adds overhead and suppresses legitimate feedback that may only appear in one instance. Option D separates concerns but does not fix the definition of what counts as adequate documentation.\n\n---\n\n### Task 4.2: Apply few-shot prompting to improve output consistency and quality"}, {"id": "OA-Q58", "source": "olivier-alter", "scenario": "", "domain": "D4", "task_statement": "4.2", "question": "A team uses Claude to generate code review comments for pull requests. The comments are technically accurate but vary widely in format: some include file paths and line numbers, others are vague summaries, some use bullet points, and others write prose paragraphs. Developers want a consistent, actionable format: file path, line number, issue description, suggested fix. What is the most effective way to achieve this?", "options": {"A": "Add a format specification to the system prompt listing the required fields.", "B": "Provide 2-4 few-shot examples in the prompt showing the exact desired output format for different types of issues, including file path, line number, issue description, and suggested fix.", "C": "Use `--output-format json` and parse the results in a post-processing step to normalize format.", "D": "Ask Claude to self-review its output and reformat any comment that does not match the required structure."}, "correct": "B", "explanation": "Few-shot examples demonstrating the exact desired output format are the most effective technique for achieving consistently formatted output when detailed instructions alone produce inconsistent results. Seeing concrete examples of the format makes the requirement unambiguous. Option A is a format specification that has likely already been tried given the problem description. Option C introduces parsing complexity and does not ensure consistent generation. Option D adds a round-trip that may still produce inconsistent intermediate output."}, {"id": "OA-Q59", "source": "olivier-alter", "scenario": "", "domain": "D4", "task_statement": "4.2", "question": "A structured data extraction system is extracting contract clauses from legal documents. The model handles standard clauses well but consistently misclassifies ambiguous clauses that could fit two or more categories, such as a clause that contains both termination conditions and force majeure language. What few-shot prompting approach is most effective for improving accuracy on these edge cases?", "options": {"A": "Add more few-shot examples of standard, unambiguous clauses to reinforce the classification schema overall.", "B": "Create targeted few-shot examples that specifically demonstrate ambiguous-case handling: showing the reasoning for why a clause with both termination and force majeure language belongs to one category and not the other.", "C": "Switch from classification to extraction: ask Claude to extract the clause text without categorizing it, then apply a rule-based classifier.", "D": "Add a confidence score field and route all low-confidence classifications to human review without attempting to improve the model's judgment."}, "correct": "B", "explanation": "Targeted few-shot examples for ambiguous scenarios that show the reasoning behind the classification decision are the most effective technique for improving handling of edge cases. Standard examples do not teach the model how to handle cases that span category boundaries. Option A reinforces behavior that already works rather than addressing the gap. Option C sidesteps the classification problem rather than solving it. Option D is a reasonable operational safeguard but does not improve model accuracy."}, {"id": "OA-Q60", "source": "olivier-alter", "scenario": "", "domain": "D4", "task_statement": "4.2", "question": "A document extraction system uses Claude to pull financial figures from quarterly earnings reports. The reports have varied formats: some use tables, some use inline prose, some use both. Extraction accuracy for tabular data is high (94%) but prose-only documents show only 72% accuracy. What is the most targeted approach to improve prose extraction accuracy?", "options": {"A": "Increase the system prompt's emphasis on accuracy with stronger language and more detailed instructions.", "B": "Add few-shot examples specifically showing correct extraction from prose-formatted documents, including cases where numbers appear in sentence form rather than tables.", "C": "Pre-process all documents to convert prose financial data into table format before sending to Claude.", "D": "Use a separate prompt for prose documents that instructs Claude to first identify all sentences containing numbers, then extract figures from those sentences only."}, "correct": "B", "explanation": "Few-shot examples demonstrating correct extraction from documents with varied formats directly address the accuracy gap on prose documents. The model already generalizes well to tabular data; the gap is in prose, and targeted examples for that format close the gap most efficiently. Option A relies on emphasis, which does not resolve structural pattern differences. Option C requires reliable pre-processing of arbitrarily structured prose, which is non-trivial. Option D adds complexity and may miss numbers that are discussed without appearing in sentences Claude isolates.\n\n---\n\n### Task 4.3: Enforce structured output using tool use and JSON schemas"}, {"id": "OA-Q61", "source": "olivier-alter", "scenario": "", "domain": "D4", "task_statement": "4.3", "question": "Your extraction pipeline uses a prompt that requests JSON output with a code block. In production, approximately 3% of responses have JSON syntax errors: missing commas, unescaped characters, or truncated objects. These errors break your downstream parser and require manual reprocessing. What is the most reliable way to eliminate JSON syntax errors?", "options": {"A": "Add a validation step that re-runs the prompt if the output fails JSON parsing, up to 3 retries.", "B": "Switch to tool use with a defined JSON schema as the input parameter; extract structured data from the `tool_use` response block.", "C": "Add an instruction to the prompt: \"Your response must be valid JSON. Double-check for syntax errors before responding.\"", "D": "Use a regex post-processor to fix the most common syntax errors before passing output to the parser."}, "correct": "B", "explanation": "Tool use with a JSON schema guarantees schema-compliant structured output by construction, eliminating syntax errors entirely. The model populates the tool call's input parameters according to the schema rather than generating free-text JSON. Option A reduces the frequency of failures but does not eliminate syntax errors. Option C relies on model self-checking, which does not provide the deterministic guarantee that tool use provides. Option D is a fragile workaround that cannot handle all syntax error patterns."}, {"id": "OA-Q62", "source": "olivier-alter", "scenario": "", "domain": "D4", "task_statement": "4.3", "question": "Your structured data extraction pipeline processes invoices. You have two extraction tools: `extract_invoice_schema` and `extract_receipt_schema`. For each document, you do not know in advance which type it is. After switching to `tool_choice: \"auto\"`, you observe that 30% of the time the model returns a text description of what it found rather than calling either tool. What is the correct fix?", "options": {"A": "Set `tool_choice: \"any\"` to guarantee the model calls one of the available extraction tools without specifying which one.", "B": "Set `tool_choice: {\"type\": \"tool\", \"name\": \"extract_invoice_schema\"}` to always call a specific tool.", "C": "Add a system prompt instruction: \"Always call one of the extraction tools and never return text.\"", "D": "Merge both schemas into a single `extract_document_schema` tool with an optional `document_type` field."}, "correct": "A", "explanation": "`tool_choice: \"any\"` guarantees the model calls a tool rather than returning conversational text, without requiring you to specify which tool. This is exactly the documented use case when you have multiple valid tools and want to ensure one is called. Option B forces a specific tool, which defeats the purpose when you do not know the document type in advance. Option C is a prompt-based approach with probabilistic compliance, which already failed as evidenced by the 30% text response rate. Option D is a valid architectural change but requires more engineering effort than a single configuration change.\n\n---\n\n### Task 4.4: Implement validation, retry, and feedback loops for extraction quality"}, {"id": "OA-Q63", "source": "olivier-alter", "scenario": "", "domain": "D4", "task_statement": "4.4", "question": "An invoice extraction pipeline uses tool use with a strict JSON schema. After validation, 8% of extracted invoices fail a business rule check: the sum of line item amounts does not equal the `total_amount` field. These are semantic errors, not schema syntax errors. The invoices are well-formed documents with no missing data. How should you implement the retry loop?", "options": {"A": "Retry up to 3 times with the same prompt; schema-compliant extraction will converge on a valid answer with additional attempts.", "B": "On failure, append the original document, the failed extraction, and the specific validation error (\"line items sum to X but total_amount is Y\") to the follow-up prompt for model self-correction.", "C": "Flag all invoices with this error as missing data and route them directly to human review without retry.", "D": "Add a `calculated_total` field to the schema and populate it with the sum of line items in post-processing, then use the calculated total as the canonical value."}, "correct": "B", "explanation": "Retry-with-error-feedback works by giving the model the specific discrepancy it needs to self-correct. Since the invoices are well-formed and the data is present, the model has the information it needs to fix the arithmetic alignment on retry. Option A retries without feedback and is unlikely to improve results since the model will reproduce the same error. Option C routes to human review prematurely when a retry with feedback could resolve the issue. Option D silently replaces the model's extracted total with a calculated value, which could propagate errors if the line items themselves were extracted incorrectly."}, {"id": "OA-Q64", "source": "olivier-alter", "scenario": "", "domain": "D4", "task_statement": "4.4", "question": "A CI code review pipeline is generating false positive findings at a high rate. The team wants to understand which specific code constructs are being flagged incorrectly so they can refine the prompt. The current findings output only includes `file`, `line`, and `description`. What schema change would best enable systematic false positive analysis?", "options": {"A": "Add a `confidence` field (0-100) to each finding so the team can filter by confidence threshold.", "B": "Add a `detected_pattern` field to each finding that records the specific code construct or pattern that triggered the finding.", "C": "Add a `category` field so findings can be grouped by issue type for aggregate analysis.", "D": "Add an `is_false_positive` boolean field and instruct Claude to self-label its own false positives."}, "correct": "B", "explanation": "The `detected_pattern` field directly captures what code construct triggered each finding, enabling the team to identify which patterns produce the most false positives and update prompt criteria accordingly. Option A provides confidence scores but does not identify what prompted the finding. Option C allows grouping but not pattern-level debugging. Option D asks Claude to self-identify its own false positives, which is unreliable since the model cannot accurately distinguish true from false positives without ground truth."}, {"id": "OA-Q67", "source": "olivier-alter", "scenario": "", "domain": "D4", "task_statement": "4.4", "question": "A financial document extraction pipeline is failing on the \"guarantor address\" field for a set of loan summaries. After 3 retry attempts with error feedback, the field still extracts as null. Each retry prompt includes the original document and the validation error. What should you investigate before scheduling further retries?", "options": {"A": "Increase the retry limit from 3 to 5, since complex field extraction may require more attempts to converge.", "B": "Check whether the guarantor address is actually present in the loan summary document, or whether the document only references it by directing the reader to an external exhibit.", "C": "Switch to a larger model tier for the retry attempts, since the current model may lack the reasoning capacity for this field.", "D": "Restructure the schema to make the guarantor address field optional, allowing the pipeline to proceed when the field cannot be extracted."}, "correct": "B", "explanation": "Retries are only effective when the information needed to satisfy the validation is present in the document. A loan summary that references guarantor details in an external exhibit does not contain the address. No number of retries will extract information that is not in the input. Before adding retry cycles, validate that the target field is actually present in the source document. Option A adds more retries without diagnosing why the existing retries are failing. Option C may improve performance on difficult extractions but does not address absence of data. Option D removes the validation rather than diagnosing the root cause.\n\n---\n\n### Task 4.5: Design efficient batch processing strategies"}, {"id": "OA-Q11", "source": "olivier-alter", "scenario": "", "domain": "D4", "task_statement": "4.5", "question": "Your team wants to reduce API costs. Two workflows: (1) a blocking pre-merge check that must complete before developers can merge, and (2) a technical debt report generated overnight for review the next morning. Your manager proposes switching both to the Message Batches API for 50% cost savings. How should you evaluate this proposal?", "options": {"A": "Use batch processing for the technical debt reports only; keep real-time calls for pre-merge checks.", "B": "Switch both workflows to batch processing with status polling to check for completion.", "C": "Keep real-time calls for both workflows to avoid batch result ordering issues.", "D": "Switch both to batch processing with a timeout fallback to real-time if batches take too long."}, "correct": "A", "explanation": "The Message Batches API has up to 24-hour processing times with no guaranteed latency SLA. This makes it unsuitable for blocking pre-merge checks but ideal for overnight batch jobs. Option B is wrong because relying on \"often faster\" completion isn't acceptable for blocking workflows. Option C reflects a misconception: batch results can be correlated using `custom_id` fields."}, {"id": "OA-Q65", "source": "olivier-alter", "scenario": "", "domain": "D4", "task_statement": "4.5", "question": "A compliance team runs a weekly audit that analyzes 50,000 contract documents for regulatory clauses. The audit results are reviewed by a compliance analyst every Monday morning. The team is considering the Message Batches API. A colleague raises a concern: \"What if a batch fails partway through the 50,000 documents?\" How should partial batch failures be handled?", "options": {"A": "Always resubmit the entire batch; tracking partial failures adds implementation complexity.", "B": "Use the `custom_id` field to correlate each request with its response, identify which documents returned error responses, and resubmit only those documents in a new batch.", "C": "Set a shorter processing window timeout to force faster completion and reduce the risk of partial failures.", "D": "Switch to real-time API calls with retry logic; the batch API is not suitable for mission-critical compliance workloads."}, "correct": "B", "explanation": "The `custom_id` field is specifically designed for correlating batch request and response pairs, enabling teams to identify which documents failed and resubmit only those, avoiding the cost of reprocessing the entire batch. Option A wastes 50% cost savings by reprocessing successful documents. Option C misunderstands the batch API; processing windows are managed by Anthropic and cannot be shortened on demand. Option D is overly conservative: the batch API is appropriate for non-blocking, latency-tolerant compliance audits, which this workflow is.\n\n---\n\n### Task 4.6: Design multi-instance and multi-pass review architectures"}, {"id": "OA-Q66", "source": "olivier-alter", "scenario": "", "domain": "D4", "task_statement": "4.6", "question": "A developer generates a 300-line module using Claude Code in one session, then asks the same session to review the code for bugs. The review returns \"looks good\" with minor style suggestions but misses two logic errors that a colleague catches in manual review. What is the most likely cause, and what architectural change addresses it?", "options": {"A": "The context window was too large; the fix is to limit code generation to smaller chunks so the review has less to process.", "B": "The reviewing instance retains reasoning context from generation, making it less likely to question its own decisions. Use a second independent Claude instance without the generation context to perform the review.", "C": "The review prompt was too vague; adding more explicit review criteria to the same session would catch the missed errors.", "D": "The model tier used for generation is more capable than the one used for review; switching both to the same tier resolves the quality gap."}, "correct": "B", "explanation": "Self-review limitation is a known pattern: when a model retains the reasoning context from code generation, it is less likely to identify errors in its own output. An independent review instance without the generator's context approaches the code without prior assumptions and catches issues the generating instance would overlook. Option A addresses context length, not reasoning context bias. Option C might improve detection of certain categories of issues but does not address the fundamental self-review limitation. Option D addresses model selection, not the structural problem of reviewing one's own output."}, {"id": "OA-Q68", "source": "olivier-alter", "scenario": "", "domain": "D4", "task_statement": "4.6", "question": "A developer builds a code generation pipeline where Claude generates a 200-line module, and then the same session reviews the generated code for correctness. The review returns only minor style suggestions and misses a logic error in the error handling path. A second developer reviewing the code manually finds the bug immediately. What architectural change would make the review phase more effective?", "options": {"A": "Add more explicit review criteria to the generation session's system prompt to help it catch logic errors.", "B": "Use a second independent Claude instance without the generation context to perform the review, since the generating instance retains reasoning context that makes it less likely to question its own decisions.", "C": "Run the review immediately after generation before any other tool calls accumulate in the context window.", "D": "Switch to a larger model tier for the review step to improve reasoning quality."}, "correct": "B", "explanation": "When a model reviews code it generated in the same session, it retains the reasoning context from generation and is less likely to identify errors in its own output. An independent review instance approaches the code without prior assumptions and catches issues the generating instance overlooks. This is the documented rationale for multi-instance review architectures. Option A improves the review prompt but does not address the fundamental self-review limitation. Option C manages context length but does not remove the generator's retained reasoning bias. Option D improves general capability but does not change the structural problem of a model reviewing its own work.\n\n---\n\n## Domain 5: Context Management & Reliability\n\n### Task 5.1: Manage conversation context to preserve critical information across long interactions"}, {"id": "OA-Q69", "source": "olivier-alter", "scenario": "", "domain": "D5", "task_statement": "5.1", "question": "A customer support agent is handling a complex billing dispute that spans 20+ turns. A customer mentioned early in the conversation that they were charged $847.50 on March 3rd for a service they cancelled on February 28th. Midway through the conversation, the agent references the charge as \"the overcharge from last month\" without the specific amount. The customer disputes the agent's understanding of the case. What context management technique would prevent this?", "options": {"A": "Use `/compact` at the start of each conversation to summarize prior turns into a shorter representation.", "B": "Extract transactional facts (amounts, dates, order numbers, statuses) into a persistent \"case facts\" block that is included at the beginning of every subsequent prompt in the conversation.", "C": "Increase the model's context window by switching to a larger tier to retain the full conversation without summarization.", "D": "Instruct the agent to re-read the full conversation history before each response."}, "correct": "B", "explanation": "Extracting precise transactional facts into a persistent \"case facts\" block ensures that specific numerical values, dates, and customer-stated details are explicitly available in every prompt turn rather than buried in growing conversation history. Progressive summarization risks condensing these details into vague references like \"overcharge from last month.\" Option A's compaction is useful for context length management but can lose precision on transactional facts. Option C does not prevent progressive summarization and is not a reliable solution. Option D is not practical for long conversations and still does not prevent facts from being lost as context grows."}, {"id": "OA-Q70", "source": "olivier-alter", "scenario": "", "domain": "D5", "task_statement": "5.1", "question": "A multi-agent research pipeline aggregates findings from six subagents, each returning 800-1,200 tokens of raw tool output and reasoning. The synthesis agent receives all results in a single large message. The final report consistently omits or contradicts findings that appeared in the middle sections of the aggregated input. What is the most likely cause and the most effective mitigation?", "options": {"A": "The subagents are returning conflicting information; add a deduplication step before synthesis.", "B": "The synthesis agent is hitting its output token limit; increase `max_tokens` to allow a longer response.", "C": "The \"lost in the middle\" effect causes models to reliably process content at the beginning and end of long inputs but miss middle sections. Mitigate by placing key findings summaries at the beginning of aggregated inputs and organizing sections with explicit headers.", "D": "The synthesis agent's context window is exhausted; route some subagent outputs through a secondary summarization agent before passing to synthesis."}, "correct": "C", "explanation": "The \"lost in the middle\" effect is a well-documented limitation where models attend less reliably to content in the middle of long inputs. Placing key findings at the beginning and using explicit section headers to organize the aggregated input significantly mitigates this effect. Option A addresses data consistency but not the positional attention problem. Option B addresses output length, not input attention. Option D adds pipeline complexity and may help with context length, but does not address the positional attention issue on its own.\n\n---\n\n### Task 5.2: Design effective escalation and ambiguity resolution patterns"}, {"id": "OA-Q71", "source": "olivier-alter", "scenario": "", "domain": "D5", "task_statement": "5.2", "question": "A customer opens a support chat saying \"I'd like to speak to a human please. I've been dealing with this billing issue for three weeks and I'm frustrated.\" The agent has already identified this as a standard billing adjustment that it can resolve in 2 steps using its available tools. Your agent responds by saying \"I can help with that right away, let me pull up your account.\" and proceeds to investigate. The customer repeats their request for a human. What is wrong with this behavior and what should be corrected?", "options": {"A": "The agent should honor an explicit customer request for a human agent immediately on first request, without attempting investigation first.", "B": "The agent should detect negative sentiment and escalate once the frustration score exceeds a defined threshold.", "C": "The agent should complete its investigation, present the proposed solution, and escalate only if the customer still insists afterward.", "D": "The agent should apologize for the wait, then proceed with automated resolution since the case is within its capability."}, "correct": "A", "explanation": "When a customer explicitly requests a human agent, that request must be honored immediately regardless of whether the agent believes it can resolve the issue. Proceeding with investigation after a clear escalation request violates the design principle documented in Task 5.2. Option B introduces sentiment scoring as a proxy, but the customer has already expressed an explicit preference. Sentiment analysis is irrelevant here. Option C delays honoring the request while investigation proceeds, which further frustrates the customer. Option D is the agent's current incorrect behavior: capability is not the deciding factor when a customer has made an explicit request.\n\n---\n\n### Task 5.3: Implement error propagation strategies across multi-agent systems"}, {"id": "OA-Q72", "source": "olivier-alter", "scenario": "", "domain": "D5", "task_statement": "5.3", "question": "Your web search subagent encounters a timeout while fetching results for a competitor analysis. The engineering team implements a change so the subagent catches the timeout internally and returns an empty result set with `status: \"success\"` and `results: []`. The coordinator receives this and the synthesis agent produces a report that is missing the competitive section entirely, with no indication anything went wrong. What is the problem with this approach?", "options": {"A": "Silently returning an empty success result prevents the coordinator from making any recovery decision and allows incomplete work to pass as complete output.", "B": "The synthesis agent should be responsible for detecting empty sections and re-triggering the search subagent directly.", "C": "The coordinator should always validate that each subagent returned non-empty results before proceeding to synthesis.", "D": "The timeout threshold should be increased so that the subagent does not time out before returning real results."}, "correct": "A", "explanation": "Silently suppressing errors by returning empty results as success is an explicitly documented anti-pattern. It removes the coordinator's ability to recover, retry, or annotate output with coverage gaps. Option B incorrectly shifts the recovery responsibility to the synthesis agent, which lacks the tools and context to re-run searches. Option C adds coordinator-level validation as a safeguard, but it does not address the root cause: the subagent is misrepresenting failure as success. Option D addresses the symptom (timeout threshold) rather than the error propagation design flaw.\n\n---\n\n### Task 5.4: Manage context effectively in large codebase exploration"}, {"id": "OA-Q73", "source": "olivier-alter", "scenario": "", "domain": "D5", "task_statement": "5.4", "question": "An agent is performing a deep exploration of a 200,000-line legacy codebase to understand its payment processing flow. After approximately 90 minutes and dozens of file reads, the agent begins referencing \"standard patterns in payment systems\" rather than the specific classes and flows it found earlier, and its answers become inconsistent with findings from the first hour. What is the most likely cause and the best mitigation strategy?", "options": {"A": "The agent has reached a rate limit; the fix is to add delays between tool calls to stay within limits.", "B": "Context degradation: as the session grows, specific findings from early in the session compete with general knowledge and the agent's position-attention effects. Mitigate by having the agent maintain a scratchpad file recording key findings throughout the session.", "C": "The legacy codebase's file structure is too complex for a single agent; break it into independent subsystems and run separate agents on each subsystem simultaneously.", "D": "The agent is using the wrong tools; switching from `Read` to `Grep` for file exploration would reduce context consumption."}, "correct": "B", "explanation": "Context degradation in extended sessions is a known pattern: models start giving inconsistent answers and referencing general knowledge rather than specific findings discovered earlier. Having the agent maintain a scratchpad file that records key findings creates a persistent, explicit record that can be referenced and included in subsequent prompts, preventing specific details from being lost to context pressure. Option A misidentifies the cause as a rate limit. Option C adds parallelism but does not address the single-session degradation problem. Option D changes tooling but does not address context growth or degradation."}, {"id": "OA-Q74", "source": "olivier-alter", "scenario": "", "domain": "D5", "task_statement": "5.4", "question": "You are running a multi-phase codebase investigation using the Claude Agent SDK. After 45 minutes of exploration (reading files, tracing call chains, building a dependency map) you move into the second phase: identifying security vulnerabilities in the authentication module. You notice the agent is now describing the authentication module as \"using standard JWT patterns\" when earlier in the session it had found a custom token signing implementation. What technique would most effectively preserve key findings across these phase boundaries?", "options": {"A": "Have the agent maintain a scratchpad file that records key findings after each phase, and reference that file at the start of subsequent phases rather than relying on conversation history.", "B": "Use `/compact` before starting the second phase to free up context space and allow the agent to re-read files as needed.", "C": "Restart the session with a fresh context at the start of each phase, passing a manual summary of what you found.", "D": "Increase the `max_tokens` parameter so the model can hold more context without compressing earlier findings."}, "correct": "A", "explanation": "Scratchpad files are the recommended technique for persisting key findings across context boundaries when context degradation becomes apparent. The agent can write structured notes during exploration and read them back at phase boundaries, ensuring critical findings, like the custom token signing implementation, are not lost to context compression. Option B uses `/compact` to free up space, but this compresses conversation history and may lose the specific finding about the custom token signing. Option C is a valid but costly approach: restarting sessions loses the accumulated understanding and requires manual intervention. Option D is incorrect because `max_tokens` controls output length, not context window size, and would not prevent the degradation.\n\n---\n\n### Task 5.5: Design human review workflows and confidence calibration"}, {"id": "OA-Q75", "source": "olivier-alter", "scenario": "", "domain": "D5", "task_statement": "5.5", "question": "A structured data extraction system for insurance claims achieves 97% overall accuracy on a validation set. The team proposes automating the full workflow without human review. A colleague argues this aggregate metric masks important risks. What is the most important concern?", "options": {"A": "97% accuracy means 3% of claims will have errors, which could create legal liability if unchecked.", "B": "Aggregate accuracy metrics can mask poor performance on specific document types or fields. A claim type or field category with 85% accuracy would be hidden by strong performance elsewhere, and stratified analysis is needed before automating.", "C": "The validation set may not be representative of production data volumes, so the 97% figure cannot be trusted.", "D": "Human review should always be retained regardless of accuracy metrics because automation of insurance decisions creates regulatory risk."}, "correct": "B", "explanation": "The core risk is that aggregate metrics can hide poor performance on specific segments. A document type with 85% accuracy on a critical field like `claim_amount` would be masked by strong performance across other document types. Before automating, accuracy should be validated by document type and field segment to confirm consistent performance across all dimensions. Option A is a valid concern but describes the error rate, not the masking risk. Option C raises a data quality concern but is not the most important concern about the specific 97% figure. Option D makes a policy argument that does not engage with the analytical gap identified."}, {"id": "OA-Q76", "source": "olivier-alter", "scenario": "", "domain": "D5", "task_statement": "5.5", "question": "An extraction pipeline achieves high accuracy on average but the team wants to implement confidence-based routing: high-confidence extractions proceed automatically while low-confidence ones go to human review. A developer proposes using the model's stated confidence scores directly as the routing threshold. What is the critical flaw in this approach?", "options": {"A": "Confidence scores add tokens to every response, increasing API costs unnecessarily.", "B": "Model confidence scores must be calibrated against a labeled validation set to determine what score threshold actually corresponds to acceptable accuracy. Uncalibrated raw scores are not reliable predictors of extraction correctness.", "C": "Confidence scores only work when the model outputs a single extraction; multi-field documents require a different approach.", "D": "Routing on confidence scores creates two separate code paths that are harder to maintain than a single uniform review workflow."}, "correct": "B", "explanation": "A model's raw confidence scores need calibration: without comparing stated confidence against actual correctness on a labeled validation set, there is no reliable mapping between a score of \"0.85\" and an acceptable error rate. Calibrating the threshold ensures that the routing cut-off corresponds to a known accuracy level. Option A is a minor operational concern, not a critical flaw. Option C is incorrect; confidence scores can be applied at the field level for multi-field documents. Option D is an engineering tradeoff, not a flaw in the confidence approach itself.\n\n---\n\n### Task 5.6: Preserve information provenance and handle uncertainty in multi-source synthesis"}, {"id": "OA-Q77", "source": "olivier-alter", "scenario": "", "domain": "D5", "task_statement": "5.6", "question": "A research synthesis agent is combining findings from five subagents that searched different sources. The final report states that \"AI adoption in healthcare reached 45% in 2024\" but does not cite which source this came from. A reviewer cannot verify the claim because the subagents' individual outputs were not preserved. What structural change to the pipeline would prevent this provenance loss?", "options": {"A": "Require the synthesis agent to add a generic \"Sources consulted\" section at the end of the report listing all sources accessed.", "B": "Require subagents to output structured claim-source mappings (claim text, source URL, document name, relevant excerpt) and instruct the synthesis agent to preserve and merge these mappings into the final report rather than summarizing them away.", "C": "Store all raw subagent outputs in a separate log file so they can be consulted if a claim needs verification.", "D": "Add a post-synthesis review step where a separate agent checks each claim in the report against the raw subagent outputs."}, "correct": "B", "explanation": "The root cause of provenance loss is that summarization steps compress findings without preserving claim-to-source mappings. Requiring subagents to output structured mappings and instructing the synthesis agent to preserve and merge them ensures that each claim in the final report carries its source attribution through the pipeline. Option A produces a list of sources consulted but does not link individual claims to specific sources. Option C stores raw data as a fallback but does not integrate provenance into the report itself. Option D adds a verification step after the fact but does not prevent the structural provenance loss.\n\n---\n\n## Answer Key\n\n| Q | Answer | | Q | Answer | | Q | Answer | | Q | Answer |\n|---|--------|-|---|--------|-|---|--------|-|---|--------|\n| 1 | A | | 21 | C | | 41 | B | | 61 | B |\n| 2 | B | | 22 | B | | 42 | A | | 62 | A |\n| 3 | A | | 23 | C | | 43 | B | | 63 | B |\n| 4 | A | | 24 | C | | 44 | B | | 64 | B |\n| 5 | A | | 25 | B | | 45 | B | | 65 | B |\n| 6 | A | | 26 | B | | 46 | B | | 66 | B |\n| 7 | B | | 27 | B | | 47 | B | | 67 | B |\n| 8 | A | | 28 | A | | 48 | B | | 68 | B |\n| 9 | A | | 29 | C | | 49 | B | | 69 | B |\n| 10 | A | | 30 | A | | 50 | C | | 70 | C |\n| 11 | A | | 31 | B | | 51 | B | | 71 | A |\n| 12 | A | | 32 | B | | 52 | B | | 72 | A |\n| 13 | B | | 33 | B | | 53 | B | | 73 | B |\n| 14 | B | | 34 | B | | 54 | A | | 74 | A |\n| 15 | B | | 35 | B | | 55 | B | | 75 | B |\n| 16 | C | | 36 | C | | 56 | B | | 76 | B |\n| 17 | B | | 37 | B | | 57 | B | | 77 | B |\n| 18 | B | | 38 | B | | 58 | B | | | |\n| 19 | B | | 39 | C | | 59 | B | | | |\n| 20 | B | | 40 | B | | 60 | B | | | |\n\n---\n\n*Retro-engineered practice exam based on the Claude Certified Architect. Foundations Exam Guide (v0.1, Feb 2025). 77 questions across 5 domains. Not an official Anthropic product.*"}, {"id": "PL-Q01", "source": "paullarionov", "scenario": "Multi-agent Research System", "domain": "D1", "task_statement": "1.x", "question": "A document analysis agent discovers that two credible sources contain directly contradictory statistics for a key metric: a government report states 40% growth, while an industry analysis states 12%. Both sources look credible, and the discrepancy could materially affect the research conclusions. How should the document analysis agent handle this situation most effectively? Which approach is most effective?", "options": {"A": "Apply credibility heuristics to pick the most likely correct number, finish analysis with that value, and add a footnote mentioning the discrepancy.", "B": "Include both numbers in the analysis output without marking them as conflicting, letting the synthesis agent decide which to use based on broader context.", "C": "Stop analysis and immediately escalate to the coordinator, asking it to decide which source is more authoritative before continuing.", "D": "Complete analysis with both numbers, explicitly annotate the conflict with source attribution, and let the coordinator decide how to reconcile the data before passing to synthesis."}, "correct": "D", "explanation": "This approach preserves separation of responsibilities: the analysis agent completes its core work without blocking, preserves both conflicting values with clear attribution, and correctly passes reconciliation to the coordinator, which has broader context."}, {"id": "PL-Q02", "source": "paullarionov", "scenario": "Multi-agent Research System", "domain": "D1", "task_statement": "1.x", "question": "The web-search and document-analysis agents have completed their tasks and returned results to the coordinator. What is the next step for creating an integrated research report? Which next step is most appropriate?", "options": {"A": "Each agent sends its results directly to the report-writing agent, bypassing the coordinator.", "B": "The document analysis agent requests web-search results and merges them internally.", "C": "The coordinator passes both sets of results to the synthesis agent for a unified integration.", "D": "The coordinator concatenates the raw outputs from both agents and returns them as the final result."}, "correct": "C", "explanation": "In a coordinator–subagent architecture, the coordinator forwards both result sets to the synthesis agent for centralized integration, preserving control and ensuring high-quality merging."}, {"id": "PL-Q03", "source": "paullarionov", "scenario": "Multi-agent Research System", "domain": "D1", "task_statement": "1.x", "question": "A document analysis subagent frequently fails when processing PDF files: some have corrupted sections that trigger parsing exceptions, others are password-protected, and sometimes the parsing library hangs on large files. Currently, any exception immediately terminates the subagent and returns an error to the coordinator, which must decide whether to retry, skip, or fail the whole task. This causes excessive coordinator involvement in routine error handling. What architectural improvement is most effective? Which improvement is most effective?", "options": {"A": "Create a dedicated error-handling agent that monitors all failures via a shared queue and decides recovery actions, sending restart commands directly to subagents.", "B": "Configure the subagent to always return partial results with a success status, embedding error details in metadata; the coordinator treats all responses as successful.", "C": "Make the coordinator validate all documents before sending them to the subagent, rejecting documents that might cause failures.", "D": "Implement local recovery in the subagent for transient failures and escalate to the coordinator only errors it cannot resolve, including attempted steps and partial results."}, "correct": "D", "explanation": "Handle errors at the lowest level capable of resolving them. Local recovery reduces coordinator workload while still escalating truly unrecoverable issues with full context and partial progress."}, {"id": "PL-Q04", "source": "paullarionov", "scenario": "Multi-agent Research System", "domain": "D1", "task_statement": "1.x", "question": "After running the system on “AI impact on creative industries,” you observe that every subagent completes successfully: the web-search agent finds relevant articles, the document analysis agent summarizes them correctly, and the synthesis agent produces coherent text. However, final reports cover only visual art and completely miss music, literature, and film. In the coordinator logs, you see it decomposed the topic into three subtasks: “AI in digital art,” “AI in graphic design,” and “AI in photography.” What is the most likely root cause? What is the most likely root cause?", "options": {"A": "The synthesis agent lacks instructions to detect coverage gaps.", "B": "The document analysis agent filters out non-visual sources due to overly strict relevance criteria.", "C": "The coordinator’s task decomposition is too narrow, assigning subagents work that does not cover all relevant areas.", "D": "The web-search agent’s queries are insufficient and should be broadened to cover more sectors."}, "correct": "C", "explanation": "The coordinator decomposed a broad topic only into visual-art subtasks, missing music, literature, and film entirely. Since subagents executed their assignments correctly, the narrow decomposition is the obvious root cause."}, {"id": "PL-Q05", "source": "paullarionov", "scenario": "Multi-agent Research System", "domain": "D5", "task_statement": "5.x", "question": "The web-search subagent returns results for only 3 of 5 requested source categories (competitor sites and industry reports succeed, but news archives and social feeds time out). The document analysis subagent successfully processes all provided documents. The synthesis subagent must produce a summary from mixed-quality upstream inputs. Which error-propagation strategy is most effective? Which error-propagation strategy is most effective?", "options": {"A": "Continue synthesis using only successful sources and produce an output without mentioning which data was unavailable.", "B": "The synthesis subagent returns an error to the coordinator, triggering a full retry or task failure due to incomplete data.", "C": "The synthesis subagent asks the coordinator to retry timed-out sources with a longer timeout before starting synthesis.", "D": "Structure the synthesis output with coverage annotations that indicate which conclusions are well-supported and where gaps exist due to unavailable sources."}, "correct": "D", "explanation": "Coverage annotations implement graceful degradation with transparency, preserving value from completed work while propagating uncertainty to enable informed decisions about confidence."}, {"id": "PL-Q06", "source": "paullarionov", "scenario": "Multi-agent Research System", "domain": "D1", "task_statement": "1.x", "question": "The document analysis subagent encounters a corrupted PDF file that it cannot parse. When designing the system’s error handling, what is the most effective way to handle this failure? Which approach is most effective?", "options": {"A": "Return an error with context to the coordinator agent, allowing it to decide how to proceed.", "B": "Silently skip the corrupted document and continue processing the remaining files to avoid interrupting the workflow.", "C": "Automatically retry parsing the document three times with exponential backoff before reporting a failure.", "D": "Throw an exception that terminates the entire research workflow."}, "correct": "A", "explanation": "Returning an error with context to the coordinator is the most effective approach because it lets the coordinator make an informed decision—skip the file, try an alternative parsing method, or notify the user—while maintaining visibility into the failure."}, {"id": "PL-Q07", "source": "paullarionov", "scenario": "Multi-agent Research System", "domain": "D1", "task_statement": "1.x", "question": "Production logs show a persistent pattern: requests like “analyze the uploaded quarterly report” are routed to the web-search agent 45% of the time instead of the document analysis agent. Reviewing tool definitions, you find that the web-search agent has a tool `analyze_content` described as “analyzes content and extracts key information,” while the document analysis agent has a tool `analyze_document` described as “analyzes documents and extracts key information.” How should you fix the misrouting problem? How should you fix the misrouting problem?", "options": {"A": "Add a pre-routing classifier that detects whether the user refers to uploaded files or web content before the coordinator decides on delegation.", "B": "Rename the web-search tool to `extract_web_results` and update its description to “processes and returns information retrieved from web search and URLs.”", "C": "Add few-shot examples to the coordinator prompt showing correct routing: “User uploads a quarterly report → document analysis agent” and “User asks about a web page → web-search agent.”", "D": "Expand the document analysis tool description with usage examples like “Use for uploaded PDFs, Word docs, and spreadsheets,” leaving the web-search tool unchanged."}, "correct": "B", "explanation": "Renaming the web-search tool to `extract_web_results` and updating its description to explicitly reference web search and URLs directly removes the root cause by eliminating semantic overlap between the two tool names and descriptions. This makes each tool’s purpose unambiguous, enabling the coordinator to reliably distinguish document analysis from web search."}, {"id": "PL-Q08", "source": "paullarionov", "scenario": "Multi-agent Research System", "domain": "D1", "task_statement": "1.x", "question": "A colleague proposes that the document analysis agent should send its results directly to the synthesis agent, bypassing the coordinator. What is the main advantage of keeping the coordinator as the central hub for all communication between subagents? What is the main advantage of keeping the coordinator as the central hub?", "options": {"A": "The coordinator can observe all interactions, handle errors uniformly, and decide what information each subagent should receive.", "B": "The coordinator batches multiple requests to subagents, reducing total API calls and overall latency.", "C": "Routing through the coordinator enables automatic retry logic that direct inter-agent calls cannot support.", "D": "Subagents use isolated memory, and direct communication would require complex serialization that only the coordinator can perform."}, "correct": "A", "explanation": "The coordinator pattern provides centralized visibility into all interactions, uniform error handling across the system, and fine-grained control over what information each subagent receives—these are the primary advantages of a star-shaped communication topology."}, {"id": "PL-Q09", "source": "paullarionov", "scenario": "Multi-agent Research System", "domain": "D1", "task_statement": "1.x", "question": "The web-search subagent times out while researching a complex topic. You need to design how information about this failure is returned to the coordinator. Which error-propagation approach best enables intelligent recovery? Which error-propagation approach best enables intelligent recovery?", "options": {"A": "Return structured error context to the coordinator including the failure type, the query executed, any partial results, and potential alternative approaches.", "B": "Catch the timeout within the subagent and return an empty result set marked as successful.", "C": "Implement automatic exponential-backoff retries inside the subagent, only returning a generic “search unavailable” status after exhausting retries.", "D": "Propagate the timeout exception directly to the top-level handler, terminating the entire research workflow."}, "correct": "A", "explanation": "Returning structured error context—including failure type, executed query, partial results, and alternative approaches—gives the coordinator everything needed to make intelligent recovery decisions (e.g., retry with a modified query or continue with partial results). It preserves maximum context for informed coordination-level decision-making."}, {"id": "PL-Q10", "source": "paullarionov", "scenario": "Multi-agent Research System", "domain": "D1", "task_statement": "1.x", "question": "In your system design, you gave the document analysis agent access to a general-purpose tool `fetch_url` so it could download documents by URL. Production logs show this agent now frequently downloads search engine results pages to perform ad hoc web search—behavior that should be routed through the web-search agent—causing inconsistent results. Which fix is most effective? Which fix is most effective?", "options": {"A": "Replace `fetch_url` with a `load_document` tool that validates that URLs point to document formats.", "B": "Remove `fetch_url` from the document analysis agent and route all URL fetching through the coordinator to the web-search agent.", "C": "Implement filtering that blocks `fetch_url` calls to known search engine domains while allowing other URLs.", "D": "Add instructions to the document analysis agent prompt that `fetch_url` should only be used to download document URLs, not to search."}, "correct": "A", "explanation": "Replacing a general-purpose tool with a document-specific tool that validates URLs against document formats fixes the root cause by constraining capability at the interface level. This follows the principle of least privilege, making undesired search behavior impossible rather than merely discouraged."}, {"id": "PL-Q11", "source": "paullarionov", "scenario": "Multi-agent Research System", "domain": "D5", "task_statement": "5.x", "question": "While researching a broad topic, you observe that the web-search agent and the document analysis agent investigate the same subtopics, leading to substantial duplication in their outputs. Token usage nearly doubles without a proportional increase in research breadth or depth. What is the most effective way to address this? What is the most effective way to address this?", "options": {"A": "Allow both agents to finish in parallel, then have the coordinator deduplicate overlapping results before passing them to the synthesis agent.", "B": "The coordinator explicitly partitions the research space before delegating, assigning each agent distinct subtopics or source types.", "C": "Implement a shared-state mechanism where agents log their current focus area so other agents can dynamically avoid duplication during execution.", "D": "Switch to sequential execution where document analysis runs only after web search completes, using web-search results as context to avoid duplication."}, "correct": "B", "explanation": "Having the coordinator explicitly partition the research space before delegating is most effective because it addresses the root cause—unclear task boundaries—before any work begins. It preserves parallelism while preventing duplicated effort and wasted tokens."}, {"id": "PL-Q12", "source": "paullarionov", "scenario": "Multi-agent Research System", "domain": "D1", "task_statement": "1.x", "question": "During research, the web-search subagent queries three source categories with different outcomes: academic databases return 15 relevant papers, industry reports return “0 results,” and patent databases return “Connection timeout.” When designing error propagation to the coordinator, which approach enables the best recovery decisions? Which approach enables the best recovery decisions?", "options": {"A": "Aggregate the results into a single success-percentage metric (e.g., “67% source coverage”) with detailed logs available on demand.", "B": "Report both “timeout” and “0 results” as failures requiring coordinator intervention.", "C": "Retry transient failures internally and report only persistent errors.", "D": "Distinguish access failures (timeout) that require a retry decision from valid empty results (“0 results”) that represent successful queries."}, "correct": "D", "explanation": "A timeout (access failure) and “0 results” (valid empty result) are semantically different outcomes requiring different responses. Distinguishing them allows the coordinator to retry the patent database while accepting the industry reports “0 results” as a valid, informative finding."}, {"id": "PL-Q13", "source": "paullarionov", "scenario": "Multi-agent Research System", "domain": "D5", "task_statement": "5.x", "question": "Production monitoring shows inconsistent synthesis quality. When aggregated results are ~75K tokens, the synthesis agent reliably cites information from the first 15K tokens (web-search headlines/snippets) and the last 10K tokens (document analysis conclusions), but often misses critical findings in the middle 50K tokens—even when they directly answer the research question. How should you restructure the aggregated input? How should you restructure the aggregated input?", "options": {"A": "Summarize all subagent outputs to under 20K tokens before aggregation to keep content within the model’s reliable processing range.", "B": "Stream subagent results to the synthesis agent incrementally, processing web-search results first to completion, then adding document analysis results.", "C": "Place a key-findings summary at the start of the aggregated input and organize detailed results with explicit section headings for easier navigation.", "D": "Implement rotation that alternates which subagent’s results appear first across research tasks to ensure both sources get equal top positioning over time."}, "correct": "C", "explanation": "Putting a key-findings summary at the start leverages primacy effects so critical information sits in the most reliably processed position. Adding explicit section headings throughout helps the model navigate and attend to mid-input content, directly mitigating the “lost in the middle” phenomenon."}, {"id": "PL-Q14", "source": "paullarionov", "scenario": "Multi-agent Research System", "domain": "D5", "task_statement": "5.x", "question": "In testing, the combined output of the web-search agent (85K tokens including page content) and the document analysis agent (70K tokens including chains of thought) totals 155K tokens, but the synthesis agent performs best with inputs under 50K tokens. Which solution is most effective? Which solution is most effective?", "options": {"A": "Modify upstream agents to return structured data (key facts, quotes, relevance scores) instead of verbose content and reasoning.", "B": "Add an intermediate summarization agent that condenses findings before passing them to synthesis.", "C": "Have the synthesis agent process findings in sequential batches, maintaining state between calls.", "D": "Store findings in a vector database and give the synthesis agent search tools to query during its work."}, "correct": "A", "explanation": "Modifying upstream agents to return structured data fixes the root cause by reducing token volume at the source while preserving essential information. It avoids passing bulky page content and reasoning traces that inflate tokens without improving the synthesis step."}, {"id": "PL-Q15", "source": "paullarionov", "scenario": "Multi-agent Research System", "domain": "D1", "task_statement": "1.x", "question": "In testing, you observe that the synthesis agent often needs to verify specific claims while merging results. Currently, when verification is needed, the synthesis agent returns control to the coordinator, which calls the web-search agent and then re-invokes synthesis with the results. This adds 2–3 extra loops per task and increases latency by 40%. Your assessment shows 85% of these verifications are simple fact checks (dates, names, stats) and 15% require deeper research. Which approach most effectively reduces overhead while preserving system reliability? Which approach is most effective?", "options": {"A": "Give the synthesis agent access to all web-search tools so it can handle any verification need directly without coordinator loops.", "B": "Have the synthesis agent accumulate all verification needs and return them as a batch to the coordinator at the end, which then sends them all to the web-search agent at once.", "C": "Have the web-search agent proactively cache extra context around each source during initial research in anticipation of synthesis needing verification.", "D": "Give the synthesis agent a limited-scope `verify_fact` tool for simple checks, while routing complex verifications through the coordinator to the web-search agent."}, "correct": "D", "explanation": "A limited-scope fact-verification tool lets the synthesis agent handle 85% of simple checks directly, eliminating most loops, while preserving the coordinator delegation path for the 15% of complex verifications. This applies least privilege while significantly reducing latency."}, {"id": "PL-Q16", "source": "paullarionov", "scenario": "Claude Code for Continuous Integration", "domain": "D4", "task_statement": "4.x", "question": "Your CI pipeline runs the Claude Code CLI (in `--print` mode) using CLAUDE.md to provide project context for code review, and developers generally find the reviews substantive. However, they report that integrating findings into the workflow is difficult—Claude outputs narrative paragraphs that must be manually copied into PR comments. The team wants to automatically post each finding as a separate inline PR comment at the relevant place in code, which requires structured data with file path, line number, severity level, and suggested fix. Which approach is most effective? Which approach is most effective?", "options": {"A": "Add an “Output Format for Review” section to CLAUDE.md with examples of structured findings so Claude learns the expected format from project context.", "B": "Use the CLI flags `--output-format json` and `--json-schema` to enforce structured findings, then parse the output to post inline comments via the GitHub API.", "C": "Include explicit formatting instructions in the review prompt requiring each finding to follow a parseable template like `[FILE:path] [LINE:n] [SEVERITY:level] ...`.", "D": "Keep narrative review format but add a summarization step that uses Claude to generate a structured JSON summary of findings."}, "correct": "B", "explanation": "Using `--output-format json` with `--json-schema` enforces structured output at the CLI level, guaranteeing well-formed JSON with the required fields (file path, line number, severity, suggested fix) that can be reliably parsed and posted as inline PR comments via the GitHub API. It leverages built-in CLI capabilities designed specifically for structured output."}, {"id": "PL-Q17", "source": "paullarionov", "scenario": "Claude Code for Continuous Integration", "domain": "D3", "task_statement": "3.x", "question": "Your team uses Claude Code for generating code suggestions, but you notice a pattern: non-obvious issues—performance optimizations that break edge cases, cleanups that unexpectedly change behavior—are only caught when another team member reviews the PR. Claude’s reasoning during generation shows it considered these cases but concluded its approach was correct. Which approach directly addresses the root cause of this self-check limitation? Which approach directly addresses the root cause?", "options": {"A": "Run a second independent instance of Claude Code to review the changes without access to the generator’s reasoning.", "B": "Enable extended thinking mode for the generation stage to allow more thorough deliberation before producing suggestions.", "C": "Add explicit self-review instructions to the generation prompt asking Claude to critique its own suggestions before finalizing output.", "D": "Include full test files and documentation in prompt context so Claude better understands expected behavior during generation."}, "correct": "A", "explanation": "A second independent Claude Code instance without access to the generator’s reasoning directly addresses the root cause by avoiding confirmation bias. This “fresh eyes” perspective mirrors human peer review, where another reviewer catches issues the author rationalized."}, {"id": "PL-Q18", "source": "paullarionov", "scenario": "Claude Code for Continuous Integration", "domain": "D3", "task_statement": "3.x", "question": "Your code review component is iterative: Claude analyzes the changed file, then may request related files (imports, base classes, tests) via tool calls to understand context before providing final feedback. Your application defines a tool that lets Claude request file contents; Claude calls the tool, gets results, and continues analysis. You’re evaluating batch processing to reduce API cost. What is the primary technical limitation when considering batch processing for this workflow? What is the primary technical limitation?", "options": {"A": "Batch processing does not include correlation IDs to map outputs back to input requests.", "B": "The asynchronous model cannot execute tools mid-request and return results for Claude to continue analysis.", "C": "The Batch API does not support tool definitions in request parameters.", "D": "The batch processing latency of up to 24 hours is too slow for pull request feedback, although the workflow would otherwise function."}, "correct": "B", "explanation": "A “fire-and-forget” asynchronous Batch API model has no mechanism to intercept a tool call during a request, execute the tool, and return results for Claude to continue analysis. This is fundamentally incompatible with iterative tool-calling workflows that require multiple tool request/response rounds within a single logical interaction."}, {"id": "PL-Q19", "source": "paullarionov", "scenario": "Claude Code for Continuous Integration", "domain": "D3", "task_statement": "3.x", "question": "Your CI/CD system runs three Claude-based analyses: (1) fast style checks on every PR that block merging until completion, (2) comprehensive weekly security audits of the entire codebase, and (3) nightly test-case generation for recently changed modules. The Message Batches API offers 50% savings but processing can take up to 24 hours. You want to optimize API cost while maintaining an acceptable developer experience. Which combination correctly matches each task to an API approach? Which combination is correct?", "options": {"A": "Use the Message Batches API for all three tasks to maximize 50% savings, configuring the pipeline to poll for batch completion.", "B": "Use synchronous calls for PR style checks; use the Message Batches API for weekly security audits and nightly test generation.", "C": "Use synchronous calls for all three tasks for consistent response times, relying on prompt caching to reduce costs across workloads.", "D": "Use synchronous calls for PR style checks and nightly test generation; use the Message Batches API only for weekly security audits."}, "correct": "B", "explanation": "PR style checks block developers and require immediate responses via synchronous calls, while weekly security audits and nightly test generation are scheduled tasks with flexible deadlines that can tolerate up to a 24-hour batch window—capturing 50% savings for both."}, {"id": "PL-Q20", "source": "paullarionov", "scenario": "Claude Code for Continuous Integration", "domain": "D4", "task_statement": "4.x", "question": "Your automated reviews find real issues, but developers report the feedback is not actionable. Findings include phrases like “complex ticket routing logic” or “potential null pointer” without specifying what exactly to change. When you add detailed instructions like “always include concrete fix suggestions,” the model still produces inconsistent output—sometimes detailed, sometimes vague. Which prompting technique most reliably produces consistently actionable feedback? Which prompting technique is most reliable?", "options": {"A": "Further refine instructions with more explicit requirements for each part of the feedback format (location, issue, severity, proposed fix).", "B": "Expand the context window to include more surrounding codebase so the model has enough information to propose concrete fixes.", "C": "Implement a two-pass approach where one prompt identifies issues and a second generates fixes, allowing specialization.", "D": "Add 3–4 few-shot examples showing the exact required format: identified issue, location in code, concrete fix suggestion."}, "correct": "D", "explanation": "Few-shot examples are the most effective technique for achieving consistent output format when instructions alone produce variable results. Providing 3–4 examples that show the exact desired structure (issue, location, concrete fix) gives the model a concrete pattern to follow, which is more reliable than abstract instructions."}, {"id": "PL-Q21", "source": "paullarionov", "scenario": "Claude Code for Continuous Integration", "domain": "D3", "task_statement": "3.x", "question": "Your CI pipeline includes two Claude-based code review modes: a pre-merge-commit hook that blocks PR merge until completion, and a “deep analysis” that runs overnight, polls for batch completion, and posts detailed suggestions to the PR. You want to reduce API cost using the Message Batches API, which offers 50% savings but requires polling and can take up to 24 hours. Which mode should use batch processing? Which mode should use batch processing?", "options": {"A": "Only the pre-merge-commit hook.", "B": "Only the deep analysis.", "C": "Both modes.", "D": "Neither mode."}, "correct": "B", "explanation": "Deep analysis is an ideal candidate for batch processing because it already runs overnight, tolerates delay, and uses a polling model before publishing results—matching the asynchronous, polling-based architecture of the Message Batches API while capturing 50% savings."}, {"id": "PL-Q22", "source": "paullarionov", "scenario": "Claude Code for Continuous Integration", "domain": "D4", "task_statement": "4.x", "question": "Your automated review analyzes comments and docstrings. The current prompt instructs Claude to “check that comments are accurate and up to date.” Findings often flag acceptable patterns (TODO markers, simple descriptions) while missing comments describing behavior the code no longer implements. What change addresses the root cause of this inconsistent analysis? What change addresses the root cause?", "options": {"A": "Include `git blame` data so Claude can identify comments that predate recent code changes.", "B": "Add few-shot examples of misleading comments to help the model recognize similar patterns in the codebase.", "C": "Filter TODO, FIXME, and descriptive comment patterns before analysis to reduce noise.", "D": "Specify explicit criteria: flag comments only when the behavior they claim contradicts the code’s actual behavior."}, "correct": "D", "explanation": "Explicit criteria—flagging comments only when claimed behavior contradicts actual code behavior—directly addresses the root cause by replacing a vague instruction with a precise definition of what constitutes a problem. This reduces false positives on acceptable patterns and misses of truly misleading comments."}, {"id": "PL-Q23", "source": "paullarionov", "scenario": "Claude Code for Continuous Integration", "domain": "D4", "task_statement": "4.x", "question": "Your automated code review system shows inconsistent severity ratings—similar issues like null pointer risks are rated “critical” in some PRs but only “medium” in others. Developer surveys show growing distrust—many start dismissing findings without reading because “half are wrong.” High-false-positive categories erode trust in accurate categories. Which approach best restores developer trust while improving the system? Which approach best restores developer trust?", "options": {"A": "Temporarily disable high-false-positive categories (style, naming, documentation) and keep only high-precision categories while improving prompts.", "B": "Keep all categories enabled but display confidence scores with each finding so developers can decide what to investigate.", "C": "Keep all categories enabled and add few-shot examples to improve accuracy for each category over the next few weeks.", "D": "Apply a uniform strictness reduction across all categories to bring the overall false-positive rate down."}, "correct": "A", "explanation": "Temporarily disabling high-false-positive categories immediately stops trust erosion by removing noisy findings that cause developers to dismiss everything, while preserving value from high-precision categories like security and correctness. It also creates space to improve prompts for problematic categories before re-enabling them."}, {"id": "PL-Q24", "source": "paullarionov", "scenario": "Claude Code for Continuous Integration", "domain": "D3", "task_statement": "3.x", "question": "Your automated review generates test-case suggestions for each PR. Reviewing a PR that adds course completion tracking, Claude suggests 10 test cases, but developer feedback shows that 6 duplicate scenarios already covered by the existing test suite. What change most effectively reduces duplicate suggestions? What change is most effective?", "options": {"A": "Include the existing test file in context so Claude can determine what scenarios are already covered.", "B": "Reduce the requested number of suggestions from 10 to 5, assuming Claude prioritizes the most valuable cases first.", "C": "Add instructions directing Claude to focus exclusively on edge cases and error conditions rather than success paths.", "D": "Implement post-processing that filters suggestions whose descriptions match existing test names via keyword overlap."}, "correct": "A", "explanation": "Including the existing test file fixes the root cause of duplication: Claude can only avoid suggesting already-covered scenarios if it knows what tests already exist. This gives Claude the information needed to propose genuinely new, valuable tests."}, {"id": "PL-Q25", "source": "paullarionov", "scenario": "Claude Code for Continuous Integration", "domain": "D3", "task_statement": "3.x", "question": "After an initial automated review identifies 12 findings, a developer pushes new commits to address issues. Re-running review produces 8 findings, but developers report that 5 duplicate previous comments on code that was already fixed in the new commits. What is the most effective way to eliminate this redundant feedback while maintaining thoroughness? What is the most effective way to eliminate redundant feedback?", "options": {"A": "Run review only when the PR is created and in the final pre-merge state, skipping intermediate commits.", "B": "Add a post-processing filter that removes findings that match previous ones by file paths and issue descriptions before posting comments.", "C": "Restrict review scope to files changed in the most recent push, excluding files from earlier commits.", "D": "Include previous review findings in context and instruct Claude to report only new or still-unresolved issues."}, "correct": "D", "explanation": "Including prior review findings in context lets Claude distinguish new problems from those already addressed in recent commits. This preserves review thoroughness while using Claude’s reasoning to avoid redundant feedback on fixed code."}, {"id": "PL-Q27", "source": "paullarionov", "scenario": "Claude Code for Continuous Integration", "domain": "D3", "task_statement": "3.x", "question": "A pull request changes 14 files in an inventory tracking module. A single-pass review that analyzes all files together produces inconsistent results: detailed feedback on some files but shallow comments on others, missed obvious bugs, and contradictory feedback (a pattern is flagged in one file but identical code is approved in another file in the same PR). How should you restructure the review? How should you restructure the review?", "options": {"A": "Run three independent full-PR review passes and flag only issues that appear in at least two of the three runs.", "B": "Split into focused passes: review each file individually for local issues, then run a separate integration-oriented pass to examine cross-file data flows.", "C": "Require developers to split large PRs into smaller submissions of 3–4 files before running automated review.", "D": "Switch to a larger model with a bigger context window so it can pay sufficient attention to all 14 files in one pass."}, "correct": "B", "explanation": "Focused per-file passes address the root cause—attention dilution—by ensuring consistent depth and reliable local issue detection. A separate integration-oriented pass then covers cross-file concerns such as dependency and data-flow interactions."}, {"id": "PL-Q28", "source": "paullarionov", "scenario": "Claude Code for Continuous Integration", "domain": "D3", "task_statement": "3.x", "question": "Your automated code review averages 15 findings per pull request, and developers report a 40% false-positive rate. The bottleneck is investigation time: developers must click into each finding to read Claude’s rationale before deciding whether to fix or dismiss it. Your CLAUDE.md already contains comprehensive rules for acceptable patterns, and stakeholders rejected any approach that filters findings before developers see them. What change best addresses investigation time? What change best addresses investigation time?", "options": {"A": "Require Claude to include its rationale and confidence estimate directly in each finding.", "B": "Add a post-processor that analyzes finding patterns and automatically suppresses those that match historical false-positive signatures.", "C": "Categorize findings as “blocking issues” vs “suggestions,” with different review requirements
