ely imprecise ones. Removing the category (C) is giving up rather than fixing the problem."}, {"id": "SG-T07-Q03", "source": "sgridworks", "scenario": "Structured Data Extraction", "task_statement": "4.1-4.3", "domain": "D4", "question": "Your extraction pipeline produces inconsistently formatted output despite detailed prose instructions. Some extractions use bullet points, others use paragraphs, and field ordering varies. What technique most effectively achieves format consistency?", "options": {"A": "Add more detailed formatting instructions with specific markdown templates.", "B": "Include 2-4 few-shot examples demonstrating the exact desired output format (location, issue, severity, suggested fix).", "C": "Post-process the output to enforce formatting.", "D": "Use a stricter system prompt tone."}, "correct": "B", "explanation": "Few-shot examples are the most effective technique for achieving consistently formatted output. When detailed instructions alone produce inconsistent results, concrete examples showing the exact desired format (field order, formatting style, level of detail) give the model a clear template to follow. Post-processing (C) is a workaround, not a fix. Stricter tone (D) does not improve format compliance."}, {"id": "SG-T07-Q04", "source": "sgridworks", "scenario": "Structured Data Extraction", "task_statement": "4.1-4.3", "domain": "D4", "question": "Your tool selection prompt has few-shot examples for common scenarios but fails on ambiguous requests that do not match any example. How should you improve the few-shot examples?", "options": {"A": "Add more examples (20+) to cover every possible scenario.", "B": "Create 2-4 targeted examples for ambiguous scenarios that show reasoning for why one action was chosen over plausible alternatives.", "C": "Remove few-shot examples and rely on tool descriptions only.", "D": "Add a catch-all example: \"When in doubt, ask the user for clarification.\""}, "correct": "B", "explanation": "Few-shot examples for ambiguous cases should include reasoning explaining why one choice was made over alternatives. This teaches the model the decision framework rather than just the answer, enabling it to generalize to novel ambiguous patterns. More examples (A) add token overhead without teaching judgment. Removing examples (C) loses the benefit. A catch-all (D) over-escalates."}, {"id": "SG-T07-Q05", "source": "sgridworks", "scenario": "Structured Data Extraction", "task_statement": "4.1-4.3", "domain": "D4", "question": "You need to extract structured data (invoice number, line items, total, vendor name) from PDF invoices. The model occasionally returns JSON with syntax errors. What is the most reliable approach to guarantee schema-compliant output?", "options": {"A": "Add \"Return valid JSON\" to the prompt and parse the text response.", "B": "Use `tool_use` with a JSON schema defining the extraction fields. Extract data from the `tool_use` response.", "C": "Use regex to fix common JSON syntax errors in the model's text output.", "D": "Ask the model to validate its own JSON before returning it."}, "correct": "B", "explanation": "`tool_use` with JSON schemas is the most reliable approach for guaranteed schema-compliant structured output. The model is forced to produce output matching the defined schema, eliminating JSON syntax errors entirely. Text-based approaches (A) are error-prone. Regex fixes (C) are fragile. Self-validation (D) is unreliable. Note: tool_use eliminates syntax errors but not semantic errors (values in wrong fields, line items not summing to total)."}, {"id": "SG-T07-Q06", "source": "sgridworks", "scenario": "Structured Data Extraction", "task_statement": "4.1-4.3", "domain": "D4", "question": "You have three document types (invoices, contracts, receipts), each with a different extraction schema. Documents arrive without type labels. Which `tool_choice` configuration ensures the model always produces structured output while choosing the correct schema?", "options": {"A": "`tool_choice: \"auto\"` -- the model decides whether to use a tool.", "B": "`tool_choice: \"any\"` -- the model must call a tool but can choose which extraction schema.", "C": "Force a specific tool: `tool_choice: {\"type\": \"tool\", \"name\": \"extract_invoice\"}`.", "D": "Define all three schemas as one tool with conditional fields."}, "correct": "B", "explanation": "`tool_choice: \"any\"` guarantees the model calls a tool (structured output) while allowing it to choose which extraction tool (invoice, contract, or receipt) based on the document content. Option A might return text instead of calling a tool. Option C forces a specific schema regardless of document type. Option D creates an overly complex schema."}, {"id": "SG-T07-Q07", "source": "sgridworks", "scenario": "Structured Data Extraction", "task_statement": "4.1-4.3", "domain": "D4", "question": "Your extraction schema has a `vendor_address` field marked as `required`. When processing invoices that do not include a vendor address, the model fabricates plausible addresses. How should you fix this?", "options": {"A": "Add \"Do not make up addresses\" to the prompt.", "B": "Make `vendor_address` optional (nullable) in the schema so the model can return null when the information is absent.", "C": "Add post-processing that validates addresses against a database.", "D": "Remove the field entirely since not all invoices have it."}, "correct": "B", "explanation": "When source documents may not contain certain information, schema fields should be optional/nullable. Required fields force the model to produce a value even when none exists, leading to fabrication. Making the field nullable explicitly allows the model to return null, signaling that the information was not found. Prompt instructions (A) are less reliable than schema design. Removing the field (D) loses it for documents that do have it."}, {"id": "SG-T07-Q08", "source": "sgridworks", "scenario": "Structured Data Extraction", "task_statement": "4.1-4.3", "domain": "D4", "question": "Your extraction pipeline needs to categorize documents into types. Most documents fit into 5 known categories, but occasionally a new category appears. How should you design the enum field?", "options": {"A": "Use a strict enum with only the 5 known categories.", "B": "Use an enum with the 5 known categories plus `\"other\"`, and add a separate `category_detail` string field for describing novel categories.", "C": "Use a free-text string field instead of an enum.", "D": "Add new enum values whenever a new category is discovered."}, "correct": "B", "explanation": "The `\"other\"` + detail string pattern provides extensible categorization. Known categories get clean enum classification. Novel categories are captured with \"other\" and a free-text detail field that describes the new category. This preserves structured analysis for known categories while handling edge cases. Strict enums (A) force incorrect classification. Free text (C) loses structured analysis. Dynamic enum updates (D) require constant schema changes."}, {"id": "SG-T07-Q09", "source": "sgridworks", "scenario": "Structured Data Extraction", "task_statement": "4.1-4.3", "domain": "D4", "question": "What is the key limitation of using `tool_use` with JSON schemas for structured output?", "options": {"A": "It cannot handle nested objects or arrays.", "B": "It eliminates JSON syntax errors but does not prevent semantic errors (e.g., line items that do not sum to the total, values placed in wrong fields).", "C": "It is slower than text-based extraction.", "D": "It only works with simple flat schemas."}, "correct": "B", "explanation": "Tool use with strict JSON schemas guarantees syntactically valid output matching the schema structure. However, it cannot prevent semantic errors: line items that do not add up to the stated total, values placed in the wrong fields, or logically inconsistent data. Semantic validation requires additional validation logic beyond the schema itself."}, {"id": "SG-T07-Q10", "source": "sgridworks", "scenario": "Structured Data Extraction", "task_statement": "4.1-4.3", "domain": "D4", "question": "You need to extract metadata from documents before running enrichment tools. The metadata extraction MUST happen first. How do you configure this?", "options": {"A": "Add \"Always extract metadata first\" to the system prompt.", "B": "Use `tool_choice: {\"type\": \"tool\", \"name\": \"extract_metadata\"}` for the first API call, then switch to `tool_choice: \"auto\"` for subsequent calls.", "C": "List `extract_metadata` first in the tools array.", "D": "Use `tool_choice: \"any\"` and hope the model chooses metadata extraction first."}, "correct": "B", "explanation": "Forced tool selection ensures a specific tool is called in a specific turn. For the first turn, force `extract_metadata`. Then switch to `\"auto\"` for subsequent turns where the model can choose enrichment tools based on the extracted metadata. Prompt instructions (A) are probabilistic. Tool ordering (C) does not guarantee selection order. `\"any\"` (D) guarantees a tool call but not which tool."}, {"id": "SG-T08-Q01", "source": "sgridworks", "scenario": "Structured Data Extraction", "task_statement": "4.4-4.6", "domain": "D4", "question": "Your extraction pipeline fails validation on 15% of documents. You implement a retry loop that resends the request with the same prompt. The retry success rate is only 10%. How should you improve the retry strategy?", "options": {"A": "Increase the number of retries from 1 to 5.", "B": "Append the specific validation errors to the retry prompt, including the original document, the failed extraction, and what went wrong, so the model can self-correct.", "C": "Switch to a more capable model for retries.", "D": "Lower the validation strictness to accept more extractions."}, "correct": "B", "explanation": "Retry-with-error-feedback is the effective pattern: include the original document, the failed extraction, and the specific validation errors in the retry prompt. This gives the model concrete information about what went wrong and how to fix it. Blind retries (A) without feedback are unlikely to produce different results. Lowering standards (D) masks quality issues."}, {"id": "SG-T08-Q02", "source": "sgridworks", "scenario": "Structured Data Extraction", "task_statement": "4.4-4.6", "domain": "D4", "question": "Your retry loop shows that 30% of failures are due to missing information in the source document (e.g., no vendor phone number), not extraction errors. The retry keeps failing on these documents. What should you do?", "options": {"A": "Add more retries -- eventually the model might find the information.", "B": "Identify when retries will be ineffective (information absent from source) versus when they will succeed (format mismatches, structural errors), and skip retries for absent-information failures.", "C": "Have the model hallucinate plausible values to fill the gaps.", "D": "Return a partial extraction with error messages for each retry failure."}, "correct": "B", "explanation": "Retries are effective for format mismatches and structural output errors but ineffective when the required information simply does not exist in the source document. Distinguishing between these failure types prevents wasted retry attempts. For absent information, mark the field as null/unavailable rather than retrying or hallucinating (C). More retries (A) waste resources on impossible extractions."}, {"id": "SG-T08-Q03", "source": "sgridworks", "scenario": "Structured Data Extraction", "task_statement": "4.4-4.6", "domain": "D4", "question": "Your code review system flags findings that developers frequently dismiss. You want to understand which code patterns trigger false positives so you can improve the prompts. What should you add to the structured output?", "options": {"A": "A confidence score for each finding.", "B": "A `detected_pattern` field that records which code construct triggered the finding, enabling systematic analysis of dismissal patterns.", "C": "A \"priority\" field that ranks findings by importance.", "D": "A \"false_positive_likelihood\" estimate."}, "correct": "B", "explanation": "Adding a `detected_pattern` field creates a feedback loop: when developers dismiss findings, you can analyze which code patterns consistently trigger false positives and refine prompts to handle those patterns correctly. Confidence scores (A) and false positive estimates (D) are model self-assessments, which are poorly calibrated. Priority (C) does not address the false positive pattern."}, {"id": "SG-T08-Q04", "source": "sgridworks", "scenario": "Structured Data Extraction", "task_statement": "4.4-4.6", "domain": "D4", "question": "Your extraction includes a `stated_total` field from the invoice and individual `line_items` with amounts. In 5% of cases, the line items do not sum to the stated total, but both values are accurately extracted from the document. How should you handle this?", "options": {"A": "Automatically adjust line items to match the total.", "B": "Extract `calculated_total` (sum of line items) alongside `stated_total` and add a `conflict_detected` boolean. Flag discrepancies for human review.", "C": "Discard the extraction and retry.", "D": "Always trust the stated total and ignore line item amounts."}, "correct": "B", "explanation": "Self-correction validation flows should extract both values, compare them, and flag discrepancies. Adding `calculated_total` alongside `stated_total` with a `conflict_detected` boolean preserves the accurate extraction while alerting reviewers to document-level inconsistencies. The conflict may be in the source document itself, not the extraction. Auto-adjusting (A) masks real discrepancies."}, {"id": "SG-T08-Q05", "source": "sgridworks", "scenario": "Structured Data Extraction", "task_statement": "4.4-4.6", "domain": "D4", "question": "Your team runs two workflows: (1) pre-merge code review that blocks PRs until complete, and (2) weekly codebase audit reports reviewed Monday morning. Your manager wants to switch both to the Message Batches API for 50% cost savings. What is the correct assessment?", "options": {"A": "Switch both -- the cost savings justify the latency.", "B": "Switch the weekly audit to batch processing; keep pre-merge reviews as synchronous API calls. Batch processing has up to 24-hour processing time with no guaranteed latency SLA.", "C": "Keep both synchronous -- batch results cannot be correlated with original requests.", "D": "Switch both to batch with polling fallback."}, "correct": "B", "explanation": "The Message Batches API offers 50% cost savings but has processing times up to 24 hours with no guaranteed latency SLA. This makes it ideal for latency-tolerant workloads (weekly audit reports) but unsuitable for blocking workflows (pre-merge checks where developers wait). Batch results CAN be correlated using `custom_id` fields (C is wrong)."}, {"id": "SG-T08-Q06", "source": "sgridworks", "scenario": "Structured Data Extraction", "task_statement": "4.4-4.6", "domain": "D4", "question": "You submit 100 documents as a batch. 95 succeed and 5 fail: 3 due to oversized context and 2 due to transient server errors. How should you handle the failures?", "options": {"A": "Resubmit the entire batch of 100 documents.", "B": "Resubmit only the 5 failed documents (identified by `custom_id`), chunking the oversized ones and retrying the transient failures without modification.", "C": "Discard the 5 failures and report results for the 95 successes only.", "D": "Wait 24 hours and resubmit the 5 failures without changes."}, "correct": "B", "explanation": "Use `custom_id` to identify failed documents and resubmit only those. Apply appropriate modifications: chunk the 3 oversized documents (address the root cause) and retry the 2 transient failures without modification (since the error was temporary). Resubmitting the entire batch (A) wastes resources. Discarding failures (C) loses data. Waiting without changes (D) does not fix the context size issue."}, {"id": "SG-T08-Q07", "source": "sgridworks", "scenario": "Structured Data Extraction", "task_statement": "4.4-4.6", "domain": "D4", "question": "You want to batch-process 1000 documents with a 30-hour SLA (results needed within 30 hours of submission). The batch API has up to 24-hour processing time. How should you structure submissions?", "options": {"A": "Submit all 1000 at once -- 24 hours is within the 30-hour SLA.", "B": "Submit in windows that account for processing time plus failure handling time (e.g., 4-hour submission windows to guarantee time for resubmission of failures within the SLA).", "C": "Submit in batches of 10 every hour.", "D": "Use synchronous API to guarantee timing."}, "correct": "B", "explanation": "With a 24-hour batch processing window and a 30-hour SLA, you need to account for the possibility that some documents will fail and need resubmission. Submitting with enough buffer (e.g., 4-hour windows) ensures that even with one round of failure handling, results arrive within the SLA. Submitting all at once (A) leaves no time for failure handling if the batch takes the full 24 hours."}, {"id": "SG-T08-Q08", "source": "sgridworks", "scenario": "Structured Data Extraction", "task_statement": "4.4-4.6", "domain": "D4", "question": "Before batch-processing 10,000 documents, what should you do first to maximize efficiency?", "options": {"A": "Submit all 10,000 immediately to start processing as quickly as possible.", "B": "Run prompt refinement on a sample set first to maximize first-pass success rates and reduce iterative resubmission costs.", "C": "Split into 10 batches of 1,000 and submit them all simultaneously.", "D": "Process the first 100 synchronously, then batch the rest."}, "correct": "B", "explanation": "Testing and refining prompts on a small sample before batch-processing large volumes maximizes first-pass success rates. A 5% error rate on 10,000 documents means 500 failures requiring resubmission -- costly in both time and money. Refining the prompt to reduce error rate from 5% to 1% saves 400 resubmissions. Always validate on a sample before scaling."}, {"id": "SG-T08-Q09", "source": "sgridworks", "scenario": "Structured Data Extraction", "task_statement": "4.4-4.6", "domain": "D4", "question": "A PR modifies 14 files. Your single-pass review produces detailed feedback for some files, superficial comments for others, and contradictory findings -- flagging a pattern as problematic in one file while approving identical code elsewhere. What is the root cause?", "options": {"A": "The model cannot handle 14 files.", "B": "Attention dilution: when processing many files at once, the model gives inconsistent depth and may not notice the same pattern appearing in different files.", "C": "The review prompt is too short.", "D": "The files are too similar, confusing the model."}, "correct": "B", "explanation": "Attention dilution occurs when the model processes too much content at once, leading to inconsistent depth across files and contradictory findings. The model may deeply analyze some files while skimming others, and fail to maintain consistent judgment about code patterns across the full set. The fix is multi-pass review: per-file local analysis plus cross-file integration pass."}, {"id": "SG-T08-Q10", "source": "sgridworks", "scenario": "Structured Data Extraction", "task_statement": "4.4-4.6", "domain": "D4", "question": "A code review system uses Claude to both generate code and review it in the same session. Adding \"review your code critically\" or enabling extended thinking does not improve review quality. What architectural change is needed?", "options": {"A": "Use a more detailed review prompt in the same session.", "B": "Use a second independent Claude instance (without the generator's reasoning context) to review the code.", "C": "Have the model review the code twice in the same session.", "D": "Add a checklist of common issues to the review prompt."}, "correct": "B", "explanation": "Self-review within the same session is limited because the model retains its generation reasoning context, making it biased toward confirming its own decisions. An independent review instance starts fresh without this bias and is more effective at catching subtle issues. Neither \"review critically\" instructions nor extended thinking overcome the fundamental self-review limitation within the same reasoning context."}, {"id": "SG-T09-Q01", "source": "sgridworks", "scenario": "Multi-Agent Research System", "task_statement": "5.1-5.3", "domain": "D5", "question": "Your customer support agent handles multi-turn conversations. After 15 turns, it refers to a refund of \"$47\" that was actually $147.23 -- the exact amount was lost during context summarization. How should you preserve critical numerical data?", "options": {"A": "Increase the context window size to avoid summarization.", "B": "Extract transactional facts (amounts, dates, order numbers, statuses) into a persistent \"case facts\" block included in each prompt, outside summarized history.", "C": "Ask the customer to repeat important numbers periodically.", "D": "Store all numbers in a database and query them each turn."}, "correct": "B", "explanation": "Progressive summarization risks condensing numerical values, dates, and specific details into vague summaries. The solution is to extract critical transactional facts into a structured \"case facts\" block that persists outside the summarized conversation history. This block is included in each prompt, ensuring exact values are always available regardless of how much conversation history is summarized."}, {"id": "SG-T09-Q02", "source": "sgridworks", "scenario": "Multi-Agent Research System", "task_statement": "5.1-5.3", "domain": "D5", "question": "Your customer has three open issues: a damaged item return, a billing dispute, and an address change. After resolving the first issue, the agent loses track of the other two. What structural change prevents this?", "options": {"A": "Add \"Remember to address all issues\" to the system prompt.", "B": "Extract and persist structured issue data (order IDs, amounts, statuses) into a separate context layer for multi-issue sessions.", "C": "Limit customers to one issue per conversation.", "D": "Create separate conversation threads for each issue."}, "correct": "B", "explanation": "For multi-issue sessions, structured issue data should be extracted into a separate context layer that tracks each issue's ID, status, and key details. This persists across turns regardless of conversation summarization, ensuring no issues are forgotten. Prompt instructions (A) are unreliable for state tracking. Limiting issues (C) degrades customer experience."}, {"id": "SG-T09-Q03", "source": "sgridworks", "scenario": "Multi-Agent Research System", "task_statement": "5.1-5.3", "domain": "D5", "question": "Your agent calls `lookup_order` which returns 40+ fields per order (shipping address, billing address, payment method details, warehouse location, carrier tracking, etc.). For most customer requests, only 5 fields are relevant. What should you do?", "options": {"A": "Let the model process all 40 fields -- it can ignore irrelevant ones.", "B": "Trim verbose tool outputs to only relevant fields before they accumulate in context.", "C": "Paginate the tool output, loading 10 fields at a time.", "D": "Create 8 different order lookup tools, each returning a subset of fields."}, "correct": "B", "explanation": "Verbose tool outputs consume context tokens disproportionate to their relevance. Trimming to only the fields relevant to the current request (e.g., keeping only return-relevant fields for a return request) prevents context bloat. Letting all fields accumulate (A) wastes context budget. Too many specialized tools (D) creates tool selection problems. Pagination (C) adds unnecessary complexity."}, {"id": "SG-T09-Q04", "source": "sgridworks", "scenario": "Multi-Agent Research System", "task_statement": "5.1-5.3", "domain": "D5", "question": "You are aggregating research findings from 5 subagents into a single prompt for the synthesis agent. The findings from the 3rd and 4th agents (middle of the input) are consistently underrepresented in the final synthesis. What is the cause and fix?", "options": {"A": "The 3rd and 4th agents produced lower quality findings.", "B": "The \"lost in the middle\" effect: models reliably process information at the beginning and end but may omit findings from middle sections. Place key findings summaries at the beginning and use explicit section headers.", "C": "The synthesis agent's context window is too small.", "D": "The 3rd and 4th agents are taking too long, causing timeout issues."}, "correct": "B", "explanation": "The \"lost in the middle\" effect is a known LLM behavior where information at the beginning and end of long inputs receives more attention than middle sections. The mitigation is to place key findings summaries at the beginning of the aggregated input and organize detailed results with explicit section headers to help the model navigate the content."}, {"id": "SG-T09-Q05", "source": "sgridworks", "scenario": "Multi-Agent Research System", "task_statement": "5.1-5.3", "domain": "D5", "question": "A customer explicitly says \"I want to speak to a human agent.\" Your agent has already identified that the issue is a simple order status question it could answer in one tool call. What should the agent do?", "options": {"A": "Answer the question first to demonstrate capability, then offer to transfer if the customer still wants a human.", "B": "Honor the customer's explicit request immediately and transfer to a human agent.", "C": "Ask the customer why they want a human agent to determine if escalation is necessary.", "D": "Provide the order status and mention that a human agent is also available."}, "correct": "B", "explanation": "When a customer explicitly requests a human agent, honor that request immediately without first attempting investigation. The customer has stated their preference, and ignoring it to demonstrate capability (A, D) or questioning their decision (C) creates friction and violates the escalation principle."}, {"id": "SG-T09-Q06", "source": "sgridworks", "scenario": "Multi-Agent Research System", "task_statement": "5.1-5.3", "domain": "D5", "question": "A customer says \"This is so frustrating, nothing ever works!\" but their issue is a straightforward product return within policy. The agent escalates based on the negative sentiment. Is this correct?", "options": {"A": "Yes -- high frustration always warrants human escalation.", "B": "No -- sentiment-based escalation is unreliable. The agent should acknowledge frustration while offering to resolve the straightforward issue, escalating only if the customer reiterates their preference for a human.", "C": "Yes -- the agent should err on the side of caution with frustrated customers.", "D": "No -- the agent should ignore sentiment entirely and focus on the issue."}, "correct": "B", "explanation": "Sentiment does not correlate with case complexity. A frustrated customer may have a simple issue that the agent can resolve perfectly. The agent should acknowledge the frustration, offer to resolve the issue (which is within its capability), and escalate only if the customer explicitly requests a human. Ignoring sentiment entirely (D) is also wrong -- acknowledgment is important."}, {"id": "SG-T09-Q07", "source": "sgridworks", "scenario": "Multi-Agent Research System", "task_statement": "5.1-5.3", "domain": "D5", "question": "Your tool returns multiple customer records for the name \"John Smith.\" The agent selects the most recent account using a heuristic. This occasionally leads to misidentified accounts. What should the agent do instead?", "options": {"A": "Select the account with the most orders as the most likely match.", "B": "Ask the customer for additional identifiers (email, phone number, or order number) to disambiguate rather than selecting based on heuristics.", "C": "Present all matching accounts to the customer and ask them to confirm.", "D": "Use the phone number from caller ID to automatically select the right account."}, "correct": "B", "explanation": "When tool results return multiple matches, the agent should request additional identifiers from the customer for disambiguation rather than applying heuristics that may select the wrong record. This is more reliable than presenting all accounts (C), which may expose other customers' information, and safer than any automated selection heuristic (A, D)."}, {"id": "SG-T09-Q08", "source": "sgridworks", "scenario": "Multi-Agent Research System", "task_statement": "5.1-5.3", "domain": "D5", "question": "Your web search subagent returns an error: `{\"status\": \"error\", \"message\": \"search unavailable\"}`. The coordinator has no information about what failed, what was attempted, or whether partial results exist. What should the error response include instead?", "options": {"A": "Just the HTTP status code for programmatic handling.", "B": "Structured error context: failure type (timeout), attempted query, partial results (3 of 5 sources returned), and potential alternative approaches (try alternative search API or narrower query).", "C": "A retry count showing how many times the subagent already retried.", "D": "The full stack trace for debugging."}, "correct": "B", "explanation": "Structured error context enables the coordinator to make intelligent recovery decisions. Knowing the failure type (timeout vs permission denied), what was attempted (the query), partial results (what succeeded), and alternatives (different API, narrower query) gives the coordinator all the information needed to decide whether to retry, modify the approach, or proceed with partial data. Generic messages (like \"search unavailable\") hide this critical context."}, {"id": "SG-T09-Q09", "source": "sgridworks", "scenario": "Multi-Agent Research System", "task_statement": "5.1-5.3", "domain": "D5", "question": "A subagent encounters a transient timeout error while fetching a document. It has local retry logic that succeeds on the second attempt. Should it report this error to the coordinator?", "options": {"A": "Yes -- all errors should always be reported to the coordinator.", "B": "No -- subagents should implement local recovery for transient failures and only propagate errors they cannot resolve, along with what was attempted and partial results.", "C": "Yes -- the coordinator needs to know about all timeouts for monitoring.", "D": "No -- errors should be silently swallowed to keep the coordinator's context clean."}, "correct": "B", "explanation": "Subagents should handle transient failures locally when possible (retry logic for timeouts, exponential backoff). Only propagate to the coordinator errors that cannot be resolved locally. When propagating, include what was attempted and any partial results. This prevents the coordinator from being overwhelmed with recoverable issues while ensuring genuine failures are properly handled. Silent suppression (D) is an anti-pattern."}, {"id": "SG-T09-Q10", "source": "sgridworks", "scenario": "Multi-Agent Research System", "task_statement": "5.1-5.3", "domain": "D5", "question": "A subagent successfully queries a database and finds zero results matching the search criteria. It returns `{\"status\": \"error\", \"message\": \"No results found\"}`. Is this correct?", "options": {"A": "Yes -- no results is an error condition.", "B": "No -- a successful query with zero results is a valid empty result, not an error. The response should indicate success with no matches to prevent the coordinator from treating it as a failure requiring retry.", "C": "Yes -- the coordinator should retry with different search criteria.", "D": "No -- it should return a fabricated result to avoid the empty result."}, "correct": "B", "explanation": "A successful query that returns zero results is fundamentally different from a failed query. The query executed correctly -- there simply were no matches. Reporting this as an error causes the coordinator to apply recovery strategies (retries, alternative approaches) that are inappropriate since the \"failure\" is actually valid information. The distinction between access failures (needing retry) and valid empty results is critical."}, {"id": "SG-T10-Q01", "source": "sgridworks", "scenario": "Multi-Agent Research System", "task_statement": "5.4-5.6", "domain": "D5", "question": "After 2 hours of codebase exploration, your Claude Code session starts giving inconsistent answers and referencing \"typical patterns\" rather than the specific classes it discovered earlier. What is happening?", "options": {"A": "The model is experiencing a bug.", "B": "Context degradation in extended sessions: the model's ability to reference specific earlier findings deteriorates as context fills with exploration output.", "C": "The codebase is too complex for the model to understand.", "D": "The model's temperature is set too high."}, "correct": "B", "explanation": "Context degradation is a known issue in extended exploration sessions. As context fills with verbose tool outputs from file reads, searches, and analysis, the model's ability to accurately reference specific earlier findings deteriorates. It falls back to general knowledge (\"typical patterns\") rather than specific discovered facts. This is a context management issue, not a model capability issue."}, {"id": "SG-T10-Q02", "source": "sgridworks", "scenario": "Multi-Agent Research System", "task_statement": "5.4-5.6", "domain": "D5", "question": "During a long exploration session, you want the agent to maintain reliable access to key findings as context fills. What technique helps?", "options": {"A": "Periodically restart the session to clear context.", "B": "Have the agent maintain scratchpad files recording key findings, referencing them for subsequent questions to counteract context degradation.", "C": "Reduce the verbosity of the model's responses.", "D": "Use a model with a larger context window."}, "correct": "B", "explanation": "Scratchpad files persist key findings outside the conversation context. The agent writes important discoveries to files and references them when needed, ensuring access to accurate information regardless of how much context has accumulated. This counteracts degradation because the information is stored externally and re-read fresh rather than relied upon from deep in the conversation history."}, {"id": "SG-T10-Q03", "source": "sgridworks", "scenario": "Multi-Agent Research System", "task_statement": "5.4-5.6", "domain": "D5", "question": "You need to investigate multiple aspects of a large codebase: find all test files, trace the refund flow, identify API endpoints, and map database schemas. What is the best approach?", "options": {"A": "Investigate all aspects sequentially in the main conversation, reading every relevant file.", "B": "Spawn subagents to investigate specific questions while the main agent preserves high-level coordination, summarizing findings between phases.", "C": "Read all files into the main context first, then answer questions from memory.", "D": "Use a single subagent that investigates everything and returns a single report."}, "correct": "B", "explanation": "Subagent delegation isolates verbose exploration output while the main agent coordinates at a high level. Each subagent investigates one specific question, returns its findings, and the main agent summarizes before spawning the next batch. This prevents the main context from being overwhelmed with exploration output. Summarizing between phases (injecting summaries into the next subagent's context) maintains continuity."}, {"id": "SG-T10-Q04", "source": "sgridworks", "scenario": "Multi-Agent Research System", "task_statement": "5.4-5.6", "domain": "D5", "question": "Your multi-agent system crashes during a complex research task. On restart, all agent state is lost and the coordinator has to start from scratch. What architectural pattern prevents this?", "options": {"A": "Use longer-running agent processes that are less likely to crash.", "B": "Design crash recovery using structured agent state exports (manifests): each agent exports state to a known location, and the coordinator loads the manifest on resume and injects prior state into agent prompts.", "C": "Run duplicate agents so one can take over if the other fails.", "D": "Store all intermediate results in a database that the agent can query."}, "correct": "B", "explanation": "Structured state persistence for crash recovery means each agent periodically exports its current state (findings, progress, next steps) to a known location. On crash recovery, the coordinator loads this manifest and injects the prior state into agent prompts. This allows work to resume from the last checkpoint rather than restarting from scratch. Database storage (D) is similar in concept but a manifest pattern is more directly integrated with the agent architecture."}, {"id": "SG-T10-Q05", "source": "sgridworks", "scenario": "Multi-Agent Research System", "task_statement": "5.4-5.6", "domain": "D5", "question": "During an extended exploration session, your context is filling with verbose discovery output from reading dozens of files. What command can reduce context usage?", "options": {"A": "`/reset`", "B": "`/compact`", "C": "`/clear`", "D": "`/trim`"}, "correct": "B", "explanation": "`/compact` reduces context usage during extended sessions by summarizing or compressing verbose discovery output. This is particularly useful when exploration has consumed significant context with file reads and search results that are no longer needed in their full form. The other options are not the designated commands for this purpose."}, {"id": "SG-T10-Q06", "source": "sgridworks", "scenario": "Multi-Agent Research System", "task_statement": "5.4-5.6", "domain": "D5", "question": "Your extraction pipeline reports 97% aggregate accuracy across all document types. After deploying, users report frequent errors on a specific document type (handwritten receipts). What went wrong?", "options": {"A": "The 97% accuracy is wrong -- the evaluation was flawed.", "B": "Aggregate accuracy metrics mask poor performance on specific document types. You should validate accuracy by document type and field segment before automating.", "C": "Handwritten receipts are impossible to process.", "D": "The model was not trained on handwritten text."}, "correct": "B", "explanation": "Aggregate accuracy metrics (97% overall) can mask significant performance gaps on specific document types or fields. If handwritten receipts are 5% of the volume but have 60% error rate, the aggregate still looks good. Accuracy must be validated by document type and by field before automating, ensuring consistent performance across all segments."}, {"id": "SG-T10-Q07", "source": "sgridworks", "scenario": "Multi-Agent Research System", "task_statement": "5.4-5.6", "domain": "D5", "question": "You have automated high-confidence extractions (removing human review for those). How should you monitor for quality degradation over time?", "options": {"A": "Monitor aggregate accuracy monthly.", "B": "Implement stratified random sampling of high-confidence extractions for ongoing error rate measurement and novel error pattern detection.", "C": "Trust the confidence scores -- if they are high, the extractions are correct.", "D": "Only review extractions that downstream systems reject."}, "correct": "B", "explanation": "Stratified random sampling continuously monitors even high-confidence extractions for errors. This catches quality degradation over time (as document patterns drift), detects novel error patterns that the model has not encountered before, and provides ongoing validation that confidence scores remain calibrated. Trusting confidence blindly (C) risks undetected degradation."}, {"id": "SG-T10-Q08", "source": "sgridworks", "scenario": "Multi-Agent Research System", "task_statement": "5.4-5.6", "domain": "D5", "question": "Your synthesis agent combines findings from multiple sources. Two credible sources report different statistics for the same metric: Source A says \"market grew 15%\" while Source B says \"market grew 22%.\" How should the synthesis handle this?", "options": {"A": "Average the two values and report 18.5%.", "B": "Use the more recent source.", "C": "Preserve both values with source attribution and annotate the conflict, rather than arbitrarily selecting one.", "D": "Report only the lower value to be conservative."}, "correct": "C", "explanation": "When credible sources conflict, the synthesis should preserve both values with full source attribution and explicitly annotate the conflict. Readers can then evaluate the sources themselves. Arbitrarily selecting (B, D) or averaging (A) destroys information and masks legitimate uncertainty. The report should distinguish well-established findings from contested ones."}, {"id": "SG-T10-Q09", "source": "sgridworks", "scenario": "Multi-Agent Research System", "task_statement": "5.4-5.6", "domain": "D5", "question": "Your subagents return research findings as prose paragraphs. After synthesis, source attribution is completely lost -- the final report makes claims without any source references. What structural change fixes this?", "options": {"A": "Add \"Always cite sources\" to the synthesis agent's prompt.", "B": "Require subagents to output structured claim-source mappings (source URLs, document names, relevant excerpts) that downstream agents must preserve through synthesis.", "C": "Have the synthesis agent search for source references in the prose.", "D": "Add a post-processing step that matches claims to sources using semantic similarity."}, "correct": "B", "explanation": "The fix is structural: require subagents to output findings as structured claim-source mappings rather than prose. Each finding includes the claim, evidence excerpt, source URL/document name, and publication date. The synthesis agent receives and preserves these mappings, ensuring source attribution survives the synthesis process. Prompt instructions (A) without structured data are unreliable."}, {"id": "SG-T10-Q10", "source": "sgridworks", "scenario": "Multi-Agent Research System", "task_statement": "5.4-5.6", "domain": "D5", "question": "Two subagents analyze the same topic but from different time periods. Subagent A reports 2023 data and Subagent B reports 2025 data. The synthesis agent flags them as \"contradictory findings.\" What metadata would prevent this misinterpretation?", "options": {"A": "Confidence scores for each finding.", "B": "Publication or data collection dates in structured outputs, enabling correct temporal interpretation.", "C": "Source credibility ratings.", "D": "Word count of the original source document."}, "correct": "B", "explanation": "Requiring subagents to include publication or data collection dates in their structured outputs enables the synthesis agent to correctly interpret temporal differences. Without dates, different values for the same metric from different years appear contradictory. With dates, the synthesis can correctly present them as temporal trends rather than conflicts."}, {"id": "SG-FE01-Q01", "source": "sgridworks-fullexam", "scenario": "Customer Support Resolution Agent", "task_statement": "1.x", "domain": "D1", "question": "The agent occasionally processes refunds for the wrong customer because it uses the customer's stated name to call `lookup_order` instead of first verifying identity through `get_customer`. The system prompt clearly instructs it to verify identity first. What is the most reliable fix?", "options": {"A": "Rephrase the system prompt with stronger language about verification requirements.", "B": "Add 5 few-shot examples showing correct verification-first sequences.", "C": "Implement a programmatic prerequisite that blocks `lookup_order` and `process_refund` until `get_customer` returns a verified customer ID.", "D": "Add a pre-processing classifier that detects when verification is needed."}, "correct": "C", "explanation": "Programmatic enforcement provides deterministic guarantees. Prompt-based approaches (A, B) have non-zero failure rates. A classifier (D) adds complexity without guaranteed compliance."}, {"id": "SG-FE01-Q02", "source": "sgridworks-fullexam", "scenario": "Customer Support Resolution Agent", "task_statement": "1.x", "domain": "D1", "question": "The agent's `get_customer` and `lookup_order` tools have minimal descriptions: \"Gets customer info\" and \"Gets order info.\" Agents frequently call the wrong one. What is the most effective first step?", "options": {"A": "Add few-shot examples for each tool call scenario.", "B": "Expand tool descriptions to include input formats, example queries, edge cases, and clear boundaries between the two tools.", "C": "Consolidate into one `lookup` tool.", "D": "Add a routing layer before the agent."}, "correct": "B", "explanation": "Tool descriptions are the primary mechanism for tool selection. Expanding them with clear differentiation is the highest-leverage, lowest-effort fix."}, {"id": "SG-FE01-Q03", "source": "sgridworks-fullexam", "scenario": "Customer Support Resolution Agent", "task_statement": "1.x", "domain": "D1", "question": "A customer says: \"I need to return my broken headphones AND I was charged twice on my last order.\" The agent resolves the return but forgets the billing dispute. What architecture prevents this?", "options": {"A": "Add \"Address all customer concerns\" to the system prompt.", "B": "Decompose multi-concern requests into distinct items, investigate each with shared context, then synthesize a unified resolution.", "C": "Limit customers to one issue per message.", "D": "Use a checklist tool."}, "correct": "B", "explanation": "Explicit decomposition into distinct items with parallel investigation and unified synthesis ensures complete coverage."}, {"id": "SG-FE01-Q04", "source": "sgridworks-fullexam", "scenario": "Customer Support Resolution Agent", "task_statement": "1.x", "domain": "D1", "question": "Order lookups return 40+ fields. Most requests need only 5 fields. Context is growing rapidly. What should you do?", "options": {"A": "Use a model with a larger context window.", "B": "Trim tool outputs to only the fields relevant to the current request type.", "C": "Paginate the results.", "D": "Cache frequently accessed fields."}, "correct": "B", "explanation": "Trimming verbose tool outputs to relevant fields prevents disproportionate context consumption."}, {"id": "SG-FE01-Q05", "source": "sgridworks-fullexam", "scenario": "Customer Support Resolution Agent", "task_statement": "1.x", "domain": "D1", "question": "A PostToolUse hook receives dates in three formats from different MCP tools: Unix timestamps, ISO 8601, and \"MM/DD/YYYY\". What should the hook do?", "options": {"A": "Let the model figure out the formats.", "B": "Normalize all dates to ISO 8601 before the model processes them.", "C": "Convert all to Unix timestamps for consistency.", "D": "Add format labels to each date field."}, "correct": "B", "explanation": "PostToolUse hooks should normalize heterogeneous data formats to a consistent format before model processing."}, {"id": "SG-FE01-Q06", "source": "sgridworks-fullexam", "scenario": "Customer Support Resolution Agent", "task_statement": "1.x", "domain": "D1", "question": "The company policy caps automated refunds at $500. The agent occasionally processes $600+ refunds despite prompt instructions. What provides guaranteed compliance?", "options": {"A": "Bold the $500 limit in the system prompt.", "B": "Implement a tool call interception hook that blocks `process_refund` when amount exceeds $500 and redirects to human escalation.", "C": "Add a confirmation step where the agent double-checks the amount.", "D": "Log all refund amounts for post-hoc auditing."}, "correct": "B", "explanation": "Tool call interception hooks provide deterministic enforcement of business rules."}, {"id": "SG-FE01-Q07", "source": "sgridworks-fullexam", "scenario": "Customer Support Resolution Agent", "task_statement": "1.x", "domain": "D1", "question": "A customer says \"I want to talk to a real person\" about a simple order status question. What should the agent do?", "options": {"A": "Answer the question first to save the customer time, then offer transfer.", "B": "Honor the explicit request immediately and transfer to a human agent.", "C": "Ask why they want a human to assess if escalation is truly needed.", "D": "Provide the answer and a link to contact support."}, "correct": "B", "explanation": "Explicit customer requests for human agents must be honored immediately."}, {"id": "SG-FE01-Q08", "source": "sgridworks-fullexam", "scenario": "Customer Support Resolution Agent", "task_statement": "1.x", "domain": "D1", "question": "The agent escalates based on negative customer sentiment. A frustrated customer with a simple, policy-covered return gets escalated unnecessarily. What is wrong?", "options": {"A": "The sentiment threshold is too low.", "B": "Sentiment-based escalation is unreliable because sentiment does not correlate with case complexity. Use explicit escalation criteria instead.", "C": "The agent should never escalate.", "D": "Add positive sentiment detection to balance the escalation trigger."}, "correct": "B", "explanation": "Sentiment != complexity. Explicit criteria (policy gaps, customer explicit requests, inability to progress) are more reliable than sentiment-based triggers."}, {"id": "SG-FE01-Q09", "source": "sgridworks-fullexam", "scenario": "Code Generation with Claude Code", "task_statement": "3.x", "domain": "D3", "question": "A new developer joins the team and reports Claude Code is not following the project's coding standards. Other developers do not have this issue. The standards are in a CLAUDE.md file. What is the most likely cause?", "options": {"A": "The new developer's Claude Code version is outdated.", "B": "The coding standards are in `~/.claude/CLAUDE.md` (user-level) on another developer's machine, not in the project-level config.", "C": "The CLAUDE.md file is too large.", "D": "The standards use syntax that Claude Code does not support."}, "correct": "B", "explanation": "User-level config is not shared via version control. Project-level config (.claude/CLAUDE.md or root CLAUDE.md) is needed for team-wide standards."}, {"id": "SG-FE01-Q10", "source": "sgridworks-fullexam", "scenario": "Code Generation with Claude Code", "task_statement": "3.x", "domain": "D3", "question": "You want to create a `/review` command available to every developer when they clone the repo. Where do you create it?", "options": {"A": "`.claude/commands/review.md` in the project repository.", "B": "`~/.claude/commands/review.md` in each developer's home directory.", "C": "In the root CLAUDE.md file.", "D": "In `.claude/config.json`."}, "correct": "A", "explanation": "Project-scoped commands in `.claude/commands/` are version-controlled and available to all developers automatically."}, {"id": "SG-FE01-Q11", "source": "sgridworks-fullexam", "scenario": "Code Generation with Claude Code", "task_statement": "3.x", "domain": "D3", "question": "Test files are spread throughout the codebase (e.g., `Button.test.tsx` next to `Button.tsx`) and should all follow the same testing conventions regardless of location. What is the most maintainable configuration?", "options": {"A": "Add testing conventions to the root CLAUDE.md.", "B": "Create rule files in `.claude/rules/` with YAML frontmatter glob patterns like `paths: [\"**/*.test.tsx\"]`.", "C": "Place a CLAUDE.md in every directory containing test files.", "D": "Create a testing skill that developers must invoke before writing tests."}, "correct": "B", "explanation": "Path-specific rules with glob patterns apply conventions to files by type regardless of directory location, which is ideal for test files spread throughout the codebase."}, {"id": "SG-FE01-Q12", "source": "sgridworks-fullexam", "scenario": "Code Generation with Claude Code", "task_statement": "3.x", "domain": "D3", "question": "You need to restructure a monolith into microservices, affecting dozens of files with multiple valid approaches. Which mode should you use?", "options": {"A": "Direct execution with comprehensive upfront instructions.", "B": "Plan mode to explore the codebase, understand dependencies, and design an approach before making changes.", "C": "Direct execution, changing files incrementally.", "D": "Direct execution and switch to plan mode only if stuck."}, "correct": "B", "explanation": "Plan mode is designed for complex tasks with large-scale changes, multiple valid approaches, and architectural decisions."}, {"id": "SG-FE01-Q13", "source": "sgridworks-fullexam", "scenario": "Code Generation with Claude Code", "task_statement": "3.x", "domain": "D3", "question": "A developer asks Claude to transform function signatures from camelCase to snake_case. After multiple attempts with different prose instructions, the results are inconsistent. What technique works best?", "options": {"A": "More detailed written instructions.", "B": "2-3 concrete input/output examples showing the exact transformation.", "C": "A regular expression replacement.", "D": "A stricter system prompt tone."}, "correct": "B", "explanation": "Concrete examples are the most effective way to communicate transformations when prose produces inconsistent results."}, {"id": "SG-FE01-Q14", "source": "sgridworks-fullexam", "scenario": "Code Generation with Claude Code", "task_statement": "3.x", "domain": "D3", "question": "A large CLAUDE.md (600 lines) covers API conventions, testing, deployment, and security. Maintenance is becoming difficult. What is the best refactoring?", "options": {"A": "Add section headers and a table of contents.", "B": "Split into focused files in `.claude/rules/` (e.g., `testing.md`, `api-conventions.md`, `deployment.md`).", "C": "Move to external documentation and link from CLAUDE.md.", "D": "Create separate CLAUDE.md files in each subdirectory."}, "correct": "B", "explanation": "`.claude/rules/` is designed for organizing topic-specific rule files as an alternative to a monolithic CLAUDE.md."}, {"id": "SG-FE01-Q15", "source": "sgridworks-fullexam", "scenario": "Code Generation with Claude Code", "task_statement": "3.x", "domain": "D3", "question": "A skill produces verbose codebase analysis output that consumes significant context. How do you prevent it from polluting the main conversation?", "options": {"A": "Reduce the analysis depth.", "B": "Use `context: fork` in the SKILL.md frontmatter to run the skill in an isolated sub-agent context.", "C": "Summarize the output manually.", "D": "Use `output: minimal` in the frontmatter."}, "correct": "B", "explanation": "`context: fork` runs the skill in isolation, preventing verbose output from consuming main conversation context."}, {"id": "SG-FE01-Q16", "source": "sgridworks-fullexam", "scenario": "Code Generation with Claude Code", "task_statement": "3.x", "domain": "D3", "question": "Your monorepo has React, Angular, and Go packages. Each needs different coding standards. What is the most maintainable configuration?", "options": {"A": "Put all standards in root CLAUDE.md with headers for each technology.", "B": "Use `@import` in each package's CLAUDE.md to include relevant standards files.", "C": "Duplicate a comprehensive CLAUDE.md in each package directory.", "D": "Use runtime detection of the current file's language."}, "correct": "B", "explanation": "`@import` enables selective inclusion of relevant standards files per package while avoiding duplication."}, {"id": "SG-FE01-Q17", "source": "sgridworks-fullexam", "scenario": "Multi-Agent Research System", "task_statement": "1.x", "domain": "D1", "question": "The system researches \"impact of AI on creative industries\" but the report covers only visual arts, missing music, writing, and film. The coordinator decomposed the topic into \"AI in digital art creation,\" \"AI in graphic design,\" and \"AI in photography.\" What is the root cause?", "options": {"A": "The synthesis agent lacks gap-detection instructions.", "B": "The coordinator's task decomposition is too narrow, only covering visual arts subtopics.", "C": "The web search agent's queries are not broad enough.", "D": "The document analysis agent filters out non-visual content."}, "correct": "B", "explanation": "The coordinator's decomposition directly caused the coverage gap by only assigning visual arts subtopics to subagents."}, {"id": "SG-FE01-Q18", "source": "sgridworks-fullexam", "scenario": "Multi-Agent Research System", "task_statement": "1.x", "domain": "D1", "question": "Web search and document analysis subagents can run independently, but synthesis needs results from both. What is the optimal execution pattern?", "options": {"A": "Run all three sequentially.", "B": "Emit two Task tool calls in one coordinator response (web search + document analysis) for parallel execution, then invoke synthesis with both results.", "C": "Run all three in parallel with a polling mechanism.", "D": "Pipeline: web search -> document analysis -> synthesis."}, "correct": "B", "explanation": "Parallel execution via multiple Task calls in a single response, followed by synthesis after both complete."}, {"id": "SG-FE01-Q19", "source": "sgridworks-fullexam", "scenario": "Multi-Agent Research System", "task_statement": "1.x", "domain": "D1", "question": "The web search subagent times out. It returns: `{\"status\": \"error\", \"message\": \"search unavailable\"}`. The coordinator cannot make a recovery decision. What should the error response include?", "options": {"A": "Just the HTTP status code.", "B": "Structured error context: failure type, attempted query, partial results, and potential alternative approaches.", "C": "A retry counter.", "D": "The full stack trace."}, "correct": "B", "explanation": "Structured error context enables intelligent coordinator recovery decisions."}, {"id": "SG-FE01-Q20", "source": "sgridworks-fullexam", "scenario": "Multi-Agent Research System", "task_statement": "1.x", "domain": "D1", "question": "The synthesis agent frequently needs to verify simple facts (dates, names, statistics) during synthesis. Currently this requires coordinator round-trips adding 40% latency. 85% of verifications are simple fact-checks. What is the best approach?", "options": {"A": "Give synthesis all web search tools for direct access.", "B": "Give synthesis a scoped `verify_fact` tool for simple lookups; complex verifications continue through the coordinator.", "C": "Have synthesis batch all verification needs and return them at once.", "D": "Have web search proactively cache extra context."}, "correct": "B", "explanation": "A scoped verification tool handles the 85% common case while preserving the coordination pattern for complex cases. This follows the principle of least privilege."}, {"id": "SG-FE01-Q21", "source": "sgridworks-fullexam", "scenario": "Multi-Agent Research System", "task_statement": "1.x", "domain": "D1", "question": "Subagent findings are returned as prose paragraphs. After synthesis, source attribution is lost. What structural change preserves provenance?", "options": {"A": "Tell the synthesis agent to \"always cite sources.\"", "B": "Require subagents to output structured claim-source mappings (source URL, document name, excerpt, date) that the synthesis agent must preserve.", "C": "Have synthesis search for URLs in the prose.", "D": "Add a post-processing attribution step."}, "correct": "B", "explanation": "Structured claim-source mappings are the architectural fix. Prose-based approaches lose information through summarization."}, {"id": "SG-FE01-Q22", "source": "sgridworks-fullexam", "scenario": "Multi-Agent Research System", "task_statement": "1.x", "domain": "D1", "question": "Two credible sources report different market growth figures: 15% and 22%. How should the synthesis handle this?", "options": {"A": "Average to 18.5%.", "B": "Use the more recent source.", "C": "Preserve both values with source attribution and annotate the conflict.", "D": "Report the lower value to be conservative."}, "correct": "C", "explanation": "Preserve both values, annotate the conflict, and let readers evaluate the sources."}, {"id": "SG-FE01-Q23", "source": "sgridworks-fullexam", "scenario": "Multi-Agent Research System", "task_statement": "1.x", "domain": "D1", "question": "The coordinator's `allowedTools` list includes standard tools but not \"Task\". What happens when it tries to spawn subagents?", "options": {"A": "It falls back to inline processing.", "B": "It cannot spawn subagents because Task is not in its allowed tools.", "C": "It spawns subagents with restricted permissions.", "D": "It automatically gains Task access."}, "correct": "B", "explanation": "`allowedTools` must explicitly include \"Task\" for a coordinator to invoke subagents."}, {"id": "SG-FE01-Q24", "source": "sgridworks-fullexam", "scenario": "Multi-Agent Research System", "task_statement": "1.x", "domain": "D1", "question": "Three subagents research overlapping subtopics, producing duplicate findings. How do you reduce duplication?", "options": {"A": "Add deduplication in the coordinator after all subagents complete.", "B": "Partition research scope across subagents (distinct subtopics or source types) to minimize overlap.", "C": "Reduce to one subagent.", "D": "Have each subagent check with the coordinator before each search."}, "correct": "B", "explanation": "Partitioning scope at assignment time is more efficient than post-hoc deduplication."}, {"id": "SG-FE01-Q25", "source": "sgridworks-fullexam", "scenario": "Developer Productivity with Claude", "task_statement": "2.x", "domain": "D2", "question": "A developer needs to find all callers of `processPayment()` across the codebase. Which built-in tool should they start with?", "options": {"A": "Glob to find all JavaScript files, then Read each one.", "B": "Grep to search for `processPayment` in file contents across the codebase.", "C": "Read to load every file and search manually.", "D": "Bash to run a custom search script."}, "correct": "B", "explanation": "Grep is the built-in tool for content search -- searching file contents for patterns like function names."}, {"id": "SG-FE01-Q26", "source": "sgridworks-fullexam", "scenario": "Developer Productivity with Claude", "task_statement": "2.x", "domain": "D2", "question": "A developer needs to find all files matching `*.test.tsx` in the project. Which tool?", "options": {"A": "Grep", "B": "Read", "C": "Glob", "D": "Bash with `find`"}, "correct": "C", "explanation": "Glob is for file path pattern matching -- finding files by name/extension patterns."}, {"id": "SG-FE01-Q27", "source": "sgridworks-fullexam", "scenario": "Developer Productivity with Claude", "task_statement": "2.x", "domain": "D2", "question": "Edit fails because the anchor text is not unique in the file. What is the correct fallback?", "options": {"A": "Use Bash with `sed` for the edit.", "B": "Use Read to load the full file contents, then Write the entire modified file.", "C": "Try Edit with a smaller anchor text.", "D": "Manually edit the file."}, "correct": "B", "explanation": "When Edit cannot find unique anchor text, Read + Write is the documented fallback for reliable file modification."}, {"id": "SG-FE01-Q28", "source": "sgridworks-fullexam", "scenario": "Developer Productivity with Claude", "task_statement": "2.x", "domain": "D2", "question": "An MCP server provides a `search_issues` tool with detailed Jira integration. But the agent keeps using Grep to search for issue references in code instead. What is the likely cause?", "options": {"A": "Built-in tools always take priority.", "B": "The MCP tool's description does not clearly explain its capabilities, causing the agent to prefer familiar built-in tools.", "C": "The MCP server is not connected.", "D": "Grep is always better for searching."}, "correct": "B", "explanation": "Vague MCP tool descriptions cause the agent to default to familiar built-in alternatives. Enhanced descriptions fix this."}, {"id": "SG-FE01-Q29", "source": "sgridworks-fullexam", "scenario": "Developer Productivity with Claude", "task_statement": "2.x", "domain": "D2", "question": "A team wants to share an MCP server configuration but each developer needs their own auth token. How should this be configured?", "options": {"A": "Each developer manually configures the server in their local config.", "B": "Use `.mcp.json` in the project repo with `${JIRA_TOKEN}` environment variable expansion for credentials.", "C": "Commit the token to the repo's `.mcp.json`.", "D": "Store tokens in CLAUDE.md."}, "correct": "B", "explanation": "Project-scoped `.mcp.json` with environment variable expansion enables shared config with individual credentials."}, {"id": "SG-FE01-Q30", "source": "sgridworks-fullexam", "scenario": "Developer Productivity with Claude", "task_statement": "2.x", "domain": "D2", "question": "A developer adds a personal experimental MCP server. Where should it be configured?", "options": {"A": "`.mcp.json` in the project repo with a \"personal\" flag.", "B": "`~/.claude.json` (user-scoped configuration).", "C": "`.mcp.local.json` in the project directory.", "D": "A separate config file referenced from CLAUDE.md."}, "correct": "B", "explanation": "User-scoped `~/.claude.json` for personal/experimental servers that should not affect teammates."}, {"id": "SG-FE01-Q31", "source": "sgridworks-fullexam", "scenario": "Claude Code for CI/CD", "task_statement": "3.x", "domain": "D3", "question": "Your CI job runs `claude \"Review this PR\"` and hangs. What is the fix?", "options": {"A": "Set `CLAUDE_HEADLESS=true`.", "B": "Use `claude -p \"Review this PR\"` with the `-p` flag for non-interactive mode.", "C": "Redirect stdin from `/dev/null`.", "D": "Use `claude --batch \"Review this PR\"`."}, "correct": "B", "explanation": "The `-p` (or `--print`) flag is the documented way to run Claude Code in non-interactive mode for CI/CD."}, {"id": "SG-FE01-Q32", "source": "sgridworks-fullexam", "scenario": "Claude Code for CI/CD", "task_statement": "3.x", "domain": "D3", "question": "CI review output needs to be structured JSON for automated inline PR comments. Which flags?", "options": {"A": "`-p --verbose`", "B": "`-p --output-format json --json-schema <schema>`", "C": "`-p --format json`", "D": "`-p | jq`"}, "correct": "B", "explanation": "`--output-format json` with `--json-schema` produces machine-parseable structured output."}, {"id": "SG-FE01-Q33", "source": "sgridworks-fullexam", "scenario": "Claude Code for CI/CD", "task_statement": "3.x", "domain": "D3", "question": "Your manager wants to switch both pre-merge code review and overnight debt analysis to the batch API for 50% savings. What is correct?", "options": {"A": "Switch both.", "B": "Switch overnight debt analysis to batch; keep pre-merge reviews synchronous. Batch has up to 24-hour processing with no guaranteed latency SLA.", "C": "Keep both synchronous.", "D": "Switch both with timeout fallback."}, "correct": "B", "explanation": "Batch API is for latency-tolerant workloads only. Pre-merge checks are blocking and need real-time responses."}, {"id": "SG-FE01-Q34", "source": "sgridworks-fullexam", "scenario": "Claude Code for CI/CD", "task_statement": "3.x", "domain": "D3", "question": "A 14-file PR review produces contradictory findings: flagging a pattern as problematic in one file while approving identical code elsewhere. What is the fix?", "options": {"A": "Use a larger context window model.", "B": "Split into per-file local analysis passes plus a separate cross-file integration pass.", "C": "Require smaller PRs.", "D": "Run three reviews and take majority vote."}, "correct": "B", "explanation": "Multi-pass review (per-file + integration) addresses attention dilution in large reviews."}, {"id": "SG-FE01-Q35", "source": "sgridworks-fullexam", "scenario": "Claude Code for CI/CD", "task_statement": "3.x", "domain": "D3", "question": "The same Claude session generates code and reviews it. The review finds no issues, but an independent reviewer later finds bugs. Why?", "options": {"A": "The review prompt was inadequate.", "B": "The model retains generation reasoning context, making it biased toward confirming its own decisions.", "C": "The model cannot review code.", "D": "Extended thinking was not enabled."}, "correct": "B", "explanation": "Self-review in the same session is limited by retained reasoning context bias."}, {"id": "SG-FE01-Q36", "source": "sgridworks-fullexam", "scenario": "Claude Code for CI/CD", "task_statement": "3.x", "domain": "D3", "question": "CI re-runs reviews after new commits. Previous findings are duplicated. How do you fix this?", "options": {"A": "Delete previous comments before each run.", "B": "Include prior review findings in context, instructing Claude to report only new or still-unaddressed issues.", "C": "Use a different review template for re-reviews.", "D": "Only review newly changed files."}, "correct": "B", "explanation": "Including prior findings prevents duplicate reporting while maintaining awareness of all issues."}, {"id": "SG-FE01-Q37", "source": "sgridworks-fullexam", "scenario": "Claude Code for CI/CD", "task_statement": "3.x", "domain": "D3", "question": "Generated tests frequently duplicate existing test scenarios. What prevents this?", "options": {"A": "Limit the number of generated tests.", "B": "Provide existing test files in context so Claude avoids duplicating already-covered scenarios.", "C": "Run a deduplication filter on generated tests.", "D": "Only generate tests for new code."}, "correct": "B", "explanation": "Context awareness of existing tests prevents duplication at generation time."}, {"id": "SG-FE01-Q38", "source": "sgridworks-fullexam", "scenario": "Claude Code for CI/CD", "task_statement": "3.x", "domain": "D3", "question": "You want CI-generated tests to follow project conventions and use available fixtures. What is the most effective way to convey this?", "options": {"A": "Add \"Generate high-quality tests\" to the CI prompt.", "B": "Document testing standards, valuable test criteria, and available fixtures in CLAUDE.md.", "C": "Specify exact test patterns in the CI script.", "D": "Post-process tests to add fixture imports."}, "correct": "B", "explanation": "CLAUDE.md is the mechanism for providing project context to CI-invoked Claude Code."}, {"id": "SG-FE01-Q39", "source": "sgridworks-fullexam", "scenario": "Structured Data Extraction", "task_statement": "4.x", "domain": "D4", "question": "Your extraction tool uses `tool_use` with a JSON schema. It never produces JSON syntax errors but occasionally places vendor names in the address field. What type of error is this?", "options": {"A": "Schema syntax error.", "B": "Semantic error -- tool_use eliminates syntax errors but not logical/semantic errors.", "C": "Configuration error.", "D": "Model hallucination."}, "correct": "B", "explanation": "Tool use with JSON schemas eliminates syntax errors but cannot prevent semantic errors (values in wrong fields, logical inconsistencies)."}, {"id": "SG-FE01-Q40", "source": "sgridworks-fullexam", "scenario": "Structured Data Extraction", "task_statement": "4.x", "domain": "D4", "question": "An invoice has no phone number, but your schema marks `phone` as required. The model generates a plausible phone number. How do you fix this?", "options": {"A": "Add \"Do not fabricate values\" to the prompt.", "B": "Make the `phone` field optional (nullable) so the model can return null when information is absent.", "C": "Post-validate phone numbers against a directory.", "D": "Remove the phone field entirely."}, "correct": "B", "explanation": "Nullable fields allow the model to signal \"not found\" rather than fabricating values to satisfy required constraints."}, {"id": "SG-FE01-Q41", "source": "sgridworks-fullexam", "scenario": "Structured Data Extraction", "task_statement": "4.x", "domain": "D4", "question": "Validation fails on 20% of extractions. Your retry sends the same prompt again. Success rate on retry is only 8%. How do you improve?", "options": {"A": "Retry 5 times instead of once.", "B": "Include the original document, the failed extraction, and specific validation errors in the retry prompt for model self-correction.", "C": "Use a different model for retries.", "D": "Lower validation thresholds."}, "correct": "B", "explanation": "Retry-with-error-feedback gives the model specific information about what went wrong."}, {"id": "SG-FE01-Q42", "source": "sgridworks-fullexam", "scenario": "Structured Data Extraction", "task_statement": "4.x", "domain": "D4", "question": "Some retry failures are due to missing information (the source document simply does not contain the data). What should you do about these?", "options": {"A": "Keep retrying with modified prompts.", "B": "Recognize that retries are ineffective when information is absent from the source and mark those fields as unavailable rather than continuing to retry.", "C": "Have the model search external sources for the missing data.", "D": "Fabricate plausible values."}, "correct": "B", "explanation": "Retries cannot conjure information that does not exist in the source document."}, {"id": "SG-FE01-Q43", "source": "sgridworks-fullexam", "scenario": "Structured Data Extraction", "task_statement": "4.x", "domain": "D4", "question": "You need to extract data from invoices, contracts, and receipts. Documents arrive without type labels. How do you ensure structured output while allowing correct schema selection?", "options": {"A": "Use `tool_choice: \"auto\"`.", "B": "Use `tool_choice: \"any\"` with three extraction tools (one per document type).", "C": "Force `tool_choice` to always use the invoice schema.", "D": "Use a single generic extraction schema."}, "correct": "B", "explanation": "`\"any\"` guarantees a tool call while letting the model choose the correct extraction schema for the document type."}, {"id": "SG-FE01-Q44", "source": "sgridworks-fullexam", "scenario": "Structured Data Extraction", "task_statement": "4.x", "domain": "D4", "question": "Your extraction pipeline reports 97% accuracy overall. Users report problems with handwritten receipts. What metric should you have checked before deploying?", "options": {"A": "Overall accuracy with a larger sample.", "B": "Accuracy by document type and field to verify consistent performance across all segments.", "C": "Processing speed per document type.", "D": "Model confidence distribution."}, "correct": "B", "explanation": "Accuracy must be validated per document type and per field before automating. Aggregate metrics mask segment-specific failures."}, {"id": "SG-FE01-Q45", "source": "sgridworks-fullexam", "scenario": "Structured Data Extraction", "task_statement": "4.x", "domain": "D4", "question": "You have automated high-confidence extractions. How do you detect if accuracy drifts over time?", "options": {"A": "Wait for user complaints.", "B": "Implement stratified random sampling of high-confidence extractions for ongoing error rate measurement.", "C": "Monitor model confidence scores for trends.", "D": "Re-validate monthly with a fixed test set."}, "correct": "B", "explanation": "Stratified sampling provides continuous monitoring for quality degradation and novel error patterns."}, {"id": "SG-FE01-Q46", "source": "sgridworks-fullexam", "scenario": "Structured Data Extraction", "task_statement": "4.x", "domain": "D4", "question": "Your category enum has 5 values. Occasionally documents do not fit any category. How do you handle this?", "options": {"A": "Force the closest match.", "B": "Add `\"other\"` to the enum plus a `category_detail` string field for describing novel categories.", "C": "Add more enum values proactively.", "D": "Skip uncategorizable documents."}, "correct": "B", "explanation": "The \"other\" + detail string pattern provides extensible categorization."}, {"id": "SG-FE01-Q48", "source": "sgridworks-fullexam", "scenario": "Structured Data Extraction", "task_statement": "4.x", "domain": "D4", "question": "Your batch of 100 documents has 5 failures: 3 exceeded context limits, 2 had transient server errors. How do you handle them?", "options": {"A": "Resubmit the entire batch.", "B": "Resubmit only the 5 failures by `custom_id`: chunk the 3 oversized documents and retry the 2 transient failures as-is.", "C": "Discard the failures.", "D": "Wait and resubmit without changes."}, "correct": "B", "explanation": "Targeted resubmission with appropriate modifications (chunking for context issues, simple retry for transient errors)."}, {"id": "SG-FE01-Q49", "source": "sgridworks-fullexam", "scenario": "Structured Data Extraction", "task_statement": "4.x", "domain": "D4", "question": "An extraction has both a `stated_total` and individual `line_items`. The items sum to a different total than the stated one. Both are accurately extracted. What should the system do?", "options": {"A": "Adjust line items to match the total.", "B": "Flag the discrepancy with a `conflict_detected` boolean and include both `stated_total` and `calculated_total` for human review.", "C": "Trust the stated total only.", "D": "Reject the extraction."}, "correct": "B", "explanation": "Self-correction validation that extracts both values and flags discrepancies preserves accuracy while alerting to document-level issues."}, {"id": "SG-FE01-Q50", "source": "sgridworks-fullexam", "scenario": "Structured Data Extraction", "task_statement": "4.x", "domain": "D4", "question": "Your extraction handles formal invoices well but struggles with informal receipts that use abbreviations and varied layouts. Few-shot examples of formal invoices do not help. What should you add?", "options": {"A": "More formal invoice examples.", "B": "Few-shot examples demonstrating extraction from documents with varied formats (abbreviations, informal measurements, different layouts).", "C": "A pre-processing step that converts all documents to a standard format.", "D": "A separate model trained on informal documents."}, "correct": "B", "explanation": "Few-shot examples showing correct handling of varied document structures (the specific challenge) enable the model to generalize to informal formats."}, {"id": "OA-Q01", "source": "olivier-alter", "scenario": "", "domain": "D1", "task_statement": "1.4", "question": "Production data shows that in 12% of cases, your agent skips `get_customer` entirely and calls `lookup_order` using only the customer's stated name, occasionally leading to misidentified accounts and incorrect refunds. What change would most effectively address this reliability issue?", "options": {"A": "Add a programmatic prerequisite that blocks `lookup_order` and `process_refund` calls until `get_customer` has returned a verified customer ID.", "B": "Enhance the system prompt to state that customer verification via `get_customer` is mandatory before any order operations.", "C": "Add few-shot examples showing the agent always calling `get_customer` first, even when customers volunteer order details.", "D": "Implement a routing classifier that analyzes each request and enables only the subset of tools appropriate for that request type."}, "correct": "A", "explanation": "When a specific tool sequence is required for critical business logic, programmatic enforcement provides deterministic guarantees that prompt-based approaches cannot. Options B and C rely on probabilistic LLM compliance. Option D addresses tool availability rather than tool ordering."}, {"id": "OA-Q13", "source": "olivier-alter", "scenario": "", "domain": "D1", "task_statement": "1.1",
